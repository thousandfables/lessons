<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Parts</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            color: #444;
            background: linear-gradient(145deg, #eaeaea, #ffffff);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset 2px 2px 4px rgba(0, 0, 0, 0.05),
                inset -2px -2px 4px rgba(255, 255, 255, 0.4);
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        h3 {
            font-size: 50px;
            font-weight: bold;
        }



        #left {
            width: 100%;
            padding: 20px;
            border-right: 2px solid #ccc;
        }

        #right {
            display: none background-color: #f4f4f4;
        }

        .part-buttons,
        .content-buttons {
            margin-bottom: 10px;
        }

        .part-buttons button,
        .content-buttons button {
            margin-right: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .part-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        .content-buttons button.loading {
            animation: flash 0.5s infinite alternate;
        }

        .content-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        @keyframes flash {
            0% {
                background-color: #ffd700;
            }

            100% {
                background-color: #ffa500;
            }
        }

        .hidden {
            display: none;
        }

        .section-content {
            margin-top: 1px;
            padding: 30px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        /* Vocabulary Entry */
        .entry-box {
            font-weight: bold;
            font-size: 1.4em;
            display: inline-block;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 2px;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        /* Definition Box */
        .definition-box {
            background-color: #f4f4f4;
            padding: 8px 12px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            margin: 5px 0;
            max-width: 400px;
            text-align: left;
        }

        /* Word Styling */
        .word {
            font-weight: bold;
            color: #000000;
            font-size: 1.2em;
        }

        .example {
            margin-left: 20px;
            font-style: italic;
        }

        /* Fact Box */
        .fact-box {
            background-color: rgba(142, 68, 173, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(142, 68, 173, 0.15);
            max-width: 500px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: bold;
            padding: 8px 12px;
            display: inline-block;
            border-left: 6px solid rgba(0, 0, 0, 0.2);
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
            margin-bottom: 10px;
            color: white;
        }

        /* Section Colors */
        .purple-section {
            background-color: #8e44ad;
            border-left-color: #6a1b9a;
            box-shadow: 3px 3px 8px rgba(142, 68, 173, 0.3);
        }

        .joke-box {
            background-color: rgba(52, 152, 219, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(52, 152, 219, 0.15);
            max-width: 500px;
        }


        /* Text Formatting */
        .fact {
            color: black;
        }

        /* Joke Text */
        .joke {
            color: #6d1b9a;
            /* Deeper purple for better readability */
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Joke Question Styling */
        .joke-question {
            font-weight: bold;
            font-size: 1.2em;
            font-style: italic;
            color: #2c3e50;
            /* Dark gray-blue for a classy contrast */
            margin-bottom: 5px;
        }

        /* Enhanced Typography */
        .bold {
            font-weight: 600;
            color: #000000;
            /* Darker shade for better contrast */
        }

        .italic {
            font-style: italic;
            color: #000000;
            /* Slightly darker gray for better readability */
        }

        .bold-italic {
            font-weight: 600;
            font-style: italic;
            color: #222;
            /* More emphasis on bold-italic text */
        }

        /* Joke Box - Adds a soft neumorphic effect */
        .joke-box {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1),
                -5px -5px 10px rgba(255, 255, 255, 0.5);
            max-width: 550px;
            transition: all 0.3s ease-in-out;
        }

        /* Joke Box Hover Effect */
        .joke-box:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.6);
        }

        /* Dialogue Container - Left Centered */
        /* Dialogue Container - Auto Width Based on Content */
        .dialogue-container {
            display: inline-block;
            /* Shrinks width to fit content */
            max-width: 800px;
            /* Prevents it from becoming too wide */
            margin: 20px 0;
            /* Aligns it to the left with some spacing */
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }



        /* Individual Dialogue Lines */
        .line {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Styling for Different Speakers */
        .person-1 {
            background: linear-gradient(145deg, #dde5ed, #c9d6e2);
            text-align: left;
            color: #2c3e50;
        }

        .person-2 {
            background: linear-gradient(145deg, #d1e8ff, #b9dfff);
            text-align: left;
            color: #1d3557;
        }

        /* Speaker Name Styling */
        .speaker {
            font-weight: bold;
            margin-bottom: 5px;

            font-size: 1.1em;
            color: #000;
        }
    </style>
</head>

<body>

    <div id="left">
        <h2>Lesson Parts</h2>
        <div id="partsSection" class="part-buttons"></div>
        <div id="contentSection" class="content-buttons hidden"></div>
        <div id="displaySection"></div>
    </div>

    <div id="right">
        <!-- Reserved for later use -->
    </div>

    <script>
        // Declare json_content but do not fill it
        let json_content = {
    "parts_number": 1,
    "mistakes": {
        "mistakes_1": {
            "mistakes_list": [
                {
                    "original": "I think that's really depends on a place where you grew up.",
                    "corrected": "I think that really depends on the place where you grew up.",
                    "explanation": "'That's' is incorrect here; 'that' should be used to maintain the correct subject-verb agreement.",
                    "context": "Each city has its own unique slang. I think that really depends on the place where you grew up. For instance, people from different regions might use different pronunciations."
                },
                {
                    "original": "It's American. But vase or something like that is British.",
                    "corrected": "It's American, but 'vase' or something like that is British.",
                    "explanation": "A comma is needed before 'but' to connect two independent clauses.",
                    "context": "I was comparing American and British pronunciations. It's American, but 'vase' or something like that is British. This kind of variation exists in many words."
                },
                {
                    "original": "In contrast to is not a preposition.",
                    "corrected": "In contrast to is a preposition.",
                    "explanation": "The phrase itself needs a correction in terms of meaning; it's indeed a preposition.",
                    "context": "We were discussing the usage of grammatical structures. In contrast to is a preposition, and it’s important to use it correctly in sentences."
                },
                {
                    "original": "In the western and on the central.",
                    "corrected": "In the western and central.",
                    "explanation": "The prepositions 'in' and 'on' are unnecessary and grammatically incorrect for this context.",
                    "context": "When describing different regions, we need to be clear. In the western and central areas, the features are distinct. It’s essential to phrase it accurately."
                },
                {
                    "original": "That beach. No. Mm-hmm.",
                    "corrected": "The beach. No. Mm-hmm.",
                    "explanation": "'That' should be 'the' when referring to a specific noun already known to the listener.",
                    "context": "While talking about recent changes, I was trying to specify. The beach. No. Mm-hmm. It has undergone renovations that changed its function."
                },
                {
                    "original": "And I have to use the word recreation.",
                    "corrected": "I have to use the word 'recreation.'",
                    "explanation": "The use of 'and' here makes the sentence awkward; it can be omitted for clarity.",
                    "context": "In our discussion about vocabulary, I mentioned. I have to use the word 'recreation.' It's important for describing certain areas or activities."
                }
            ]
        }
    },
    "vocabulary": {
        "vocabulary_1": {
            "vocabulary_list": [
                {
                    "word": "Pronunciation",
                    "definition": "The way in which a word is spoken.",
                    "context": {
                        "Context 1": "The pronunciation of 'pronunciation' can be tricky for some learners.",
                        "Context 2": "In a karaoke night, everyone had a different pronunciation of the song lyrics.",
                        "Context 3": "The teacher encouraged students to practice their pronunciation in front of the class."
                    }
                },
                {
                    "word": "Context",
                    "definition": "The circumstances or setting surrounding an event, statement, or idea.",
                    "context": {
                        "Context 1": "Understanding the context of a conversation can lead to better communication.",
                        "Context 2": "The ghost story lost its context when told in a bright, sunny room.",
                        "Context 3": "In a video game, context matters; characters behave differently based on where they are."
                    }
                },
                {
                    "word": "Accent",
                    "definition": "A distinct way of pronouncing a language, often associated with a particular region or country.",
                    "context": {
                        "Context 1": "Her British accent made her stand out in the American classroom.",
                        "Context 2": "The comedian impersonated different accents, bringing laughter to the audience.",
                        "Context 3": "His strong accent made it difficult for others to understand him at first."
                    }
                },
                {
                    "word": "Slang",
                    "definition": "Informal language consisting of words and expressions that are not considered suitable for formal occasions.",
                    "context": {
                        "Context 1": "Each city has its own slang that can confuse newcomers.",
                        "Context 2": "He used slang in his essay, which didn’t impress the teacher.",
                        "Context 3": "The latest slang trends often start on social media."
                    }
                },
                {
                    "word": "Elite",
                    "definition": "A select group that is superior in terms of ability, quality, or stature.",
                    "context": {
                        "Context 1": "The elite club only accepted members with significant achievements.",
                        "Context 2": "She felt like an elite athlete after winning the championship.",
                        "Context 3": "In some schools, elite students are given special privileges."
                    }
                },
                {
                    "word": "Mafia",
                    "definition": "An organized group of criminals, often involved in illegal activities.",
                    "context": {
                        "Context 1": "The mafia film depicted a world of crime and power.",
                        "Context 2": "At the restaurant, they joked about the mafia families that sometimes dined there.",
                        "Context 3": "Some people enjoy mafia-themed board games with friends."
                    }
                },
                {
                    "word": "Subtitles",
                    "definition": "Text displayed at the bottom of a screen that translates or transcribes the dialogue within films and television shows.",
                    "context": {
                        "Context 1": "Watching foreign films with subtitles helps improve language skills.",
                        "Context 2": "She turned on the subtitles to catch every word of the fast-paced dialogue.",
                        "Context 3": "Some people prefer watching movies with subtitles instead of dubbed audio."
                    }
                },
                {
                    "word": "Unchanged",
                    "definition": "Remaining the same; not altered or modified.",
                    "context": {
                        "Context 1": "Despite all the changes around it, the old tree remained unchanged.",
                        "Context 2": "The recipe for grandma's cookies has remained unchanged for generations.",
                        "Context 3": "Many aspects of the traditional festival remained unchanged over the years."
                    }
                },
                {
                    "word": "Process",
                    "definition": "A series of actions or steps taken to achieve a particular end.",
                    "context": {
                        "Context 1": "Learning a new language is a process that requires practice.",
                        "Context 2": "The cookie-baking process involves mixing, baking, and cooling.",
                        "Context 3": "During the process of building the house, they faced several delays."
                    }
                },
                {
                    "word": "Contrast",
                    "definition": "The state of being strikingly different from something else.",
                    "context": {
                        "Context 1": "In contrast to her shy sister, she was very outgoing.",
                        "Context 2": "The bright colors of the painting create a strong contrast against the white wall.",
                        "Context 3": "The contrast between summer and winter in the mountains is breathtaking."
                    }
                }
            ],
            "funny_facts": [
                {
                    "word": "Accent",
                    "fact": "Did you know that there are over 160 different accents in the UK alone? That's a lot of ways to say 'hello'!"
                },
                {
                    "word": "Slang",
                    "fact": "The word 'slang' itself might come from 'slang' meaning 'a lot' in Old English, showing how language evolves!"
                }
            ],
            "jokes": [
                {
                    "question": "Why did the English teacher go to jail?",
                    "answer": "Because she got caught using too many contractions!"
                },
                {
                    "question": "Why was the computer cold?",
                    "answer": "Because it left its Windows open!"
                }
            ]
        }
    },
    "dialogue": {
        "dialogue_1": {
            "dialogue_list": [
                {
                    "Person 1": "Hey, did you ever notice how different people pronounce words?"
                },
                {
                    "Person 2": "Oh, totally! It’s fascinating. Like, have you heard how some people say 'fiancé' just like in French?"
                },
                {
                    "Person 1": "Right? And then you have 'marketing.' It's so different in other languages."
                },
                {
                    "Person 2": "Yeah, I remember when I learned that word in Russian. It sounds much simpler there!"
                },
                {
                    "Person 1": "For sure! And I feel like every place has its own slang too. It can be confusing."
                },
                {
                    "Person 2": "Exactly! I mean, even within the U.S., people say things differently depending on where they’re from."
                },
                {
                    "Person 1": "Speaking of accents, I’ve been watching this Irish show called 'Derry Girls.' The accents are wild!"
                },
                {
                    "Person 2": "I've heard of that! I can't even understand half of what they say sometimes."
                },
                {
                    "Person 1": "Right? They pronounce 'school' so differently, it’s hard to keep up!"
                },
                {
                    "Person 2": "Yeah, it’s like they speak another language! But I like to watch everything in American English."
                },
                {
                    "Person 1": "Me too! It just feels more familiar. I was watching a TikTok and they mentioned 'zebra' and 'vase.'"
                },
                {
                    "Person 2": "Haha, yeah! It’s funny how 'vase' is American and 'vase' is British. Little things like that make a big difference."
                },
                {
                    "Person 1": "Totally! At the end of the day, it’s all about understanding each other, right?"
                },
                {
                    "Person 2": "For sure! And subtitles help a lot too, especially with those heavy accents."
                },
                {
                    "Person 1": "Definitely! I can’t believe how many variations of English there are out there."
                },
                {
                    "Person 2": "Right? It always keeps things interesting though.  Anyway, I gotta run, but we should keep chatting about this next time!"
                },
                {
                    "Person 1": "Absolutely! Have a good one!"
                },
                {
                    "Person 2": "You too! Catch you later!"
                }
            ]
        }
    }
}


            // Set parts_number from json_content
            let parts_number = json_content.parts_number || 0;

        // References to sections
        const partsSection = document.getElementById('partsSection');
        const contentSection = document.getElementById('contentSection');
        const displaySection = document.getElementById('displaySection');

        let activePart = null; // Track the active part

        // Function to create Part buttons
        function createPartButtons() {
            for (let i = 1; i <= parts_number; i++) {
                let button = document.createElement("button");
                button.textContent = "Part " + i;
                button.onclick = () => showContentButtons(i, button);
                partsSection.appendChild(button);
            }
        }

        // Function to show Mistakes, Vocabulary, and Dialogue buttons
        function showContentButtons(part, button) {
            // Reset previous part selection
            document.querySelectorAll(".part-buttons button").forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");

            // Clear previous content buttons and displayed content
            contentSection.innerHTML = "";
            contentSection.classList.remove("hidden");
            displaySection.innerHTML = "";

            activePart = part; // Update active part

            let sections = ["Mistakes", "Vocabulary", "Dialogue"];
            sections.forEach(section => {
                let secButton = document.createElement("button");
                secButton.textContent = section;
                secButton.onclick = () => {
                    secButton.classList.add("loading"); // Add flashing effect
                    displayContent(section, part, secButton);
                };
                contentSection.appendChild(secButton);
            });
        }

        // Function to display selected content
        function displayContent(type, part, button) {
            let dataKey = type.toLowerCase(); // "mistakes", "vocabulary", "dialogue"
            let partKey = dataKey + "_" + part; // e.g., "mistakes_1"

            if (json_content[dataKey] && json_content[dataKey][partKey]) {
                let contentData = json_content[dataKey][partKey];

                if (dataKey === "mistakes") {
                    appendContent(displayMistakes(contentData), part, type, button);
                } else if (dataKey === "vocabulary") {
                    appendContent(displayVocabulary(contentData), part, type, button);
                } else if (dataKey === "dialogue") {
                    appendContent(displayDialogue(contentData), part, type, button);
                }
            }
        }

        // Append content while keeping existing sections
        function appendContent(html, part, type, button) {
            let sectionID = `part${part}-${type}`;
            let existingSection = document.getElementById(sectionID);

            if (!existingSection) {
                let newSection = document.createElement("div");
                newSection.id = sectionID;
                newSection.classList.add("section-content");
                newSection.innerHTML = html;
                displaySection.appendChild(newSection);

                // Remove animation, keep the button highlighted
                button.classList.remove("loading");
                button.classList.add("active");
            }
        }

        // Function to display Mistakes content
        function displayMistakes(data) {
            let html = "<h3>Mistakes</h3>";
            data.mistakes_list.forEach(mistake => {
                html += `<p><b>Original:</b> ${mistake.original}</p>`;
                html += `<p><b>Corrected:</b> <b> ${mistake.corrected}</b></p>`;
                html += `<p><b>Explanation:</b> ${mistake.explanation}</p>`;
                html += `<p><b>Context:</b> <i> ${mistake.context}</i></p>`;
                html += `<hr><br>`; /* Adds an extra blank line */
            });
            return html;
        }





        // Function to display Vocabulary content
        function displayVocabulary(data) {
            let html = "<h3>Vocabulary</h3>";

            // Helper function: Preserve case in context replacement
            function formatContextSentence(sentence, word) {
                const regex = new RegExp(`\\b${word}\\b`, "gi"); // Case-insensitive exact word match
                return sentence.replace(regex, (match) => {
                    return `<span class="bold-italic">${match}</span>`; // Keeps match's case
                });
            }

            // Vocabulary Section
            data.vocabulary_list.forEach((entry, index) => {
                // Word Entry
                html += `<p class="entry-box"> <span class="word">${index + 1}. ${entry.word}</span></p>`;

                // Definition Box
                html += `<div class="definition-box"><span class="bold">Definition:</span> ${entry.definition}</div>`;

                // Context Sentences
                html += "<p>";
                Object.values(entry.context).forEach((sentence, i) => {
                    const formattedSentence = formatContextSentence(sentence, entry.word);
                    html += `<br><span class="bold">Context ${i + 1}:</span> <span class="italic">${formattedSentence}</span>`;
                });
                html += "</p>";
            });

            // Funny Facts Section
            if (data.funny_facts.length > 0) {
                html += `<div class="section-title purple-section">Funny Facts</div>`;
                data.funny_facts.forEach((fact, index) => {
                    html += `<div class="fact-box">
                <p class="fact"><span class="bold">${index + 1}. ${fact.word}:</span> ${fact.fact}</p>
             </div>`;
                });
            }

            // Jokes Section
            if (data.jokes.length > 0) {
                html += `<div class="section-title purple-section">Jokes</div>`;
                data.jokes.forEach((joke, index) => {
                    html += `<div class="joke-box">
                <p class="joke-question">${index + 1}. ${joke.question}</p>
                <p class="italic joke">${joke.answer}</p>
             </div>`;
                });
            }

            return html; // Returning the generated HTML instead of inserting it directly
        }

        function displayDialogue(data) {
            let html = `<div class="dialogue-container">`;
            html += "<h3>Dialogue</h3>";

            data.dialogue_list.forEach(entry => {
                const speaker = Object.keys(entry)[0];
                const line = entry[speaker];

                html += `<div class="line ${speaker === "Person 1" ? 'person-1' : 'person-2'}">
                    <span class="speaker">${speaker}:</span> ${line}
                 </div>`;
            });

            html += `</div>`;
            return html;
        }





        // Initialize part buttons
        createPartButtons();
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Parts</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            color: #444;
            background: linear-gradient(145deg, #eaeaea, #ffffff);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset 2px 2px 4px rgba(0, 0, 0, 0.05),
                inset -2px -2px 4px rgba(255, 255, 255, 0.4);
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        h3 {
            font-size: 50px;
            font-weight: bold;
        }



        #left {
            width: 100%;
            padding: 20px;
            border-right: 2px solid #ccc;
        }

        #right {
            display: none background-color: #f4f4f4;
        }

        .part-buttons,
        .content-buttons {
            margin-bottom: 10px;
        }

        .part-buttons button,
        .content-buttons button {
            margin-right: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .part-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        .content-buttons button.loading {
            animation: flash 0.5s infinite alternate;
        }

        .content-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        @keyframes flash {
            0% {
                background-color: #ffd700;
            }

            100% {
                background-color: #ffa500;
            }
        }

        .hidden {
            display: none;
        }

        .section-content {
            margin-top: 1px;
            padding: 30px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        /* Vocabulary Entry */
        .entry-box {
            font-weight: bold;
            font-size: 1.4em;
            display: inline-block;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 2px;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        /* Definition Box */
        .definition-box {
            background-color: #f4f4f4;
            padding: 8px 12px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            margin: 5px 0;
            max-width: 400px;
            text-align: left;
        }

        /* Word Styling */
        .word {
            font-weight: bold;
            color: #000000;
            font-size: 1.2em;
        }

        .example {
            margin-left: 20px;
            font-style: italic;
        }

        /* Fact Box */
        .fact-box {
            background-color: rgba(142, 68, 173, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(142, 68, 173, 0.15);
            max-width: 500px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: bold;
            padding: 8px 12px;
            display: inline-block;
            border-left: 6px solid rgba(0, 0, 0, 0.2);
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
            margin-bottom: 10px;
            color: white;
        }

        /* Section Colors */
        .purple-section {
            background-color: #8e44ad;
            border-left-color: #6a1b9a;
            box-shadow: 3px 3px 8px rgba(142, 68, 173, 0.3);
        }

        .joke-box {
            background-color: rgba(52, 152, 219, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(52, 152, 219, 0.15);
            max-width: 500px;
        }


        /* Text Formatting */
        .fact {
            color: black;
        }

        /* Joke Text */
        .joke {
            color: #6d1b9a;
            /* Deeper purple for better readability */
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Joke Question Styling */
        .joke-question {
            font-weight: bold;
            font-size: 1.2em;
            font-style: italic;
            color: #2c3e50;
            /* Dark gray-blue for a classy contrast */
            margin-bottom: 5px;
        }

        /* Enhanced Typography */
        .bold {
            font-weight: 600;
            color: #000000;
            /* Darker shade for better contrast */
        }

        .italic {
            font-style: italic;
            color: #000000;
            /* Slightly darker gray for better readability */
        }

        .bold-italic {
            font-weight: 600;
            font-style: italic;
            color: #222;
            /* More emphasis on bold-italic text */
        }

        /* Joke Box - Adds a soft neumorphic effect */
        .joke-box {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1),
                -5px -5px 10px rgba(255, 255, 255, 0.5);
            max-width: 550px;
            transition: all 0.3s ease-in-out;
        }

        /* Joke Box Hover Effect */
        .joke-box:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.6);
        }

        /* Dialogue Container - Left Centered */
        /* Dialogue Container - Auto Width Based on Content */
        .dialogue-container {
            display: inline-block;
            /* Shrinks width to fit content */
            max-width: 800px;
            /* Prevents it from becoming too wide */
            margin: 20px 0;
            /* Aligns it to the left with some spacing */
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }



        /* Individual Dialogue Lines */
        .line {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Styling for Different Speakers */
        .person-1 {
            background: linear-gradient(145deg, #dde5ed, #c9d6e2);
            text-align: left;
            color: #2c3e50;
        }

        .person-2 {
            background: linear-gradient(145deg, #d1e8ff, #b9dfff);
            text-align: left;
            color: #1d3557;
        }

        /* Speaker Name Styling */
        .speaker {
            font-weight: bold;
            margin-bottom: 5px;

            font-size: 1.1em;
            color: #000;
        }
    </style>
</head>

<body>

    <div id="left">
        <h2>Lesson Parts</h2>
        <div id="partsSection" class="part-buttons"></div>
        <div id="contentSection" class="content-buttons hidden"></div>
        <div id="displaySection"></div>
    </div>

    <div id="right">
        <!-- Reserved for later use -->
    </div>

    <script>
        // Declare json_content but do not fill it
        let json_content = {
    "parts_number": 7,
    "mistakes": {
        "mistakes_1": {
            "mistakes_list": [
                {
                    "original": "I hope you hear me well.",
                    "corrected": "I hope you can hear me well.",
                    "explanation": "Missing 'can' makes the sentence unclear; 'can' is necessary to express ability.",
                    "context": "I'm trying to communicate clearly with you over this call. I hope you can hear me well. It's important that we understand each other."
                },
                {
                    "original": "Have you been ever told that you look like Pushkin?",
                    "corrected": "Have you ever been told that you look like Pushkin?",
                    "explanation": "The word order is incorrect; 'ever' should come before 'been'.",
                    "context": "I was curious about any humorous comments you've received about your appearance. Have you ever been told that you look like Pushkin? It's an interesting resemblance."
                },
                {
                    "original": "Shave for very short cut.",
                    "corrected": "Shaved for a very short cut.",
                    "explanation": "The verb form is incorrect; it should be in the past participle for proper context.",
                    "context": "I had a very short hairstyle for quite some time. I was shaved for a very short cut, almost like a buzz cut. It was easy to maintain."
                },
                {
                    "original": "But since this year it's suddenly, somehow, I don't know.",
                    "corrected": "But since this year, it has suddenly changed, somehow.",
                    "explanation": "The original sentence is convoluted and lacks clarity; restructuring improves readability.",
                    "context": "I've been noticing changes in my hair texture. But since this year, it has suddenly changed, somehow. It's quite surprising to me."
                },
                {
                    "original": "I don't go, like, far away, actually.",

                    "explanation": "The use of 'like' is unnecessary and informal here; it can be omitted for clarity.",
                    "context": "I've been keeping my travels close to home recently. I don't go far away, actually. It's easier for me to manage my time."
                },
                {
                    "original": "First, I need to buy some stuff to cheat on GoLingo and CCA exam.",
                    "corrected": "First, I need to buy some things for the GoLingo and CCA exam.",
                    "explanation": "The term 'stuff' is informal and 'things' is more appropriate; 'to cheat on' is unclear here.",
                    "context": "There are a few important exams coming up that I need to prepare for. First, I need to buy some things for the GoLingo and CCA exam. Preparation is key."
                },
                {
                    "original": "And what else? I need to buy a suitcase because my mind is broken.",
                    "corrected": "And what else? I need to buy a suitcase because mine is broken.",
                    "explanation": "'my mind is broken' is metaphorical and confusing; 'mine' should be used for possession of the suitcase.",
                    "context": "I'm trying to get everything ready for my upcoming trip. And what else? I need to buy a suitcase because mine is broken. It's crucial for travel."
                },
                {
                    "original": "Like much, much, it's much practical.",
                    "corrected": "It's much more practical.",
                    "explanation": "The repetition 'much, much' is unnecessary; 'more' should be used for comparison.",
                    "context": "When considering how to manage my belongings, I've realized something important. It's much more practical to keep only what I really need."
                },
                {
                    "original": "It's like with socks, exactly like with socks.",
                    "corrected": "It's exactly like with socks.",
                    "explanation": "Repetition of 'like with socks' is redundant; simplifying improves clarity.",
                    "context": "I was making a comparison about losing items in everyday life. It's exactly like with socks. They tend to disappear without a trace."
                },
                {
                    "original": "I just don't like the material they like to make it from.",
                    "corrected": "I just don't like the material they make them from.",
                    "explanation": "The sentence structure is clumsy; correcting the subject makes it clearer.",
                    "context": "I've been exploring different options for clothing and accessories. I just don't like the material they make them from. It’s not comfortable at all."
                }
            ]
        },
        "mistakes_2": {
            "mistakes_list": [
                {
                    "original": "I come to Russia, it was like only once.",
                    "corrected": "I came to Russia, it was like only once.",
                    "explanation": "The verb 'come' should be in the past tense 'came' to indicate a completed action.",
                    "context": "I have traveled to various countries, but I came to Russia, and it was like only once. I haven't been back since."
                },
                {
                    "original": "Wearing off socks all the day.",
                    "corrected": "Wearing off socks all day.",
                    "explanation": "'All the day' is awkward; 'all day' is the correct idiomatic expression.",
                    "context": "In my daily life, wearing off socks all day is common for me. I need to buy more durable socks."
                },
                {
                    "original": "So like your socks wear off very often.",
                    "corrected": "So like your socks wear out very often.",
                    "explanation": "'Wear off' is incorrect in this context; the correct phrase is 'wear out', meaning to become unusable.",
                    "context": "I've noticed that my socks wear out very often. This is frustrating, so I need to find better quality socks."
                },
                {
                    "original": "I think yes.",
                    "corrected": "I think so.",
                    "explanation": "'I think yes' is not natural; 'I think so' is the correct phrase for agreement.",
                    "context": "When asked if the Duolingo test would allow cheating, I wasn't sure. I think so, but it's risky."

                {
                    "original": "They have called me and said, Paul, can we please buy, you know, a micro headphone and we will just screen share.",

                    "explanation": "The present perfect 'have called' is awkward here; simple past 'called' aligns better with the context.",
                    "context": "Friends have reached out to me asking for help. They called me and said, 'Paul, can we please buy a micro headphone and screen share?'"
                },
                {
                    "original": "That math test has a very weak protection.",

                {
                    "original": "I don't know why I always have problems with the three pronunciation.",
                    "corrected": "I don't know why I always have problems with pronouncing the threes.",
                    "explanation": "Using 'the three pronunciation' is incorrect; the gerund 'pronouncing' is needed for clarity.",
                    "context": "I've been practicing my pronunciation for English sounds. I don't know why I always have problems with pronouncing the threes."
                },
                {
                    "original": "But you asked for that yourself.",
                    "corrected": "But you asked for that yourself.",
                    "explanation": "This sentence was grammatically correct, but could be improved with clearer context.",
                    "context": "In a discussion about proving my background, I offered to provide evidence. But you asked for that yourself, so here I am."
                },
                {
                    "original": "It depends on how much I, how much effort I put into hiding it.",
                    "corrected": "It depends on how much effort I put into hiding it.",
                    "explanation": "The repetitive phrase 'how much I' is unnecessary; it should be streamlined.",
                    "context": "When discussing my accent, I realized it changes based on my awareness. It depends on how much effort I put into hiding it."
                }
            ]
        },
        "mistakes_3": {
            "mistakes_list": [
                {
                    "original": "They speak English really good.",
                    "corrected": "They speak English really well.",
                    "explanation": "\"Good\" is an adjective; it should be \"well,\" which is an adverb modifying the verb \"speak.\"",
                    "context": "In many Scandinavian countries, a lot of people are proficient in English. They speak English really well, which allows them to communicate effectively."
                },
                {
                    "original": "It is hard to track my accent.",
                    "corrected": "It is hard to recognize my accent.",

                },
                {
                    "original": "The people in Vietnam here have very big problems with that.",
                    "corrected": "The people in Vietnam have very big problems with that.",
                    "explanation": "The word \"here\" is redundant and does not fit the context as it suggests a physical location.",
                    "context": "From my experience, the people in Vietnam have very big problems with certain English sounds, especially F and S."

                {
                    "original": "Why? Because they yeah. In their I mean in their language, they don't have half of sounds like that exist in English.",

                    "explanation": "The phrase \"half of sounds like that exist\" is awkward; \"many of the sounds that exist\" is clearer and more idiomatic.",
                    "context": "I wonder why this is the case. It is because in their language, they don't have many of the sounds that exist in English."
                },
                {
                    "original": "I can distinguish Chinese from Japanese from Vietnamese.",
                    "corrected": "I can distinguish between Chinese, Japanese, and Vietnamese.",
                    "explanation": "The construction \"distinguish from...from...from...\" is incorrect; the preposition \"between\" is needed for clarity.",
                    "context": "I find it fascinating how different languages sound. I can distinguish between Chinese, Japanese, and Vietnamese."
                },
                {
                    "original": "It's kind of fine.",
                    "corrected": "It's kind of okay.",
                    "explanation": "\"Fine\" can create confusion as it implies something of quality; \"okay\" fits better to describe acceptability.",
                    "context": "As we talk about accents, it seems to me that having an accent is kind of okay and doesn't hinder communication."
                },
                {
                    "original": "They sound like an Indian.",
                    "corrected": "They sound like Indians.",
                    "explanation": "Using singular 'an Indian' incorrectly generalizes the group; it should be plural 'Indians' to refer to multiple people.",
                    "context": "When I meet individuals from certain countries, I notice they sound like Indians."
                },
                {
                    "original": "A lot of very small areas with pain.",
                    "corrected": "A lot of very small areas of pain.",
                    "explanation": "The preposition \"with\" is incorrect; \"of\" is needed to properly indicate the relationship to pain.",
                    "context": "After experiencing numbness, I feel a lot of very small areas of pain in my leg, which can be quite uncomfortable."
                },
                {
                    "original": "Try to express the idea of a golka.",
                    "corrected": "Try to express the idea of a 'golka.'",
                    "explanation": "The original sentence lacks quotation marks around the word 'golka,' making it unclear that it is a term being defined.",
                    "context": "In exploring new vocabulary, try to express the idea of a 'golka' so we can clarify its meaning."
                }
            ]
        },
        "mistakes_4": {
            "mistakes_list": [
                {
                    "original": "I have another question for chat.",
                    "corrected": "I have another question for the chat.",
                    "explanation": "The article 'the' is needed before 'chat' to indicate a specific instance of chat.",
                    "context": "When discussing terminology related to needles, I wanted to clarify something. I have another question for the chat. What is the name of the tool doctors use for injections?"
                },
                {
                    "original": "It's called a tie.",
                    "corrected": "It's called a thigh.",
                    "explanation": "'Tie' is incorrect in this context; the proper term for the area of the leg is 'thigh.'",
                    "context": "As I was pointing out parts of the leg anatomy, I mentioned a specific area. It's called a thigh; you know, the upper part of your leg."
                },
                {
                    "original": "I actually whenever.",
                    "corrected": "Actually, whenever I.",

                    "context": "When using resources for learning, I often refer to online dictionaries. Actually, whenever I look up new words, I have a dictionary open."
                },
                {
                    "original": "Food is constantly gets stuck.",

                    "context": "During my conversation with a student about dental issues, I noted a common problem. Food constantly gets stuck in the holes left by missing teeth."
                },
                {
                    "original": "He looked at this hole.",
                    "corrected": "He looked at the hole.",
                    "explanation": "The determiner 'the' is needed to specify the particular hole being discussed.",
                    "context": "When recounting my experience at the dentist, I described what happened during my visit. He looked at the hole and assessed the situation."
                },
                {
                    "original": "It's the substance the special substance.",
                    "corrected": "It's a special substance.",
                    "explanation": "The phrase 'the special substance' is redundant; 'a special substance' conveys the meaning succinctly.",
                    "context": "In the context of my dental treatment, I was explaining what was used to alleviate inflammation. It's a special substance that helps remove the inflammation."
                },
                {
                    "original": "I was I was searching for the word.",
                    "corrected": "I was searching for the word.",

                    "context": "While narrating my dental experiences, I recalled some vocabulary I didn't know. I was searching for the word plunger."
                },
                {
                    "original": "If you don't know how to call something to say thing.",

                    "explanation": "The phrasing is awkward; a comma is needed for clarity and 'to say thing' should be adjusted to 'say 'thing.''",
                    "context": "I was sharing tips on how to communicate when you're unsure about vocabulary. If you don't know how to call something, say 'thing' instead."
                },
                {
                    "original": "I'm a person who's handicapped.",

                    "explanation": "'Handicapped' is outdated and considered offensive; 'person with a disability' is more appropriate.",
                    "context": "During our discussion on politically correct language, I reflected on my perspective. I'm a person with a disability, and I prefer not to use outdated terms."
                }
            ]
        },
        "mistakes_5": {
            "mistakes_list": [
                {
                    "original": "I very often I would open a book I would see a new word I would look it up and I would look at another unknown word and then more and more and more and then after like five hours your head is your your hand is you have a temperature.",

                    "explanation": "The use of 'I would' is incorrect for a habitual action in the present; it should just be 'I open.' Additionally, the sentence structure is overly complicated and needs to be broken down for clarity.",

                {
                    "original": "For your body it's really important to synchronize with the sun and also to keep your sleep schedule fixed.",
                    "corrected": "For your body, it's really important to synchronize with the sun and to keep your sleep schedule fixed.",

                },
                {

            // Set parts_number from json_content
            let parts_number = json_content.parts_number || 0;

        // References to sections
        const partsSection = document.getElementById('partsSection');
        const contentSection = document.getElementById('contentSection');
        const displaySection = document.getElementById('displaySection');

        let activePart = null; // Track the active part

        // Function to create Part buttons
        function createPartButtons() {
            for (let i = 1; i <= parts_number; i++) {
                let button = document.createElement("button");
                button.textContent = "Part " + i;
                button.onclick = () => showContentButtons(i, button);
                partsSection.appendChild(button);
            }
        }

        // Function to show Mistakes, Vocabulary, and Dialogue buttons
        function showContentButtons(part, button) {
            // Reset previous part selection
            document.querySelectorAll(".part-buttons button").forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");

            // Clear previous content buttons and displayed content
            contentSection.innerHTML = "";
            contentSection.classList.remove("hidden");
            displaySection.innerHTML = "";

            activePart = part; // Update active part

            let sections = ["Mistakes", "Vocabulary", "Dialogue"];
            sections.forEach(section => {
                let secButton = document.createElement("button");
                secButton.textContent = section;
                secButton.onclick = () => {
                    secButton.classList.add("loading"); // Add flashing effect
                    displayContent(section, part, secButton);
                };
                contentSection.appendChild(secButton);
            });
        }

        // Function to display selected content
        function displayContent(type, part, button) {
            let dataKey = type.toLowerCase(); // "mistakes", "vocabulary", "dialogue"
            let partKey = dataKey + "_" + part; // e.g., "mistakes_1"

            if (json_content[dataKey] && json_content[dataKey][partKey]) {
                let contentData = json_content[dataKey][partKey];

                if (dataKey === "mistakes") {
                    appendContent(displayMistakes(contentData), part, type, button);
                } else if (dataKey === "vocabulary") {
                    appendContent(displayVocabulary(contentData), part, type, button);
                } else if (dataKey === "dialogue") {
                    appendContent(displayDialogue(contentData), part, type, button);
                }
            }
        }

        // Append content while keeping existing sections
        function appendContent(html, part, type, button) {
            let sectionID = `part${part}-${type}`;
            let existingSection = document.getElementById(sectionID);

            if (!existingSection) {
                let newSection = document.createElement("div");
                newSection.id = sectionID;
                newSection.classList.add("section-content");
                newSection.innerHTML = html;
                displaySection.appendChild(newSection);

                // Remove animation, keep the button highlighted
                button.classList.remove("loading");
                button.classList.add("active");
            }
        }

        // Function to display Mistakes content
        function displayMistakes(data) {
            let html = "<h3>Mistakes</h3>";
            data.mistakes_list.forEach(mistake => {
                html += `<p><b>Original:</b> ${mistake.original}</p>`;
                html += `<p><b>Corrected:</b> <b> ${mistake.corrected}</b></p>`;
                html += `<p><b>Explanation:</b> ${mistake.explanation}</p>`;
                html += `<p><b>Context:</b> <i> ${mistake.context}</i></p>`;
                html += `<hr><br>`; /* Adds an extra blank line */
            });
            return html;
        }





        // Function to display Vocabulary content
        function displayVocabulary(data) {
            let html = "<h3>Vocabulary</h3>";

            // Helper function: Preserve case in context replacement
            function formatContextSentence(sentence, word) {
                const regex = new RegExp(`\\b${word}\\b`, "gi"); // Case-insensitive exact word match
                return sentence.replace(regex, (match) => {
                    return `<span class="bold-italic">${match}</span>`; // Keeps match's case
                });
            }

            // Vocabulary Section
            data.vocabulary_list.forEach((entry, index) => {
                // Word Entry
                html += `<p class="entry-box"> <span class="word">${index + 1}. ${entry.word}</span></p>`;

                // Definition Box
                html += `<div class="definition-box"><span class="bold">Definition:</span> ${entry.definition}</div>`;

                // Context Sentences
                html += "<p>";
                Object.values(entry.context).forEach((sentence, i) => {
                    const formattedSentence = formatContextSentence(sentence, entry.word);
                    html += `<br><span class="bold">Context ${i + 1}:</span> <span class="italic">${formattedSentence}</span>`;
                });
                html += "</p>";
            });

            // Funny Facts Section
            if (data.funny_facts.length > 0) {
                html += `<div class="section-title purple-section">Funny Facts</div>`;
                data.funny_facts.forEach((fact, index) => {
                    html += `<div class="fact-box">
                <p class="fact"><span class="bold">${index + 1}. ${fact.word}:</span> ${fact.fact}</p>
             </div>`;
                });
            }

            // Jokes Section
            if (data.jokes.length > 0) {
                html += `<div class="section-title purple-section">Jokes</div>`;
                data.jokes.forEach((joke, index) => {
                    html += `<div class="joke-box">
                <p class="joke-question">${index + 1}. ${joke.question}</p>
                <p class="italic joke">${joke.answer}</p>
             </div>`;
                });
            }

            return html; // Returning the generated HTML instead of inserting it directly
        }

        function displayDialogue(data) {
            let html = `<div class="dialogue-container">`;
            html += "<h3>Dialogue</h3>";

            data.dialogue_list.forEach(entry => {
                const speaker = Object.keys(entry)[0];
                const line = entry[speaker];

                html += `<div class="line ${speaker === "Person 1" ? 'person-1' : 'person-2'}">
                    <span class="speaker">${speaker}:</span> ${line}
                 </div>`;
            });

            html += `</div>`;
            return html;
        }





        // Initialize part buttons
        createPartButtons();
    </script>

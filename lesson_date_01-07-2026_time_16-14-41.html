<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Parts</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            color: #444;
            background: linear-gradient(145deg, #eaeaea, #ffffff);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset 2px 2px 4px rgba(0, 0, 0, 0.05),
                inset -2px -2px 4px rgba(255, 255, 255, 0.4);
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        h3 {
            font-size: 50px;
            font-weight: bold;
        }



        #left {
            width: 100%;
            padding: 20px;
            border-right: 2px solid #ccc;
        }

        #right {
            display: none background-color: #f4f4f4;
        }

        .part-buttons,
        .content-buttons {
            margin-bottom: 10px;
        }

        .part-buttons button,
        .content-buttons button {
            margin-right: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .part-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        .content-buttons button.loading {
            animation: flash 0.5s infinite alternate;
        }

        .content-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        @keyframes flash {
            0% {
                background-color: #ffd700;
            }

            100% {
                background-color: #ffa500;
            }
        }

        .hidden {
            display: none;
        }

        .section-content {
            margin-top: 1px;
            padding: 30px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        /* Vocabulary Entry */
        .entry-box {
            font-weight: bold;
            font-size: 1.4em;
            display: inline-block;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 2px;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        /* Definition Box */
        .definition-box {
            background-color: #f4f4f4;
            padding: 8px 12px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            margin: 5px 0;
            max-width: 400px;
            text-align: left;
        }

        /* Word Styling */
        .word {
            font-weight: bold;
            color: #000000;
            font-size: 1.2em;
        }

        .example {
            margin-left: 20px;
            font-style: italic;
        }

        /* Fact Box */
        .fact-box {
            background-color: rgba(142, 68, 173, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(142, 68, 173, 0.15);
            max-width: 500px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: bold;
            padding: 8px 12px;
            display: inline-block;
            border-left: 6px solid rgba(0, 0, 0, 0.2);
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
            margin-bottom: 10px;
            color: white;
        }

        /* Section Colors */
        .purple-section {
            background-color: #8e44ad;
            border-left-color: #6a1b9a;
            box-shadow: 3px 3px 8px rgba(142, 68, 173, 0.3);
        }

        .joke-box {
            background-color: rgba(52, 152, 219, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(52, 152, 219, 0.15);
            max-width: 500px;
        }


        /* Text Formatting */
        .fact {
            color: black;
        }

        /* Joke Text */
        .joke {
            color: #6d1b9a;
            /* Deeper purple for better readability */
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Joke Question Styling */
        .joke-question {
            font-weight: bold;
            font-size: 1.2em;
            font-style: italic;
            color: #2c3e50;
            /* Dark gray-blue for a classy contrast */
            margin-bottom: 5px;
        }

        /* Enhanced Typography */
        .bold {
            font-weight: 600;
            color: #000000;
            /* Darker shade for better contrast */
        }

        .italic {
            font-style: italic;
            color: #000000;
            /* Slightly darker gray for better readability */
        }

        .bold-italic {
            font-weight: 600;
            font-style: italic;
            color: #222;
            /* More emphasis on bold-italic text */
        }

        /* Joke Box - Adds a soft neumorphic effect */
        .joke-box {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1),
                -5px -5px 10px rgba(255, 255, 255, 0.5);
            max-width: 550px;
            transition: all 0.3s ease-in-out;
        }

        /* Joke Box Hover Effect */
        .joke-box:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.6);
        }

        /* Dialogue Container - Left Centered */
        /* Dialogue Container - Auto Width Based on Content */
        .dialogue-container {
            display: inline-block;
            /* Shrinks width to fit content */
            max-width: 800px;
            /* Prevents it from becoming too wide */
            margin: 20px 0;
            /* Aligns it to the left with some spacing */
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }



        /* Individual Dialogue Lines */
        .line {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Styling for Different Speakers */
        .person-1 {
            background: linear-gradient(145deg, #dde5ed, #c9d6e2);
            text-align: left;
            color: #2c3e50;
        }

        .person-2 {
            background: linear-gradient(145deg, #d1e8ff, #b9dfff);
            text-align: left;
            color: #1d3557;
        }

        /* Speaker Name Styling */
        .speaker {
            font-weight: bold;
            margin-bottom: 5px;

            font-size: 1.1em;
            color: #000;
        }
    </style>
</head>

<body>

    <div id="left">
        <h2>Lesson Parts</h2>
        <div id="partsSection" class="part-buttons"></div>
        <div id="contentSection" class="content-buttons hidden"></div>
        <div id="displaySection"></div>
    </div>

    <div id="right">
        <!-- Reserved for later use -->
    </div>

    <script>
        // Declare json_content but do not fill it
        let json_content = {
    "parts_number": 8,
    "mistakes": {
        "mistakes_1": {
            "mistakes_list": [
                {
                    "original": "I'm almost without my background on.",
                    "corrected": "I don't have my background on.",
                    "explanation": "'Almost without' is unclear; 'don't have' conveys the intended meaning more accurately.",
                    "context": "I'm currently in my apartment, and I don't have my background on. It allows you to enjoy the space around me."
                },
                {
                    "original": "I just think, and with a face full of, you know, like very confident faces, even when they ask, you know, nonsense, I think, okay, let me, just give me this list of your questions.",
                    "corrected": "I just think with a very confident face, even when they ask nonsense, and I say, okay, just give me your list of questions.",
                    "explanation": "Unnecessary fillers and repetition clutter the sentence; simplifying it improves clarity.",
                    "context": "When I sit for speaking exams, I think with a very confident face, even when they ask nonsense. I typically request a list of their questions."
                },
                {
                    "original": "I remained there.",
                    "corrected": "I stayed there.",
                    "explanation": "'Remained' is not typically used in this context; 'stayed' is more appropriate for indicating presence at a location.",
                    "context": "I remember my exam experience vividly. I stayed there to see how my sister performed and compared her scores."
                },
                {
                    "original": "I had only two mistakes in the reading section.",
                    "corrected": "I only made two mistakes in the reading section.",
                    "explanation": "The phrasing should focus on the action of making mistakes rather than having them; 'made' is the correct verb.",
                    "context": "I was proud of my performance. I only made two mistakes in the reading section during my exam."
                },
                {
                    "original": "So our dad spent. Too much dopamine.",
                    "corrected": "So our dad spent too much money.",
                    "explanation": "The term 'dopamine' is inappropriate here; 'money' is the intended context.",
                    "context": "Celebrating my sister’s achievements, our dad spent too much money on restaurants this month. We really enjoyed ourselves."
                },
                {
                    "original": "You're celebrating for like a week in a row.",
                    "corrected": "You're celebrating for a week in a row.",
                    "explanation": "The phrase 'for like' is informal and unnecessary; 'for' alone suffices.",
                    "context": "During festive occasions, you typically end up celebrating for a week in a row. It's overwhelming and delightful at the same time."
                },
                {
                    "original": "It didn't feel too much.",
                    "corrected": "It didn't feel overwhelming.",
                    "explanation": "The phrase is vague; 'overwhelming' better conveys the intended meaning.",
                    "context": "Despite all the celebrations, it didn't feel overwhelming. I'm genuinely proud of my sister for her achievements."
                },
                {
                    "original": "I had the millions of doubts about this all.",
                    "corrected": "I had millions of doubts about all this.",
                    "explanation": "The article 'the' is unnecessary; 'millions of doubts' is correctly expressed without it.",
                    "context": "As I thought about traveling, I had millions of doubts about all this. It made me reconsider the trip."
                },
                {
                    "original": "He's not even my friend. He's more like a acquaintance.",
                    "corrected": "He's not even my friend; he's more like an acquaintance.",
                    "explanation": "'A acquaintance' is grammatically incorrect; it should be 'an acquaintance,' and a semicolon improves structure.",
                    "context": "The people I was meant to travel with are not familiar to me. One guy is not even my friend; he's more like an acquaintance."
                },
                {
                    "original": "Are they from Rostov?",
                    "corrected": "Are they from Rostov?",
                    "explanation": "The question structure is appropriate; however, the intent could be clearer with more context.",
                    "context": "I learned one of the travelers is from Rostov. Are they really all from there?"
                },
                {
                    "original": "I have never even met them in my life.",
                    "corrected": "I've never even met them in my life.",
                    "explanation": "Using the contraction 'I've' makes the sentence more natural in conversational English.",
                    "context": "With two other travelers being strangers, I've never even met them in my life, which makes me hesitant to travel with them."
                }
            ]
        },
        "mistakes_2": {
            "mistakes_list": [
                {
                    "original": "Okay, it is a sign.",
                    "corrected": "Okay, it’s a sign.",
                    "explanation": "The contraction 'it’s' is more appropriate than 'it is' in informal conversation for smoother speech.",
                    "context": "The price of my desired item started to rise rapidly. Okay, it’s a sign. I felt like it was time to reconsider my options."
                },
                {
                    "original": "Speak your Spanish language without me.",
                    "corrected": "Speak your Spanish without me.",
                    "explanation": "The phrase 'Spanish language' is redundant; 'Spanish' alone suffices.",
                    "context": "I was frustrated with the lack of planning for the trip. Speak your Spanish without me. I just didn't want to be involved anymore."
                },
                {
                    "original": "But another is basically a combination of two words, N plus other.",
                    "corrected": "But 'another' is basically a combination of two words, 'an' plus 'other.'",
                    "explanation": "The article should be 'an' not 'N'; it clarifies the construction of the word 'another.'",
                    "context": "We were discussing the grammatical rules for using 'another.' But 'another' is basically a combination of two words, 'an' plus 'other.' I wanted to clarify the point."
                },
                {
                    "original": "I have one more information for you.",
                    "corrected": "I have one more piece of information for you.",
                    "explanation": "‘Information’ is uncountable, and requires a quantifier like 'piece' to make it countable.",
                    "context": "In our discussion about uncountable nouns, I confused the term. I have one more piece of information for you. I had mixed up how to use 'information' correctly."
                },
                {
                    "original": "So there are some applications where you can find language practice or partners for language practice, whatever language you're studying.",
                    "corrected": "So there are some applications where you can find language partners for practice, whatever language you're studying.",
                    "explanation": "The phrase could be simplified by removing repetitive use of 'language practice.'",
                    "context": "I was explaining how I engage with language learning apps. So there are some applications where you can find language partners for practice, whatever language you're studying. They help connect users."
                },
                {
                    "original": "I had like no idea who this guy was.",
                    "corrected": "I had no idea who this guy was.",
                    "explanation": "The word 'like' is unnecessary and informal; it should be removed for clarity.",
                    "context": "During my language practice, I encountered someone unfamiliar. I had no idea who this guy was. This surprised me as I had joined the room."
                }
            ]
        },
        "mistakes_3": {
            "mistakes_list": [
                {
                    "original": "But in general, this feeling that I can speak something else but English or no, something other than English, it seems great.",
                    "corrected": "But in general, this feeling that I can speak something else other than English seems great.",
                    "explanation": "'Something else but' is incorrect; the correct phrase is 'something else other than.'",
                    "context": "I find it exhilarating to communicate in different languages. But in general, this feeling that I can speak something else other than English seems great. It's an exciting new experience."
                },
                {
                    "original": "it's that I spend most of time among English speaking people",
                    "corrected": "it's that I spend most of my time among English-speaking people",
                    "explanation": "The phrase should be 'most of my time' to indicate possession and 'English-speaking' needs a hyphen as it is a compound adjective.",
                    "context": "I often reflect on my language skills. It's that I spend most of my time among English-speaking people. This immersion makes me feel less special about knowing Russian."
                },
                {
                    "original": "It's a, you have to be devoted.",
                    "corrected": "It's something you have to be devoted to.",
                    "explanation": "The sentence is missing a crucial preposition; 'to' is required after 'devoted.'",
                    "context": "I believe learning a language requires commitment. It's something you have to be devoted to. Without that, the learning process can be superficial."
                },
                {
                    "original": "you want mountains, just go to Maine.",
                    "corrected": "If you want mountains, just go to Maine.",
                    "explanation": "The conditional phrase needs 'If' at the beginning to indicate a hypothetical situation.",
                    "context": "When discussing travel preferences, I often question Americans' reluctance to visit Europe. If you want mountains, just go to Maine. There's a lot to explore right here."
                }
            ]
        },
        "mistakes_4": {
            "mistakes_list": [
                {
                    "original": "You get used to that system. And after that, it's just form, but every time you use it, it gives you so much meaning. And you can express your ideas in a much shorter way.",
                    "corrected": "You get used to that system. After that, it's just a formality, but every time you use it, it gives you so much meaning.",
                    "explanation": "\"just form\" is non-idiomatic; say \"a formality\" or \"a matter of form.\"",
                    "context": "You get used to that system. After that, it's just a formality, but every time you use it, it gives you so much meaning. And you can express your ideas in a much shorter way."
                },
                {
                    "original": "It's like in English, yeah, like, sobaki, yeah? And you have to say like to the dog. And in some cases, it's really hard.",
                    "corrected": "It's like in English, like 'sobaki' — you have to say 'to the dog'. And in some cases, it's really hard.",
                    "explanation": "Missing quotation/marker and awkward phrasing; clarify the phrase and use quoted example \"'to the dog'.\"",
                    "context": "It's like in English, like 'sobaki' — you have to say 'to the dog'. And in some cases, it's really hard."
                },
                {
                    "original": "Well, but in English, it's also quite understandable if you use the right preposition. So, and the context helps you as well, so.",
                    "corrected": "Well, in English it's also quite understandable if you use the right preposition. And the context helps you as well.",
                    "explanation": "Redundant and clipped ending; remove extra 'so' and tighten the sentence.",
                    "context": "Well, in English it's also quite understandable if you use the right preposition. And the context helps you as well. I'm actually enjoying it because it makes my brain work."
                },
                {
                    "original": "But okay, but I am enjoying it actually, that it makes my brain work.",
                    "corrected": "I'm actually enjoying it because it makes my brain work.",
                    "explanation": "Wrong connector and word order; use 'because' to show reason and contract for natural speech.",
                    "context": "And the context helps you as well. I'm actually enjoying it because it makes my brain work. It's pretty awesome."
                },
                {
                    "original": "I don't speak this language yet. I'm just learning the basics so far, but.",
                    "corrected": "I don't speak this language yet. I'm just learning the basics so far.",
                    "explanation": "Trailing 'but' creates a sentence fragment; remove it or complete the clause.",
                    "context": "It's pretty awesome, yeah. I don't speak this language yet. I'm just learning the basics so far."
                },
                {
                    "original": "Actually, German is the language I know, is the, of all the languages I know, apart from English, German is the best I know.",
                    "corrected": "Of all the languages I know, apart from English, German is the one I know best.",
                    "explanation": "Very repetitive and awkward word order; restructure to a simple comparative clause.",
                    "context": "I'm just learning the basics so far. Of all the languages I know, apart from English, German is the one I know best. The first year of college we focused on German."
                },
                {
                    "original": "Because like literally, the first year of college, we didn't do anything but learning German.",
                    "corrected": "Because literally, in the first year of college we didn't do anything but learn German.",
                    "explanation": "After 'do anything but' use base verb form 'learn' (not gerund).",
                    "context": "Of all the languages I know, apart from English, German is the one I know best. Because literally, in the first year of college we didn't do anything but learn German. That was the only thing we did for 10 hours per week."
                },
                {
                    "original": "Oh, and you learned German? Yeah. Studied in finance.",
                    "corrected": "Oh, and you learned German? Yeah. I studied finance.",
                    "explanation": "Sentence fragment; include subject 'I' and correct verb form.",
                    "context": "Oh, and you learned German? Yeah. I studied finance. My major was international finance."
                },
                {
                    "original": "It was, my university was technically about economics, but all we did there was just learning languages.",
                    "corrected": "It was technically an economics university, but all we did there was just learn languages.",
                    "explanation": "Awkward phrasing and gerund after 'did'; use base verb 'learn'.",
                    "context": "I studied finance. It was technically an economics university, but all we did there was just learn languages. I hated every single lesson; it was so boring."
                },
                {
                    "original": "Yeah, and I hated, I hated the, I hated every single lesson of it, it was so boring.",
                    "corrected": "Yeah, I hated every single lesson; it was so boring.",
                    "explanation": "Redundant repetitions and comma splice; remove repetition and separate clauses properly.",
                    "context": "It was technically an economics university, but all we did there was just learn languages. Yeah, I hated every single lesson; it was so boring. I wasn't motivated."
                },
                {
                    "original": "Yeah, but German is the language, I'm the least motivated to study right now.",
                    "corrected": "Yeah, but German is the language I'm least motivated to study right now.",
                    "explanation": "Wrong comma and article; remove comma and 'the' for correct comparative structure.",
                    "context": "I wasn't motivated. Yeah, but German is the language I'm least motivated to study right now. I've met so many Germans and they all speak English."
                },
                {
                    "original": "Yo te digo, es un idioma más precioso del mundo.",
                    "corrected": "Yo te digo, es el idioma más precioso del mundo.",
                    "explanation": "Missing definite article in Spanish; use 'el idioma más precioso del mundo.'",
                    "context": "That's why, Marika, you need to learn Spanish. Yo te digo, es el idioma más precioso del mundo. You should try it."
                },
                {
                    "original": "Yeah, yeah, es preciosa. Es preciosa del mundo, a lot of people in the world speak it, right?",
                    "corrected": "It's the most beautiful language in the world; a lot of people in the world speak it, right?",
                    "explanation": "Mixed Spanish/English error and incorrect Spanish phrase; give a clear English equivalent.",
                    "context": "Yo te digo, es el idioma más precioso del mundo. It's the most beautiful language in the world; a lot of people in the world speak it, right? I like how it sounds."
                },
                {
                    "original": "I know this word because I learned French. In French, like a lot of vocabulary in those Romance languages, they are like, they, yeah, they're the same.",
                    "corrected": "I know this word because I learned French. A lot of vocabulary in the Romance languages is the same.",
                    "explanation": "Wordy and ungrammatical; use singular verb 'is' with 'a lot of vocabulary' and tighten phrasing.",
                    "context": "I know this word because I learned French. A lot of vocabulary in the Romance languages is the same. That's why I recognized 'mundo'."
                },
                {
                    "original": "What? You know, I like people who like, when you ask them your age, they say, what do you reckon?",
                    "corrected": "What? You know, I like people who, when you ask them their age, say, 'What do you reckon?'",
                    "explanation": "Pronoun error: use 'their age' (not 'your') and fix word order/quoting.",
                    "context": "Can I ask how old you actually are? What? You know, I like people who, when you ask them their age, say, 'What do you reckon?' It's like a little game."
                },
                {
                    "original": "I just thought maybe you like are older than 24, but just this Vietnamese humid climate makes you look younger than you actually are.",
                    "corrected": "I just thought maybe you are older than 24, but this humid Vietnamese climate makes you look younger than you actually are.",
                    "explanation": "Unnecessary filler 'like' and awkward adjective order; say 'humid Vietnamese climate.'",
                    "context": "You don't look old. I just thought maybe you are older than 24, but this humid Vietnamese climate makes you look younger than you actually are. You found a nice way to avoid the question."
                },
                {
                    "original": "You found a nice way to get from this question.",
                    "corrected": "You found a nice way to get out of this question.",
                    "explanation": "Wrong phrasal verb; use 'get out of' (avoid) or 'get away from'.",
                    "context": "I just thought maybe you are older than 24, but this humid Vietnamese climate makes you look younger than you actually are. You found a nice way to get out of this question. Thank you."
                },
                {
                    "original": "And you know, a thing about, you haven't traveled before, have you? I have, I have traveled just with my parents, but I've been to Belarus...",
                    "corrected": "And you know, you haven't traveled before, have you? I have — I've only traveled with my parents, but I've been to Belarus...",
                    "explanation": "Word order and placement of 'just'/'only'; use 'I've only traveled with my parents.'",
                    "context": "You haven't traveled before, have you? I have — I've only traveled with my parents, but I've been to Belarus, Bulgaria and Turkey. I wasn't in charge of those trips."
                },
                {
                    "original": "No, no. I only traveled independently inside of Russia a lot.",
                    "corrected": "No, no. I have traveled a lot independently within Russia.",
                    "explanation": "Tense/word order: 'have traveled' with 'a lot' and 'within Russia' is more natural.",
                    "context": "But you never were in charge of those trips, right? No, no. I have traveled a lot independently within Russia. I did my own trips inside the country."
                },
                {
                    "original": "So, did you read the, how is it called? The marking list? Yeah, okay. The file you sent me before the lesson.",
                    "corrected": "So, did you read the — what's it called? The marking list? The file you sent me before the lesson.",
                    "explanation": "Non-native phrasing 'how is it called?' — use 'what's it called?' or 'what is it called?'.",
                    "context": "So, did you read the — what's it called? The marking list? The file you sent me before the lesson."
                },
                {
                    "original": "so actually, no, I didn't take a look at this, because when you sent me this, I was having my own lesson, so I didn't see it, and then it was too late. Okay. To actually open it, but let's do it now.",
                    "corrected": "So actually, no, I didn't take a look at it, because when you sent it I was having my own lesson and didn't see it, and then it was too late to actually open it, but let's do it now.",
                    "explanation": "Fragmented sentences and misplaced clauses; combine into one coherent sentence and remove stray fragments.",
                    "context": "You sent me this before the lesson, but I didn't take a look at it because I was having my own lesson. It was too late to actually open it, but let's do it now."
                },
                {
                    "original": "But it's really useful, because this is the only thing Examiner uses when they judge your essay, when they mark it.",
                    "corrected": "But it's really useful, because this is the only thing the examiner uses when they judge your essay.",
                    "explanation": "Missing article before 'Examiner' and redundant clause; use 'the examiner' and simplify.",
                    "context": "This marking list is useful. But it's really useful, because this is the only thing the examiner uses when they judge your essay. So you should check it."
                },
                {
                    "original": "Yeah, and as you can see there, it is all written in this form of kind of like what you show, yeah? Not what you actually have in your essay.",

            // Set parts_number from json_content
            let parts_number = json_content.parts_number || 0;

        // References to sections
        const partsSection = document.getElementById('partsSection');
        const contentSection = document.getElementById('contentSection');
        const displaySection = document.getElementById('displaySection');

        let activePart = null; // Track the active part

        // Function to create Part buttons
        function createPartButtons() {
            for (let i = 1; i <= parts_number; i++) {
                let button = document.createElement("button");
                button.textContent = "Part " + i;
                button.onclick = () => showContentButtons(i, button);
                partsSection.appendChild(button);
            }
        }

        // Function to show Mistakes, Vocabulary, and Dialogue buttons
        function showContentButtons(part, button) {
            // Reset previous part selection
            document.querySelectorAll(".part-buttons button").forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");

            // Clear previous content buttons and displayed content
            contentSection.innerHTML = "";
            contentSection.classList.remove("hidden");
            displaySection.innerHTML = "";

            activePart = part; // Update active part

            let sections = ["Mistakes", "Vocabulary", "Dialogue"];
            sections.forEach(section => {
                let secButton = document.createElement("button");
                secButton.textContent = section;
                secButton.onclick = () => {
                    secButton.classList.add("loading"); // Add flashing effect
                    displayContent(section, part, secButton);
                };
                contentSection.appendChild(secButton);
            });
        }

        // Function to display selected content
        function displayContent(type, part, button) {
            let dataKey = type.toLowerCase(); // "mistakes", "vocabulary", "dialogue"
            let partKey = dataKey + "_" + part; // e.g., "mistakes_1"

            if (json_content[dataKey] && json_content[dataKey][partKey]) {
                let contentData = json_content[dataKey][partKey];

                if (dataKey === "mistakes") {
                    appendContent(displayMistakes(contentData), part, type, button);
                } else if (dataKey === "vocabulary") {
                    appendContent(displayVocabulary(contentData), part, type, button);
                } else if (dataKey === "dialogue") {
                    appendContent(displayDialogue(contentData), part, type, button);
                }
            }
        }

        // Append content while keeping existing sections
        function appendContent(html, part, type, button) {
            let sectionID = `part${part}-${type}`;
            let existingSection = document.getElementById(sectionID);

            if (!existingSection) {
                let newSection = document.createElement("div");
                newSection.id = sectionID;
                newSection.classList.add("section-content");
                newSection.innerHTML = html;
                displaySection.appendChild(newSection);

                // Remove animation, keep the button highlighted
                button.classList.remove("loading");
                button.classList.add("active");
            }
        }

        // Function to display Mistakes content
        function displayMistakes(data) {
            let html = "<h3>Mistakes</h3>";
            data.mistakes_list.forEach(mistake => {
                html += `<p><b>Original:</b> ${mistake.original}</p>`;
                html += `<p><b>Corrected:</b> <b> ${mistake.corrected}</b></p>`;
                html += `<p><b>Explanation:</b> ${mistake.explanation}</p>`;
                html += `<p><b>Context:</b> <i> ${mistake.context}</i></p>`;
                html += `<hr><br>`; /* Adds an extra blank line */
            });
            return html;
        }





        // Function to display Vocabulary content
        function displayVocabulary(data) {
            let html = "<h3>Vocabulary</h3>";

            // Helper function: Preserve case in context replacement
            function formatContextSentence(sentence, word) {
                const regex = new RegExp(`\\b${word}\\b`, "gi"); // Case-insensitive exact word match
                return sentence.replace(regex, (match) => {
                    return `<span class="bold-italic">${match}</span>`; // Keeps match's case
                });
            }

            // Vocabulary Section
            data.vocabulary_list.forEach((entry, index) => {
                // Word Entry
                html += `<p class="entry-box"> <span class="word">${index + 1}. ${entry.word}</span></p>`;

                // Definition Box
                html += `<div class="definition-box"><span class="bold">Definition:</span> ${entry.definition}</div>`;

                // Context Sentences
                html += "<p>";
                Object.values(entry.context).forEach((sentence, i) => {
                    const formattedSentence = formatContextSentence(sentence, entry.word);
                    html += `<br><span class="bold">Context ${i + 1}:</span> <span class="italic">${formattedSentence}</span>`;
                });
                html += "</p>";
            });

            // Funny Facts Section
            if (data.funny_facts.length > 0) {
                html += `<div class="section-title purple-section">Funny Facts</div>`;
                data.funny_facts.forEach((fact, index) => {
                    html += `<div class="fact-box">
                <p class="fact"><span class="bold">${index + 1}. ${fact.word}:</span> ${fact.fact}</p>
             </div>`;
                });
            }

            // Jokes Section
            if (data.jokes.length > 0) {
                html += `<div class="section-title purple-section">Jokes</div>`;
                data.jokes.forEach((joke, index) => {
                    html += `<div class="joke-box">
                <p class="joke-question">${index + 1}. ${joke.question}</p>
                <p class="italic joke">${joke.answer}</p>
             </div>`;
                });
            }

            return html; // Returning the generated HTML instead of inserting it directly
        }

        function displayDialogue(data) {
            let html = `<div class="dialogue-container">`;
            html += "<h3>Dialogue</h3>";

            data.dialogue_list.forEach(entry => {
                const speaker = Object.keys(entry)[0];
                const line = entry[speaker];

                html += `<div class="line ${speaker === "Person 1" ? 'person-1' : 'person-2'}">
                    <span class="speaker">${speaker}:</span> ${line}
                 </div>`;
            });

            html += `</div>`;
            return html;
        }





        // Initialize part buttons
        createPartButtons();
    </script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Parts</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            color: #444;
            background: linear-gradient(145deg, #eaeaea, #ffffff);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset 2px 2px 4px rgba(0, 0, 0, 0.05),
                inset -2px -2px 4px rgba(255, 255, 255, 0.4);
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        h3 {
            font-size: 50px;
            font-weight: bold;
        }



        #left {
            width: 100%;
            padding: 20px;
            border-right: 2px solid #ccc;
        }

        #right {
            display: none background-color: #f4f4f4;
        }

        .part-buttons,
        .content-buttons {
            margin-bottom: 10px;
        }

        .part-buttons button,
        .content-buttons button {
            margin-right: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .part-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        .content-buttons button.loading {
            animation: flash 0.5s infinite alternate;
        }

        .content-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        @keyframes flash {
            0% {
                background-color: #ffd700;
            }

            100% {
                background-color: #ffa500;
            }
        }

        .hidden {
            display: none;
        }

        .section-content {
            margin-top: 1px;
            padding: 30px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        /* Vocabulary Entry */
        .entry-box {
            font-weight: bold;
            font-size: 1.4em;
            display: inline-block;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 2px;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        /* Definition Box */
        .definition-box {
            background-color: #f4f4f4;
            padding: 8px 12px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            margin: 5px 0;
            max-width: 400px;
            text-align: left;
        }

        /* Word Styling */
        .word {
            font-weight: bold;
            color: #000000;
            font-size: 1.2em;
        }

        .example {
            margin-left: 20px;
            font-style: italic;
        }

        /* Fact Box */
        .fact-box {
            background-color: rgba(142, 68, 173, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(142, 68, 173, 0.15);
            max-width: 500px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: bold;
            padding: 8px 12px;
            display: inline-block;
            border-left: 6px solid rgba(0, 0, 0, 0.2);
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
            margin-bottom: 10px;
            color: white;
        }

        /* Section Colors */
        .purple-section {
            background-color: #8e44ad;
            border-left-color: #6a1b9a;
            box-shadow: 3px 3px 8px rgba(142, 68, 173, 0.3);
        }

        .joke-box {
            background-color: rgba(52, 152, 219, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(52, 152, 219, 0.15);
            max-width: 500px;
        }


        /* Text Formatting */
        .fact {
            color: black;
        }

        /* Joke Text */
        .joke {
            color: #6d1b9a;
            /* Deeper purple for better readability */
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Joke Question Styling */
        .joke-question {
            font-weight: bold;
            font-size: 1.2em;
            font-style: italic;
            color: #2c3e50;
            /* Dark gray-blue for a classy contrast */
            margin-bottom: 5px;
        }

        /* Enhanced Typography */
        .bold {
            font-weight: 600;
            color: #000000;
            /* Darker shade for better contrast */
        }

        .italic {
            font-style: italic;
            color: #000000;
            /* Slightly darker gray for better readability */
        }

        .bold-italic {
            font-weight: 600;
            font-style: italic;
            color: #222;
            /* More emphasis on bold-italic text */
        }

        /* Joke Box - Adds a soft neumorphic effect */
        .joke-box {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1),
                -5px -5px 10px rgba(255, 255, 255, 0.5);
            max-width: 550px;
            transition: all 0.3s ease-in-out;
        }

        /* Joke Box Hover Effect */
        .joke-box:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.6);
        }

        /* Dialogue Container - Left Centered */
        /* Dialogue Container - Auto Width Based on Content */
        .dialogue-container {
            display: inline-block;
            /* Shrinks width to fit content */
            max-width: 800px;
            /* Prevents it from becoming too wide */
            margin: 20px 0;
            /* Aligns it to the left with some spacing */
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }



        /* Individual Dialogue Lines */
        .line {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Styling for Different Speakers */
        .person-1 {
            background: linear-gradient(145deg, #dde5ed, #c9d6e2);
            text-align: left;
            color: #2c3e50;
        }

        .person-2 {
            background: linear-gradient(145deg, #d1e8ff, #b9dfff);
            text-align: left;
            color: #1d3557;
        }

        /* Speaker Name Styling */
        .speaker {
            font-weight: bold;
            margin-bottom: 5px;

            font-size: 1.1em;
            color: #000;
        }
    </style>
</head>

    "dialogue": {
        "dialogue_1": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Did you catch that new karaoke bar that opened up down the street?"
                },
                {
                    "Person 2": "Yes, I did! I heard they have these cool private rooms where you can sing your heart out!"
                },
                {
                    "Person 1": "That sounds awesome! I love karaoke. It’s so much fun to just let loose, you know?"
                },
                {
                    "Person 2": "Definitely! But I’m not great at singing. I usually just go for the comedy factor."
                },
                {
                    "Person 1": "Hey, sometimes that’s even more fun! What’s your go-to song?"
                },
                {
                    "Person 2": "Oh man, I can’t resist belting out 'Livin’ on a Prayer.' What about you?"
                },
                {
                    "Person 1": "A classic! I’m more of a 'Sweet Caroline' person myself. You can’t help but sing along!"
                },
                {
                    "Person 2": "Absolutely! And everyone joins in, right? It’s like an instant party."
                },
                {
                    "Person 1": "Speaking of parties, are you doing anything for the Fourth of July?"
                },
                {
                    "Person 2": "Thinking about hosting a little barbecue. Want to come?"
                },
                {
                    "Person 1": "I would love that! I can bring burgers and some drinks."
                },
                {
                    "Person 2": "Perfect! I’ll have the grill ready. We can even set up karaoke in the backyard!"
                },
                {
                    "Person 1": "Now that’s the best idea I’ve heard all day! I’ll practice my songs."
                },
                {
                    "Person 2": "Can’t wait to hear you serenade us while we eat!"
                },
                {
                    "Person 1": "Haha, I’ll try not to scare anyone away!"
                },
                {
                    "Person 2": "No promises! But let’s make it a fun night to remember!"
                }
            ]
        },
        "dialogue_2": {
            "dialogue_list": [
                {
                    "Person 1": "Hey, have you noticed how many tourists are flooding into Danang lately?"
                },
                {
                    "Person 2": "Yeah, it’s crazy! Everyone seems to be talking about how beautiful it is here."
                },
                {
                    "Person 1": "Right? The seaside and all the activities here are drawing people in. But it's becoming a bit overwhelming."
                },
                {
                    "Person 2": "Exactly! I tried to book an apartment for a week, and they were all either booked or way too expensive!"
                },
                {
                    "Person 1": "Tell me about it! I think the prices shot up because of all the tourists."
                },
                {
                    "Person 2": "For real! I came across a nice place, but it was only available for two days. What’s the point in that?"
                },
                {
                    "Person 1": "I know! And it’s like every cool spot is taken. I just want a place with a view for a reasonable price!"
                },
                {
                    "Person 2": "I had a lucky find once! Accidentally booked a huge place with a pool for a steal."
                },
                {
                    "Person 1": "No way! How did you manage that?"
                },
                {
                    "Person 2": "It was a hotel that listed an apartment! I booked it for just over a thousand rubles, and it included breakfast."
                },
                {
                    "Person 1": "That's amazing! Sounds like a hidden gem amidst all the tourist chaos."
                },
                {
                    "Person 2": "Seriously! But I was nervous booking it. I usually don’t pay in advance because you never really know what you’ll get."
                },
                {
                    "Person 1": "Yeah, I get that. Paying upfront always makes me question if the place is going to be a disaster."
                },
                {
                    "Person 2": "Exactly! But luckily it worked out. I even made a video about it to share the experience."
                },
                {
                    "Person 1": "Nice! You have to send me that video. I’d love to see how it all turned out."
                },
                {
                    "Person 2": "For sure! I'll send it right over. Hopefully, we can both find great spots next time!"
                }
            ]
        },
        "dialogue_3": {
            "dialogue_list": [
                {
                    "Person 1": "Hey, did you hear about that crazy hotel booking experience I had last weekend?"
                },
                {
                    "Person 2": "No, what happened? Did you end up stuck without a place to stay?"
                },
                {
                    "Person 1": "Not exactly! So, I thought I could just give them my credit card and reserve a room, right? But then it turned out I actually needed to pay right away."
                },
                {
                    "Person 2": "Oh man, that’s the worst! Did you at least get a room?"
                },
                {
                    "Person 1": "Not at first. When I got to the hotel, the receptionist said they were fully booked. I was so confused because I just saw a room available!"
                },
                {
                    "Person 2": "Really? That sounds frustrating. What did you do?"
                },
                {
                    "Person 1": "I was sitting in the lobby, trying to book another hotel. I figured I’d be there for a while."
                },
                {
                    "Person 2": "You must have been stressed out! Did you find another hotel?"
                },
                {
                    "Person 1": "Not right away. But then I accidentally checked my booking page, and guess what? I realized I actually had a reservation at the hotel I was in!"
                },
                {
                    "Person 2": "Seriously? How did that happen?"
                },
                {
                    "Person 1": "I had forgotten that a few days before, I got some money transferred to my old bank account. Turns out, that was how I paid for the room."
                },
                {
                    "Person 2": "What a rollercoaster! So, you ended up with a room after all?"
                },
                {
                    "Person 1": "Yep! It was such a wild experience, and it ended up costing me about 1300 rubles, thanks to some promotion."
                },
                {
                    "Person 2": "Glad it worked out in the end! Next time, you might want to double-check before panicking!"
                },
                {
                    "Person 1": "Definitely! Lesson learned—always confirm before you give up!"
                },
                {
                    "Person 2": "For sure! Now, let's celebrate your success with some ice cream, what do you say?"
                },
                {
                    "Person 1": "Sounds perfect! I need a treat after all that stress!"
                }
            ]
        },
        "dialogue_4": {
            "dialogue_list": [
                {
                    "Person 1": "Hey, have you ever stayed at one of those fancy hotels?"
                },
                {
                    "Person 2": "Oh, totally! I once got a presidential suite for a crazy low price because I had a membership with the booking site."
                },
                {
                    "Person 1": "No way! How did that happen?"
                },
                {
                    "Person 2": "Well, they were running a promotion that day, and since I booked a lot of hotels before, I got a nice discount."
                },
                {
                    "Person 1": "That sounds awesome! What was the suite like?"
                },
                {
                    "Person 2": "It had two bedrooms, a huge living room, and like two bathrooms. It was wild!"
                },
                {
                    "Person 1": "And how was the experience overall?"
                },
                {
                    "Person 2": "Honestly, the best day ever! But checking out was such a letdown."
                },
                {
                    "Person 1": "Did you cry when you left?"
                },
                {
                    "Person 2": "Almost! I was begging to stay. My friend had to drag me out of there!"
                },
                {
                    "Person 1": "Haha, I can just picture that! What hotel are you at now?"
                },
                {
                    "Person 2": "Just a regular one now, but it’s nice enough. I can’t complain."
                },
                {
                    "Person 1": "Hey, exploring hotels sounds fun! Any good finds?"
                },
                {
                    "Person 2": "Yeah, I checked out some hotels in Vietnam recently. The views from the mountains were breathtaking."

                {
                    "Person 1": "No way! I’d love to see those pictures."

                {
                    "Person 2": "Sure! The place was so green and clean. Just beautiful!"

                {
                    "Person 1": "Did you get to see any wildlife?"

                {
                    "Person 2": "Yeah! There were wild monkeys around. We filmed a few!"

                {
                    "Person 1": "That's so cool! Wild monkeys are the best. Did you get any good shots?"

                {
                    "Person 2": "We got some great videos! It’s always a fun adventure when you're on those trips."
                },
                {
                    "Person 1": "Absolutely! Makes me want to plan a getaway soon."

                {
                    "Person 2": "Same here! Let’s do it together next time!"

        "dialogue_5": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Did you hear about that movie they made about Manson?"
                },
                {
                    "Person 2": "Yeah, I think it was about that actress who got involved, right? What was her name?"
                },
                {
                    "Person 1": "Yeah, that's the one! Marilyn Monroe, I think, inspired the name Marilyn Manson."
                },
                {
                    "Person 2": "Oh, right! He combined two iconic figures. That’s pretty wild."
                },
                {
                    "Person 1": "Speaking of wild, we should hit the mountains again soon!"
                },
                {
                    "Person 2": "For sure! Is it the same spot as before, or a new area?"

                {
                    "Person 1": "We’re exploring a different part of the mountains this time. Should be fun!"

                {
                    "Person 2": "Nice! I love a good road trip. Just driving around with the music blasting."

                    "Person 1": "Absolutely! It doesn’t matter where, as long as we’re on the road."

                {
                    "Person 2": "Have you ever thought about trying something new, like scuba diving?"

                    "Person 1": "Not yet, but I’m more into surfing these days."

                {
                    "Person 2": "Surfing sounds awesome! Have you tried it?"

                    "Person 2": "Same here! One day we’ll be those people riding the waves."

                {
                    "Person 1": "Right? It looks so cool but also challenging."

                {
                    "Person 2": "Yeah, it looks like something only adventurous people can master."

                {
                    "Person 1": "That's true! And hey, I heard some crazy stories about trying new things."
                },
                {
                    "Person 2": "Oh? Like what?"
                },
                {

                {
                    "Person 2": "Definitely! As long as it's safe and legal, I say go for it!"

                {

        "dialogue_6": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! What’s up? You look relaxed today."
                },
                {
                    "Person 2": "Oh, not much! Just enjoying some pineapple juice. How about you?"
                },
                {
                    "Person 1": "Nice! I just had coffee. So, why’s your curtain drawn? You hiding from the sun?"
                },
                {
                    "Person 2": "Haha, kind of! I just didn’t want too much light coming in while I was chilling. But it feels good to let it in now."
                },
                {
                    "Person 1": "Yeah, I get that! We need that vitamin D, right? It’s crazy how the weather can change so fast!"
                },
                {
                    "Person 2": "Right? Just last week I was freezing in a jacket, and now it feels like summer already!"
                },
                {
                    "Person 1": "Tell me about it! It’s so hot outside. I almost feel like I’m on some tropical island."
                },
                {
                    "Person 2": "Haha, are you expecting palm trees in your backyard? We can imagine you living in Cuba!"
                },
                {
                    "Person 1": "Haha, yeah! But I wouldn’t mind some sunshine and beach time right now."
                },
                {
                    "Person 2": "For sure! So what are your plans for the weekend? Doing anything fun?"
                },
                {
                    "Person 1": "Not really, just a quiet one, I think. Got a friend’s party to go to later, should be a good time."
                },
                {
                    "Person 2": "Sounds like fun! I just finally finished my school stuff and can’t wait to relax."
                },
                {
                    "Person 1": "Nice! What happens next? Any big plans after school?"
                },
                {
                    "Person 2": "Well, actually, I have to go to this military camp thing for a few days. A bit nerve-racking, to be honest."
                },
                {
                    "Person 1": "Wow! That sounds intense. Are they making you do any crazy training?"
                },
                {
                    "Person 2": "Nothing too wild, just some basic stuff with rifles. But I’m not a fan of that."
                },
                {
                    "Person 1": "Yikes! Do they make you cut your hair for that?"
                },
                {
                    "Person 2": "I hope not! I’m not ready for that. I mean, I could always tie it up or something."
                },
                {
                    "Person 1": "Yeah, a bun could save you! Just keep it hidden."
                },
                {
                    "Person 2": "Exactly! Maybe they’ll let me get away with it. We’ll see!"
                },
                {
                    "Person 1": "Good luck! Just don’t let them take it. I’ll be cheering for you from the sidelines."
                },
                {
                    "Person 2": "Thanks! I’ll need it! Let’s hang out again soon, okay?"
                },
                {
                    "Person 1": "Definitely! Talk later!"
                }
            ]
        },
        "dialogue_7": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! I noticed your hair looks different. Did you do something with it?"
                },
                {
                    "Person 2": "Yeah, I tried a new styling product. It actually looks pretty cool, right?"
                },
                {
                    "Person 1": "Definitely! I love how curly your hair is. Mine is more wavy."
                },
                {
                    "Person 2": "That’s awesome! I think wavy hair has its charm, too. It can look really great."
                },
                {
                    "Person 1": "Thanks! You know, I've heard that if curly hair gets a bit dense, it can force itself to wave."
                },
                {
                    "Person 2": "Totally true! I guess that’s why mine is so curly—it’s dense."
                },
                {
                    "Person 1": "You should try using sea salt spray! It really enhances curls."
                },
                {
                    "Person 2": "Nah, I’m good. I live by the beach; I get my sea salt right from the ocean!"

                {
                    "Person 1": "That sounds nice! So, did you take any cool pictures at the beach?"

                {
                    "Person 2": "Yeah! I took one right as the sun was rising. It looks great—I'll send it to you."

                {
                    "Person 1": "Awesome! Is it one of those perfect 'early bird' photos?"

                {
                    "Person 2": "You bet! Just mind the people in the background. They were everywhere!"

                {
                    "Person 1": "Who wakes up at 5 a.m. for the beach? That’s a bit nuts, right?"

                {
                    "Person 2": "Right? But you know, if I ever travel to Vietnam, I’d wake up early just to explore!"
                },
                {
                    "Person 1": "Exactly! You want to make the most of your trip since you might not get back."
                },
                {
                    "Person 2": "I totally agree. Speaking of which, I gotta try to go to bed earlier. Like, 10 p.m.?"

                {

                },
                {
                    "Person 2": "So true! There’s just so much going on that it feels like I’d miss out if I slept."
                },
                {
                    "Person 1": "Exactly! The nightlife, the food, the company—it’s all so enticing!"
                },
                {
                    "Person 2": "Right? It’s such a rich experience with different cultures and people."
                },
                {
                    "Person 1": "Yeah! That’s what makes our lives so amazing, all the new things we discover."
                },
                {
                    "Person 2": "Absolutely! Here’s to more adventures and late-night chats!"
                }
            ]
        },
        "dialogue_8": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! How's it going today?"
                },
                {
                    "Person 2": "Pretty good! Just trying to get through some work. You know how it is."
                },
                {
                    "Person 1": "For sure! I feel like there's always something to do. Did you manage to relax at all?"
                },
                {
                    "Person 2": "Not really. I mean, I did find some time to read a bit, though."
                },
                {
                    "Person 1": "Oh nice! What are you reading?"
                },
                {
                    "Person 2": "I picked up Aesop's Fables. It’s actually pretty fun!"
                },
                {
                    "Person 1": "Really? I remember those! They're like tiny stories, right?"
                },
                {
                    "Person 2": "Exactly! Each fable is super short, you can just read one in a minute or two."

                {
                    "Person 1": "That sounds perfect for when you need a quick break. How many did you read?"

                {
                    "Person 2": "I think I went through about six or seven of them in half an hour. Super easy to get lost in!"
                },
                {
                    "Person 1": "That’s awesome! Sometimes I just need something light to reset my brain."
                },
                {
                    "Person 2": "Absolutely! It’s like the reading equivalent of TikTok. Quick and fun!"
                },
                {
                    "Person 1": "Haha, true! Speaking of which, I could use some of that fun right now."
                },
                {
                    "Person 2": "Yeah! You should definitely check some out. Just to take it easy for a bit."
                },
                {
                    "Person 1": "I think I might have to! What’s your plan for the rest of the day?"
                },
                {
                    "Person 2": "After work, I might just kick back and read some more or maybe watch something light."
                },
                {
                    "Person 1": "Sounds good! I’ll join you in the relaxation club later."
                },
                {
                    "Person 2": "For sure! We deserve a break after all the work we do."

            ]

        "dialogue_9": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Have you heard about this new writing part they’re introducing?"
                },
                {
                    "Person 2": "Not really. What’s it about?"
                },
                {
                    "Person 1": "It’s writing part one, and apparently, a lot of people brush it off thinking it doesn’t matter."
                },
                {
                    "Person 2": "Oh really? I thought all parts are important for scoring."
                },
                {
                    "Person 1": "Exactly! It's actually one-third of the total score for writing. That's pretty significant!"
                },
                {
                    "Person 2": "Wow, I didn’t know that! So, what do you have to do in part one?"
                },
                {
                    "Person 1": "You basically have to write a structured report based on given data. No creativity involved."
                },
                {
                    "Person 2": "Sounds kinda boring, honestly! I prefer writing essays where I can express my thoughts."
                },
                {
                    "Person 1": "Right? Essays let you be free with your ideas. But reports are a different beast."
                },
                {
                    "Person 2": "So what’s the strategy for this report?"
                },
                {
                    "Person 1": "You have four paragraphs: an introduction, an overall summary, and two body paragraphs."
                },
                {
                    "Person 2": "Got it. The introduction must be easy, but I guess the overall summary is the crucial part?"
                },
                {
                    "Person 1": "Yeah! That’s where you grab your boss's attention, just like in a real job!"
                },
                {
                    "Person 2": "Sounds like we need to treat it seriously then. How do you prepare for it?"
                },
                {
                    "Person 1": "I think practicing with different types of data would help. Plus, timing yourself is key."
                },
                {
                    "Person 2": "Good idea! I’ll start practicing soon. But first, let me grab a snack!"
                },
                {
                    "Person 1": "Snack time is essential! Let’s get fuelled up for this writing challenge."
                }
            ]
        },
        "dialogue_10": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Did you catch that new series everyone’s talking about?"

                {

                {

                {
                    "Person 1": "You got this! Let me know how it goes, I want to hear all about your cooking adventures!"

                {
                    "Person 2": "Will do! And maybe we can have a cook-off one of these days?"

                {

        "dialogue_11": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Have you seen that new report about transportation trends among young people?"
                },
                {
                    "Person 2": "No, I haven't looked at it yet. What's it about?"
                },
                {
                    "Person 1": "It dives into how different types of transport are used in various countries."
                },
                {
                    "Person 2": "That sounds interesting! What did they find?"
                },
                {
                    "Person 1": "Well, they say cars are the most popular everywhere except Germany."
                },
                {
                    "Person 2": "Really? What do they use in Germany then?"
                },
                {
                    "Person 1": "Bicycles! They have a higher percentage of young people using bikes compared to cars."
                },
                {
                    "Person 2": "Wow, that's surprising! I didn't think bikes would be that popular."
                },
                {
                    "Person 1": "Yeah, it’s pretty cool. The report really emphasizes how different cultures can influence transport choices."
                },
                {
                    "Person 2": "For sure! I guess it makes sense; it’s healthier and more environmentally friendly."
                },
                {
                    "Person 1": "Exactly! Plus, they probably have better cycling infrastructure there."
                },
                {
                    "Person 2": "Yeah, I think we could use some of that here. How about we catch up later and you can share more details?"
                },
                {
                    "Person 1": "Absolutely! I’ll send you the link. Let’s chat after you check it out!"
                },
                {
                    "Person 2": "Sounds good! I’m looking forward to it."
                }
            ]
        },
        "dialogue_12": {
            "dialogue_list": [
                {
                    "Person 1": "Hey, did you ever notice how different transportation is around the world?"
                },
                {
                    "Person 2": "Definitely! Like in Germany, everyone rides bikes. It’s almost like cars don’t exist there!"
                },
                {
                    "Person 1": "Right? It’s wild how that works. In the U.S., though, cars are king."
                },
                {
                    "Person 2": "Yeah, but I’ve heard motorcycles are pretty popular elsewhere, like in Vietnam."
                },
                {
                    "Person 1": "Oh for sure! It’s mostly bikes over there. They’re cheap and perfect for the crowded streets."
                },
                {
                    "Person 2": "Exactly! I saw some videos about how you can fit so many motorcycles in a small space."
                },
                {
                    "Person 1": "Totally! I guess driving a car there would be such a hassle with all those bikes around."
                },
                {
                    "Person 2": "Yeah, and I heard it can be risky too, like bike theft is a thing."
                },
                {
                    "Person 1": "No way! That sounds sketchy. I didn’t know that."
                },
                {
                    "Person 2": "Yeah, I read a few stories online. People just zoom in and snatch bags or whatever."
                },
                {
                    "Person 1": "Yikes, that’s intense! Makes me appreciate our car culture a bit more."
                },
                {
                    "Person 2": "For sure! But it’s kind of funny how in the U.S., motorcycles are actually the least popular transport."
                },
                {
                    "Person 1": "Isn’t that ironic? They're so cool, but not many people ride them here."
                },
                {
                    "Person 2": "Right? It's like, why not? I guess cars are just more convenient for most."
                },
                {
                    "Person 1": "Yeah, cars are just easier for long trips. I can’t imagine driving a motorcycle for hours."
                },
                {
                    "Person 2": "Same! But I could see myself taking one out for fun on a nice day."
                },
                {
                    "Person 1": "Definitely! Just cruising with the wind in your hair sounds amazing."
                },
                {
                    "Person 2": "For sure! Maybe we should rent some bikes and take a day trip sometime."
                },
                {
                    "Person 1": "That sounds like a plan! Let’s do it before summer ends!"
                }
            ]
        },
        "dialogue_13": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Did you catch that game last night?"
                },
                {
                    "Person 2": "I did! What a comeback! I thought they were done for."
                },
                {
                    "Person 1": "Right? I was on the edge of my seat. That last-minute touchdown was insane!"
                },
                {
                    "Person 2": "Totally! I jumped up and scared my dog. He wasn’t ready for that excitement."
                },
                {
                    "Person 1": "Ha! I can imagine. My cat just stared at me like I was crazy."
                },
                {
                    "Person 2": "Cats are so judgmental. So, what do you think about the next game?"

            // Set parts_number from json_content
            let parts_number = json_content.parts_number || 0;

        // References to sections
        const partsSection = document.getElementById('partsSection');
        const contentSection = document.getElementById('contentSection');
        const displaySection = document.getElementById('displaySection');

        let activePart = null; // Track the active part

        // Function to create Part buttons
        function createPartButtons() {
            for (let i = 1; i <= parts_number; i++) {
                let button = document.createElement("button");
                button.textContent = "Part " + i;
                button.onclick = () => showContentButtons(i, button);
                partsSection.appendChild(button);
            }
        }

        // Function to show Mistakes, Vocabulary, and Dialogue buttons
        function showContentButtons(part, button) {
            // Reset previous part selection
            document.querySelectorAll(".part-buttons button").forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");

            // Clear previous content buttons and displayed content
            contentSection.innerHTML = "";
            contentSection.classList.remove("hidden");
            displaySection.innerHTML = "";

            activePart = part; // Update active part

            let sections = ["Mistakes", "Vocabulary", "Dialogue"];
            sections.forEach(section => {
                let secButton = document.createElement("button");
                secButton.textContent = section;
                secButton.onclick = () => {
                    secButton.classList.add("loading"); // Add flashing effect
                    displayContent(section, part, secButton);
                };
                contentSection.appendChild(secButton);
            });
        }

        // Function to display selected content
        function displayContent(type, part, button) {
            let dataKey = type.toLowerCase(); // "mistakes", "vocabulary", "dialogue"
            let partKey = dataKey + "_" + part; // e.g., "mistakes_1"

            if (json_content[dataKey] && json_content[dataKey][partKey]) {
                let contentData = json_content[dataKey][partKey];

                if (dataKey === "mistakes") {
                    appendContent(displayMistakes(contentData), part, type, button);
                } else if (dataKey === "vocabulary") {
                    appendContent(displayVocabulary(contentData), part, type, button);
                } else if (dataKey === "dialogue") {
                    appendContent(displayDialogue(contentData), part, type, button);
                }
            }
        }

        // Append content while keeping existing sections
        function appendContent(html, part, type, button) {
            let sectionID = `part${part}-${type}`;
            let existingSection = document.getElementById(sectionID);

            if (!existingSection) {
                let newSection = document.createElement("div");
                newSection.id = sectionID;
                newSection.classList.add("section-content");
                newSection.innerHTML = html;
                displaySection.appendChild(newSection);

                // Remove animation, keep the button highlighted
                button.classList.remove("loading");
                button.classList.add("active");
            }
        }

        // Function to display Mistakes content
        function displayMistakes(data) {
            let html = "<h3>Mistakes</h3>";
            data.mistakes_list.forEach(mistake => {
                html += `<p><b>Original:</b> ${mistake.original}</p>`;
                html += `<p><b>Corrected:</b> <b> ${mistake.corrected}</b></p>`;
                html += `<p><b>Explanation:</b> ${mistake.explanation}</p>`;
                html += `<p><b>Context:</b> <i> ${mistake.context}</i></p>`;
                html += `<hr><br>`; /* Adds an extra blank line */
            });
            return html;
        }





        // Function to display Vocabulary content
        function displayVocabulary(data) {
            let html = "<h3>Vocabulary</h3>";

            // Helper function: Preserve case in context replacement
            function formatContextSentence(sentence, word) {
                const regex = new RegExp(`\\b${word}\\b`, "gi"); // Case-insensitive exact word match
                return sentence.replace(regex, (match) => {
                    return `<span class="bold-italic">${match}</span>`; // Keeps match's case
                });
            }

            // Vocabulary Section
            data.vocabulary_list.forEach((entry, index) => {
                // Word Entry
                html += `<p class="entry-box"> <span class="word">${index + 1}. ${entry.word}</span></p>`;

                // Definition Box
                html += `<div class="definition-box"><span class="bold">Definition:</span> ${entry.definition}</div>`;

                // Context Sentences
                html += "<p>";
                Object.values(entry.context).forEach((sentence, i) => {
                    const formattedSentence = formatContextSentence(sentence, entry.word);
                    html += `<br><span class="bold">Context ${i + 1}:</span> <span class="italic">${formattedSentence}</span>`;
                });
                html += "</p>";
            });

            // Funny Facts Section
            if (data.funny_facts.length > 0) {
                html += `<div class="section-title purple-section">Funny Facts</div>`;
                data.funny_facts.forEach((fact, index) => {
                    html += `<div class="fact-box">
                <p class="fact"><span class="bold">${index + 1}. ${fact.word}:</span> ${fact.fact}</p>
             </div>`;
                });
            }

            // Jokes Section
            if (data.jokes.length > 0) {
                html += `<div class="section-title purple-section">Jokes</div>`;
                data.jokes.forEach((joke, index) => {
                    html += `<div class="joke-box">
                <p class="joke-question">${index + 1}. ${joke.question}</p>
                <p class="italic joke">${joke.answer}</p>
             </div>`;
                });
            }

            return html; // Returning the generated HTML instead of inserting it directly
        }

        function displayDialogue(data) {
            let html = `<div class="dialogue-container">`;
            html += "<h3>Dialogue</h3>";

            data.dialogue_list.forEach(entry => {
                const speaker = Object.keys(entry)[0];
                const line = entry[speaker];

                html += `<div class="line ${speaker === "Person 1" ? 'person-1' : 'person-2'}">
                    <span class="speaker">${speaker}:</span> ${line}
                 </div>`;
            });

            html += `</div>`;
            return html;
        }





        // Initialize part buttons
        createPartButtons();
    </script>

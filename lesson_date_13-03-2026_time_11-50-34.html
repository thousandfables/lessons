<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Parts</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            color: #444;
            background: linear-gradient(145deg, #eaeaea, #ffffff);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset 2px 2px 4px rgba(0, 0, 0, 0.05),
                inset -2px -2px 4px rgba(255, 255, 255, 0.4);
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        h3 {
            font-size: 50px;
            font-weight: bold;
        }



        #left {
            width: 100%;
            padding: 20px;
            border-right: 2px solid #ccc;
        }

        #right {
            display: none background-color: #f4f4f4;
        }

        .part-buttons,
        .content-buttons {
            margin-bottom: 10px;
        }

        .part-buttons button,
        .content-buttons button {
            margin-right: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .part-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        .content-buttons button.loading {
            animation: flash 0.5s infinite alternate;
        }

        .content-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        @keyframes flash {
            0% {
                background-color: #ffd700;
            }

            100% {
                background-color: #ffa500;
            }
        }

        .hidden {
            display: none;
        }

        .section-content {
            margin-top: 1px;
            padding: 30px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        /* Vocabulary Entry */
        .entry-box {
            font-weight: bold;
            font-size: 1.4em;
            display: inline-block;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 2px;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        /* Definition Box */
        .definition-box {
            background-color: #f4f4f4;
            padding: 8px 12px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            margin: 5px 0;
            max-width: 400px;
            text-align: left;
        }

        /* Word Styling */
        .word {
            font-weight: bold;
            color: #000000;
            font-size: 1.2em;
        }

        .example {
            margin-left: 20px;
            font-style: italic;
        }

        /* Fact Box */
        .fact-box {
            background-color: rgba(142, 68, 173, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(142, 68, 173, 0.15);
            max-width: 500px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: bold;
            padding: 8px 12px;
            display: inline-block;
            border-left: 6px solid rgba(0, 0, 0, 0.2);
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
            margin-bottom: 10px;
            color: white;
        }

        /* Section Colors */
        .purple-section {
            background-color: #8e44ad;
            border-left-color: #6a1b9a;
            box-shadow: 3px 3px 8px rgba(142, 68, 173, 0.3);
        }

        .joke-box {
            background-color: rgba(52, 152, 219, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(52, 152, 219, 0.15);
            max-width: 500px;
        }


        /* Text Formatting */
        .fact {
            color: black;
        }

        /* Joke Text */
        .joke {
            color: #6d1b9a;
            /* Deeper purple for better readability */
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Joke Question Styling */
        .joke-question {
            font-weight: bold;
            font-size: 1.2em;
            font-style: italic;
            color: #2c3e50;
            /* Dark gray-blue for a classy contrast */
            margin-bottom: 5px;
        }

        /* Enhanced Typography */
        .bold {
            font-weight: 600;
            color: #000000;
            /* Darker shade for better contrast */
        }

        .italic {
            font-style: italic;
            color: #000000;
            /* Slightly darker gray for better readability */
        }

        .bold-italic {
            font-weight: 600;
            font-style: italic;
            color: #222;
            /* More emphasis on bold-italic text */
        }

        /* Joke Box - Adds a soft neumorphic effect */
        .joke-box {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1),
                -5px -5px 10px rgba(255, 255, 255, 0.5);
            max-width: 550px;
            transition: all 0.3s ease-in-out;
        }

        /* Joke Box Hover Effect */
        .joke-box:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.6);
        }

        /* Dialogue Container - Left Centered */
        /* Dialogue Container - Auto Width Based on Content */
        .dialogue-container {
            display: inline-block;
            /* Shrinks width to fit content */
            max-width: 800px;
            /* Prevents it from becoming too wide */
            margin: 20px 0;
            /* Aligns it to the left with some spacing */
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }



        /* Individual Dialogue Lines */
        .line {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Styling for Different Speakers */
        .person-1 {
            background: linear-gradient(145deg, #dde5ed, #c9d6e2);
            text-align: left;
            color: #2c3e50;
        }

        .person-2 {
            background: linear-gradient(145deg, #d1e8ff, #b9dfff);
            text-align: left;
            color: #1d3557;
        }

        /* Speaker Name Styling */
        .speaker {
            font-weight: bold;
            margin-bottom: 5px;

            font-size: 1.1em;
            color: #000;
        }
    </style>
</head>

<body>

    <div id="left">
        <h2>Lesson Parts</h2>
        <div id="partsSection" class="part-buttons"></div>
        <div id="contentSection" class="content-buttons hidden"></div>
        <div id="displaySection"></div>
    </div>

    <div id="right">
        <!-- Reserved for later use -->
    </div>

    <script>
        // Declare json_content but do not fill it
        let json_content = {
    "parts_number": 5,
    "mistakes": {
        "mistakes_1": {
            "mistakes_list": [
                {
                    "original": "I'm going to working meetups and I'm trying to look better and better.",
                    "corrected": "I'm going to work meetups and I'm trying to look better and better.",
                    "explanation": "'Going to working' is incorrect; it should be 'going to work' as 'work' is the noun here and not 'working.'",
                    "context": "I've been attending meetups to network and improve my image. I'm going to work meetups and I'm trying to look better and better. I want to make a positive impression."
                },
                {
                    "original": "Because they thought that I will be sad.",
                    "corrected": "Because they thought that I would be sad.",
                    "explanation": "The future conditional 'will' should be changed to 'would' to match the past tense context of 'thought.'",
                    "context": "They had some misconceptions about my feelings. Because they thought that I would be sad. In reality, I'm just trying to keep a positive outlook."
                },
                {
                    "original": "I didn't sign it.",
                    "corrected": "I didn't sign them.",
                    "explanation": "'It' should be 'them' because 'rules' is plural, and thus requires a plural pronoun.",
                    "context": "I've been reviewing the company's policies and regulations. I didn't sign them. That's why I'm not fully aware of what they entail."
                },
                {
                    "original": "But I want to leave that company and they are really waiting for that day.",
                    "corrected": "But I want to leave that company and they are really looking forward to that day.",
                    "explanation": "'Waiting for' implies passiveness while 'looking forward to' conveys anticipation and eagerness.",
                    "context": "I've been feeling trapped in my job lately. But I want to leave that company and they are really looking forward to that day. I think they aren't very fond of my presence."
                },
                {
                    "original": "He thought that in Latvia they just shook hands and agreed.",
                    "corrected": "He thought that in Latvia people just shook hands and agreed.",
                    "explanation": "The sentence requires 'people' to specify who is involved in the action of shaking hands and agreeing.",
                    "context": "He had a different perspective on agreements due to cultural differences. He thought that in Latvia people just shook hands and agreed. To him, that seemed sufficient."
                },
                {
                    "original": "If you fool someone, the whole district knows about it in a week.",
                    "corrected": "If you fool someone, the whole neighborhood knows about it in a week.",
                    "explanation": "'District' usually refers to a defined administrative area, while 'neighborhood' implies a closer, community context.",
                    "context": "Reputation is crucial where he is from. If you fool someone, the whole neighborhood knows about it in a week. Keeping a good name is vital for business."
                },
                {
                    "original": "Nobody gives a shit.",
                    "corrected": "Nobody cares.",
                    "explanation": "'Gives a shit' is informal and crude; 'cares' is a more neutral and polite expression.",
                    "context": "In discussing the attitude of many businesses, it’s become clear to me. Nobody cares. It's unfortunate, but that's the reality of the situation."
                },
                {
                    "original": "But no, he was an idiot.",
                    "corrected": "But no, he was foolish.",
                    "explanation": "'Idiot' is derogatory; 'foolish' conveys a similar meaning in a less offensive manner.",
                    "context": "Reflecting on his past decisions, it's clear he made mistakes. But no, he was foolish. He trusted without proper documentation."
                },
                {
                    "original": "Yes, and it's a surprise for him.",
                    "corrected": "Yes, and it was a surprise for him.",
                    "explanation": "The tense should change to past ('was') to maintain consistency with the previous context.",
                    "context": "He didn’t expect the outcome of his experience there. Yes, and it was a surprise for him. He thought things would turn out better."
                },
                {
                    "original": "It's too difficult to hire you in our company.",
                    "corrected": "It's too difficult to hire you at our company.",
                    "explanation": "'In' should be changed to 'at' for proper prepositional use in this context.",
                    "context": "Hiring processes have been particularly challenging lately. It's too difficult to hire you at our company. They seem to be overwhelmed with their current staff."
                },
                {
                    "original": "He working like investor to the company.",
                    "corrected": "He is working as an investor for the company.",
                    "explanation": "The verb 'working' needs 'is' to show the present continuous, and 'as' is the correct preposition to indicate the role.",
                    "context": "His role has shifted in the company. He is working as an investor for the company. He brings his expertise to the table without direct funding."
                },
                {
                    "original": "But now he's prefer to, for example, now he take, he working like investor.",
                    "corrected": "But now he prefers to, for example, now he takes on work as an investor.",
                    "explanation": "The tenses are inconsistent; 'he's prefer' should be 'he prefers,' and 'he working' should be 'he is working.'",
                    "context": "His career has taken a new direction. But now he prefers to, for example, now he takes on work as an investor. It’s a change he’s embraced."
                }
            ]
        },
        "mistakes_2": {
            "mistakes_list": [
                {
                    "original": "I don't know because it's for Lenovo T490.",
                    "corrected": "I don't know because it's a Lenovo T490.",
                    "explanation": "The article 'a' is needed to indicate that you are speaking about one specific model of laptop.",
                    "context": "I'm trying to estimate the cost of the laptop. I don't know because it's a Lenovo T490. It varies in price, but it could be from 1,000 to 2,000 euros."
                },
                {
                    "original": "And it's cost from 1,000 euro to 2,000 euro.",
                    "corrected": "And it costs from 1,000 euros to 2,000 euros.",
                    "explanation": "The verb should be 'costs' instead of 'cost'. 'Euros' should be plural since the amount is more than one.",
                    "context": "I am trying to convey the pricing of laptops accurately. And it costs from 1,000 euros to 2,000 euros. That's quite a range for the Lenovo model."
                },
                {
                    "original": "it's hobby of government companies.",
                    "corrected": "it's a hobby of government companies.",
                    "explanation": "The article 'a' is needed before 'hobby' to indicate that it refers to one specific type of hobby.",
                    "context": "I find it interesting how government entities operate. It's a hobby of government companies. They sometimes spend excessively on things like laptops."
                },
                {
                    "original": "But this laptop... Well, the cost of this laptop was already about zero.",
                    "corrected": "But this laptop... Well, the cost of this laptop is already about zero.",
                    "explanation": "Present tense 'is' should be used instead of 'was' because the speaker refers to the current value of the laptop.",
                    "context": "Discussing the depreciated value of a long-used laptop. But this laptop... Well, the cost of this laptop is already about zero. It's hard to justify any costs at this point."
                },
                {
                    "original": "if you are not a Japanese.",
                    "corrected": "if you are not Japanese.",
                    "explanation": "The word 'a' is unnecessary here because 'Japanese' is used as a nationality adjective.",
                    "context": "I find that career progression is very different in state organizations. You can't build a career in a state company if you are not Japanese. It often seems biased."
                },
                {
                    "original": "Like, what is the ideal scenario for you? Like, what do you want them to say so that you say, okay, like, we are even.",
                    "corrected": "What is the ideal scenario for you? What do you want them to say so that you can say, okay, we are even?",
                    "explanation": "The overuse of 'like' makes the sentence less formal and in some parts ungrammatical. 'You can' should replace 'you say' to indicate ability.",
                    "context": "I'm trying to clarify the expectations in this negotiation. What is the ideal scenario for you? What do you want them to say so that you can say, okay, we are even?"
                },
                {
                    "original": "And I think that after a few years, when I left that company, he understood that he never take his money.",
                    "corrected": "And I think that after a few years, when I left that company, he understood that he would never take his money.",
                    "explanation": "'Take' should be in the conditional future tense 'would never take' to match the past perspective.",
                    "context": "Reflecting on the outcomes of past employment relationships. And I think that after a few years, when I left that company, he understood that he would never take his money."
                },
                {
                    "original": "And my team lead told everybody my personal medical information and joking that my operation was not true and that I'm liar.",
                    "corrected": "And my team lead told everybody my personal medical information, joking that my operation was not true and that I'm a liar.",
                    "explanation": "An article 'a' is needed before 'liar', and there should be a comma for better sentence flow.",
                    "context": "I had a very difficult experience with my team lead. And my team lead told everybody my personal medical information, joking that my operation was not true and that I'm a liar."
                },
                {
                    "original": "Like, I'm a little sad after the operation.",
                    "corrected": "I feel a little sad after the operation.",
                    "explanation": "The phrase 'I'm a little sad' can be better expressed with 'I feel' for clarity and formality.",
                    "context": "Talking about the emotional impact of a medical operation. I feel a little sad after the operation. It affected my work and relationships at the company."
                },
                {
                    "original": "But we want to fire her, we need to...",
                    "corrected": "But we wanted to fire her, we needed to...",
                    "explanation": "Consistency in verb tenses is important; this should be in the past tense.",
                    "context": "In retrospect, analyzing their motivations in the workplace. But we wanted to fire her, we needed to find a reason to justify it."
                }
            ]
        },
        "mistakes_3": {
            "mistakes_list": [
                {
                    "original": "I thought the company is paying them.",
                    "corrected": "I thought the company was paying them.",
                    "explanation": "The past tense 'was' should be used here instead of the present tense 'is' because the thought occurred in the past.",
                    "context": "I was confused about how the salary payments work. I thought the company was paying them. But it turns out they receive money from the government."
                },
                {
                    "original": "So, the company pays up to 80% of the salary of the employee who is on vacation for a year and a half after leaving the child.",
                    "corrected": "So, the company pays up to 80% of the salary of the employee who is on vacation for a year and a half after having a child.",
                    "explanation": "'Leaving the child' is incorrect here; it should be 'having a child' to indicate maternity leave properly.",
                    "context": "I learned about the salary structure for employees. The company pays up to 80% of the salary of the employee who is on vacation for a year and a half after having a child. This structure helps support new parents."
                },
                {
                    "original": "But our team leader, he's a British Chinese.",
                    "corrected": "But our team leader is British Chinese.",
                    "explanation": "The contraction 'he's' is unnecessary here; it should be more direct as 'is' to maintain a formal tone.",
                    "context": "In discussing my team dynamics, I mentioned how our team leader is British Chinese. He brings a unique perspective to our projects."
                },
                {
                    "original": "He wants to have a party because he understands that he has maybe 10 years in his life.",
                    "corrected": "He wants to have a party because he understands that he may only have 10 years left in his life.",
                    "explanation": "'Maybe' is too informal and vague; 'may only have' provides clarity about the uncertainty of his lifespan.",
                    "context": "We talked about his outlook on life. He wants to have a party because he may only have 10 years left in his life. He wants to make the most of it."
                },
                {
                    "original": "In Britain they have karma.",
                    "corrected": "In Britain, they have karma.",
                    "explanation": "A comma is needed after 'Britain' to separate the clauses correctly.",
                    "context": "We were discussing cultural beliefs. I mentioned how in Britain, they have karma. It seems to be a topic of conversation among many."
                },
                {
                    "original": "But I think that in 10 years, rich people will know more about karma too.",
                    "corrected": "But I think that in 10 years, rich people will know more about karma as well.",
                    "explanation": "'Too' is informal; 'as well' is more appropriate for the context.",
                    "context": "I was sharing my predictions about the future. I think that in 10 years, rich people will know more about karma as well. It's a growing topic across cultures."
                },
                {
                    "original": "In short, they will just kill them with a chisel and there will be a bunch of Indian millionaires in London.",
                    "corrected": "In short, they will just outsmart them, and there will be a bunch of Indian millionaires in London.",
                    "explanation": "'Kill them with a chisel' is an idiomatic misuse; it should convey outsmarting someone instead.",
                    "context": "In my conversation about economic dynamics, I said that in short, they will just outsmart them, and there will be a bunch of Indian millionaires in London. It's a strong possibility given their ambition."
                },
                {
                    "original": "But you, you already have an architecture and you got to work with what you have, right?",
                    "corrected": "But you already have an architecture, and you have to work with what you have, right?",
                    "explanation": "The casual 'got to' should be changed to 'have to' for a more formal tone.",
                    "context": "We were discussing tech architecture and project management. I pointed out that but you already have an architecture, and you have to work with what you have, right? It's important not to lose sight of current resources."
                },
                {
                    "original": "Like you can't rewrite it.",
                    "corrected": "You can’t just rewrite it.",
                    "explanation": "The word 'just' adds clarity to imply a casual nature in the context, refining the expression.",
                    "context": "The conversation was about limitations in project architecture. I emphasized that you can’t just rewrite it. It's essential to work within existing frameworks."
                },
                {
                    "original": "I rewrite all code five times in one, in last month.",
                    "corrected": "I rewrote all the code five times last month.",
                    "explanation": "The sentence should use 'rewrote' for past tense, and 'the' is necessary for specificity. 'In one' is unnecessary and can be omitted.",
                    "context": "I was discussing my workload. I rewrote all the code five times last month due to numerous issues. It's been quite challenging."
                },
                {
                    "original": "Like person.",
                    "corrected": "Like a person.",
                    "explanation": "The article 'a' is missing before 'person,' which is needed for grammatical correctness.",
                    "context": "I was explaining a misunderstanding. I described that my Russian friend is like a person who thinks I can read his mind. It shows a communication barrier."
                }
            ]
        },
        "mistakes_4": {
            "mistakes_list": [
                {
                    "original": "If you if everybody will put in that, they will not pay you.",
                    "corrected": "If everybody puts in that, they will not pay you.",
                    "explanation": "The correct form is 'puts' instead of 'will put' for hypothetical situations in the present.",
                    "context": "It's frustrating when people think that everyone can be good at something. If everybody puts in that, they will not pay you. This highlights the importance of recognizing individual talent."
                },
                {
                    "original": "I mean, yeah. Now, now I prefer to work with and now I prefer to work with our manager.",
                    "corrected": "Now, I prefer to work with our manager.",
                    "explanation": "The repetition of 'now' is unnecessary and 'with and now I prefer to work with' is unclear.",
                    "context": "It’s been a while since I made my preferences clear. Now, I prefer to work with our manager. He brings a unique perspective and helps me better understand my tasks."
                },
                {

                    "corrected": "It's like positive reinforcement.",
                    "explanation": "The phrase 'it's thank you' is not idiomatic and appears to be a jumble of thoughts.",
                    "context": "During our discussions, I notice that positive feedback is crucial. It's like positive reinforcement. When someone does a good job, it's important to acknowledge it."
                },
                {
                    "original": "I can tell when you look fresh.",

                },
                {
                    "original": "I do makeup.",

                {

                {

                },
                {
                    "original": "I just told our nanny what I was told at work.",
                    "corrected": "I just told our nanny what I had been told at work.",

                    "context": "I often share my day with those around me. I just told our nanny what I had been told at work. It keeps her in the loop."
                },
                {
                    "original": "And now I slept one hour, then five hours.",

                    "context": "I noted some changes about my husband. He partially shaved. He still looks handsome, but it’s a different look for him."
                }
            ]
        },
        "mistakes_5": {
            "mistakes_list": [
                {
                    "original": "I'm just seeing their faces and my faces.",
                    "corrected": "I'm just seeing their faces and my face.",
                    "explanation": "The word 'faces' is incorrectly pluralized; 'my face' should be used to refer to one person's face.",

                {
                    "original": "I just need to run to the toilet and make... Just a third coffee.",

            // Set parts_number from json_content
            let parts_number = json_content.parts_number || 0;

        // References to sections
        const partsSection = document.getElementById('partsSection');
        const contentSection = document.getElementById('contentSection');
        const displaySection = document.getElementById('displaySection');

        let activePart = null; // Track the active part

        // Function to create Part buttons
        function createPartButtons() {
            for (let i = 1; i <= parts_number; i++) {
                let button = document.createElement("button");
                button.textContent = "Part " + i;
                button.onclick = () => showContentButtons(i, button);
                partsSection.appendChild(button);
            }
        }

        // Function to show Mistakes, Vocabulary, and Dialogue buttons
        function showContentButtons(part, button) {
            // Reset previous part selection
            document.querySelectorAll(".part-buttons button").forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");

            // Clear previous content buttons and displayed content
            contentSection.innerHTML = "";
            contentSection.classList.remove("hidden");
            displaySection.innerHTML = "";

            activePart = part; // Update active part

            let sections = ["Mistakes", "Vocabulary", "Dialogue"];
            sections.forEach(section => {
                let secButton = document.createElement("button");
                secButton.textContent = section;
                secButton.onclick = () => {
                    secButton.classList.add("loading"); // Add flashing effect
                    displayContent(section, part, secButton);
                };
                contentSection.appendChild(secButton);
            });
        }

        // Function to display selected content
        function displayContent(type, part, button) {
            let dataKey = type.toLowerCase(); // "mistakes", "vocabulary", "dialogue"
            let partKey = dataKey + "_" + part; // e.g., "mistakes_1"

            if (json_content[dataKey] && json_content[dataKey][partKey]) {
                let contentData = json_content[dataKey][partKey];

                if (dataKey === "mistakes") {
                    appendContent(displayMistakes(contentData), part, type, button);
                } else if (dataKey === "vocabulary") {
                    appendContent(displayVocabulary(contentData), part, type, button);
                } else if (dataKey === "dialogue") {
                    appendContent(displayDialogue(contentData), part, type, button);
                }
            }
        }

        // Append content while keeping existing sections
        function appendContent(html, part, type, button) {
            let sectionID = `part${part}-${type}`;
            let existingSection = document.getElementById(sectionID);

            if (!existingSection) {
                let newSection = document.createElement("div");
                newSection.id = sectionID;
                newSection.classList.add("section-content");
                newSection.innerHTML = html;
                displaySection.appendChild(newSection);

                // Remove animation, keep the button highlighted
                button.classList.remove("loading");
                button.classList.add("active");
            }
        }

        // Function to display Mistakes content
        function displayMistakes(data) {
            let html = "<h3>Mistakes</h3>";
            data.mistakes_list.forEach(mistake => {
                html += `<p><b>Original:</b> ${mistake.original}</p>`;
                html += `<p><b>Corrected:</b> <b> ${mistake.corrected}</b></p>`;
                html += `<p><b>Explanation:</b> ${mistake.explanation}</p>`;
                html += `<p><b>Context:</b> <i> ${mistake.context}</i></p>`;
                html += `<hr><br>`; /* Adds an extra blank line */
            });
            return html;
        }





        // Function to display Vocabulary content
        function displayVocabulary(data) {
            let html = "<h3>Vocabulary</h3>";

            // Helper function: Preserve case in context replacement
            function formatContextSentence(sentence, word) {
                const regex = new RegExp(`\\b${word}\\b`, "gi"); // Case-insensitive exact word match
                return sentence.replace(regex, (match) => {
                    return `<span class="bold-italic">${match}</span>`; // Keeps match's case
                });
            }

            // Vocabulary Section
            data.vocabulary_list.forEach((entry, index) => {
                // Word Entry
                html += `<p class="entry-box"> <span class="word">${index + 1}. ${entry.word}</span></p>`;

                // Definition Box
                html += `<div class="definition-box"><span class="bold">Definition:</span> ${entry.definition}</div>`;

                // Context Sentences
                html += "<p>";
                Object.values(entry.context).forEach((sentence, i) => {
                    const formattedSentence = formatContextSentence(sentence, entry.word);
                    html += `<br><span class="bold">Context ${i + 1}:</span> <span class="italic">${formattedSentence}</span>`;
                });
                html += "</p>";
            });

            // Funny Facts Section
            if (data.funny_facts.length > 0) {
                html += `<div class="section-title purple-section">Funny Facts</div>`;
                data.funny_facts.forEach((fact, index) => {
                    html += `<div class="fact-box">
                <p class="fact"><span class="bold">${index + 1}. ${fact.word}:</span> ${fact.fact}</p>
             </div>`;
                });
            }

            // Jokes Section
            if (data.jokes.length > 0) {
                html += `<div class="section-title purple-section">Jokes</div>`;
                data.jokes.forEach((joke, index) => {
                    html += `<div class="joke-box">
                <p class="joke-question">${index + 1}. ${joke.question}</p>
                <p class="italic joke">${joke.answer}</p>
             </div>`;
                });
            }

            return html; // Returning the generated HTML instead of inserting it directly
        }

        function displayDialogue(data) {
            let html = `<div class="dialogue-container">`;
            html += "<h3>Dialogue</h3>";

            data.dialogue_list.forEach(entry => {
                const speaker = Object.keys(entry)[0];
                const line = entry[speaker];

                html += `<div class="line ${speaker === "Person 1" ? 'person-1' : 'person-2'}">
                    <span class="speaker">${speaker}:</span> ${line}
                 </div>`;
            });

            html += `</div>`;
            return html;
        }





        // Initialize part buttons
        createPartButtons();
    </script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Parts</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            color: #444;
            background: linear-gradient(145deg, #eaeaea, #ffffff);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset 2px 2px 4px rgba(0, 0, 0, 0.05),
                inset -2px -2px 4px rgba(255, 255, 255, 0.4);
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        h3 {
            font-size: 50px;
            font-weight: bold;
        }



        #left {
            width: 100%;
            padding: 20px;
            border-right: 2px solid #ccc;
        }

        #right {
            display: none background-color: #f4f4f4;
        }

        .part-buttons,
        .content-buttons {
            margin-bottom: 10px;
        }

        .part-buttons button,
        .content-buttons button {
            margin-right: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .part-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        .content-buttons button.loading {
            animation: flash 0.5s infinite alternate;
        }

        .content-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        @keyframes flash {
            0% {
                background-color: #ffd700;
            }

            100% {
                background-color: #ffa500;
            }
        }

        .hidden {
            display: none;
        }

        .section-content {
            margin-top: 1px;
            padding: 30px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        /* Vocabulary Entry */
        .entry-box {
            font-weight: bold;
            font-size: 1.4em;
            display: inline-block;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 2px;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        /* Definition Box */
        .definition-box {
            background-color: #f4f4f4;
            padding: 8px 12px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            margin: 5px 0;
            max-width: 400px;
            text-align: left;
        }

        /* Word Styling */
        .word {
            font-weight: bold;
            color: #000000;
            font-size: 1.2em;
        }

        .example {
            margin-left: 20px;
            font-style: italic;
        }

        /* Fact Box */
        .fact-box {
            background-color: rgba(142, 68, 173, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(142, 68, 173, 0.15);
            max-width: 500px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: bold;
            padding: 8px 12px;
            display: inline-block;
            border-left: 6px solid rgba(0, 0, 0, 0.2);
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
            margin-bottom: 10px;
            color: white;
        }

        /* Section Colors */
        .purple-section {
            background-color: #8e44ad;
            border-left-color: #6a1b9a;
            box-shadow: 3px 3px 8px rgba(142, 68, 173, 0.3);
        }

        .joke-box {
            background-color: rgba(52, 152, 219, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(52, 152, 219, 0.15);
            max-width: 500px;
        }


        /* Text Formatting */
        .fact {
            color: black;
        }

        /* Joke Text */
        .joke {
            color: #6d1b9a;
            /* Deeper purple for better readability */
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Joke Question Styling */
        .joke-question {
            font-weight: bold;
            font-size: 1.2em;
            font-style: italic;
            color: #2c3e50;
            /* Dark gray-blue for a classy contrast */
            margin-bottom: 5px;
        }

        /* Enhanced Typography */
        .bold {
            font-weight: 600;
            color: #000000;
            /* Darker shade for better contrast */
        }

        .italic {
            font-style: italic;
            color: #000000;
            /* Slightly darker gray for better readability */
        }

        .bold-italic {
            font-weight: 600;
            font-style: italic;
            color: #222;
            /* More emphasis on bold-italic text */
        }

        /* Joke Box - Adds a soft neumorphic effect */
        .joke-box {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1),
                -5px -5px 10px rgba(255, 255, 255, 0.5);
            max-width: 550px;
            transition: all 0.3s ease-in-out;
        }

        /* Joke Box Hover Effect */
        .joke-box:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.6);
        }

        /* Dialogue Container - Left Centered */
        /* Dialogue Container - Auto Width Based on Content */
        .dialogue-container {
            display: inline-block;
            /* Shrinks width to fit content */
            max-width: 800px;
            /* Prevents it from becoming too wide */
            margin: 20px 0;
            /* Aligns it to the left with some spacing */
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }



        /* Individual Dialogue Lines */
        .line {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Styling for Different Speakers */
        .person-1 {
            background: linear-gradient(145deg, #dde5ed, #c9d6e2);
            text-align: left;
            color: #2c3e50;
        }

        .person-2 {
            background: linear-gradient(145deg, #d1e8ff, #b9dfff);
            text-align: left;
            color: #1d3557;
        }

        /* Speaker Name Styling */
        .speaker {
            font-weight: bold;
            margin-bottom: 5px;

            font-size: 1.1em;
            color: #000;
        }
    </style>
</head>

<body>

    <div id="left">
        <h2>Lesson Parts</h2>
        <div id="partsSection" class="part-buttons"></div>
        <div id="contentSection" class="content-buttons hidden"></div>
        <div id="displaySection"></div>
    </div>

    <div id="right">
        <!-- Reserved for later use -->
    </div>

    <script>
        // Declare json_content but do not fill it
        let json_content = {
    "parts_number": 7,
    "mistakes": {
        "mistakes_1": {
            "mistakes_list": [
                {
                    "original": "He will wear it next half year maybe or more, because without it he's like Homer Simpson.",
                    "corrected": "He will wear it for the next half year maybe or more, because without it he's like Homer Simpson.",
                    "explanation": "The phrase 'next half year' is incorrect; it should be 'for the next half year' to indicate duration.",
                    "context": "My husband has been drinking beer a lot lately. He will wear it for the next half year maybe or more, because without it he's like Homer Simpson."
                },
                {
                    "original": "But very soon you realize that, you know, an hour is fine.",
                    "corrected": "But very soon you realize that, you know, an hour feels fine.",
                    "explanation": "'Is fine' should be 'feels fine' to correctly express the subjective experience of time.",
                    "context": "I thought it would be enjoyable to work outside. But very soon you realize that, you know, an hour feels fine, but after an hour, you're dying."
                },
                {
                    "original": "I think they they are lying a little bit because in real life they have no money.",
                    "corrected": "I think they are lying a little bit because in reality they have no money.",
                    "explanation": "The phrase 'in real life' should be 'in reality' for more formal and correct usage.",
                    "context": "I was fired from my job due to time zone issues. I think they are lying a little bit because in reality they have no money."
                },
                {
                    "original": "There are no monkeys in Vietnam.",
                    "corrected": "There aren’t any monkeys in Vietnam.",
                    "explanation": "The statement should use 'aren’t' for a more conversational tone and to convey a sense of absence.",
                    "context": "I was joking about the monkeys I saw. There aren't any monkeys in Vietnam, but the rest of the scenery was beautiful."
                },
                {
                    "original": "I told you or not, I'm fired from a company in Australia.",
                    "corrected": "I told you or not, I was fired from a company in Australia.",
                    "explanation": "The past tense 'was fired' is preferred in this context to correctly refer to a completed action.",
                    "context": "I wanted to update you on my job situation. I told you or not, I was fired from a company in Australia."
                },
                {
                    "original": "I lived in another company.",
                    "corrected": "I worked in another company.",
                    "explanation": "'Lived' is incorrect here; 'worked' should be used to describe employment.",
                    "context": "I had experience in various roles before. I worked in another company. Now I'm happy to be where I am."
                },
                {
                    "original": "But he want to be team leader guy.",
                    "corrected": "But he wants to be the team leader.",
                    "explanation": "Incorrect subject-verb agreement; 'want' should be 'wants' to match the singular subject.",
                    "context": "My colleague is quite ambitious. But he wants to be the team leader. Unfortunately, that’s not happening."
                },
                {
                    "original": "They have to. Future future team leads.",
                    "corrected": "They have to. Future team leaders.",
                    "explanation": "Repetition of 'future' is unnecessary; it should simply be 'future team leaders'.",
                    "context": "There are many changes happening at work. They have to recruit. Future team leaders are crucial now."
                },
                {
                    "original": "He believing to everybody.",
                    "corrected": "He believes in everybody.",
                    "explanation": "The verb should be in present simple, and 'believing to' is incorrect; it should be 'believes in'.",
                    "context": "In our work environment, trust is vital. He believes in everybody, which might be his biggest flaw."
                },
                {
                    "original": "But they can't fulfill their promises. Fulfill. Fulfill.",
                    "corrected": "But they can't fulfill their promises.",
                    "explanation": "The repetition of 'fulfill' is redundant; stating once is sufficient.",
                    "context": "Promises made at work often go unkept. But they can't fulfill their promises, which creates frustration."
                }
            ]
        },
        "mistakes_2": {
            "mistakes_list": [
                {
                    "original": "All IT director.",
                    "corrected": "All are IT directors.",
                    "explanation": "The sentence lacks a verb; it should include 'are' to form a complete thought.",
                    "context": "In the team discussions, we often talk about the hierarchy. All are IT directors. It's a unique structure that I find a bit unusual."
                },
                {
                    "original": "I don't understand that. That they want that a planning.",
                    "corrected": "I don't understand what they want for the planning.",
                    "explanation": "The phrase 'that they want that a planning' is awkward; 'what they want for' clarifies the intention.",
                    "context": "During our meetings, there are many decisions made. I don't understand what they want for the planning. It seems unclear to everyone."
                },
                {
                    "original": "All the commute is crazy.",
                    "corrected": "The commute is crazy.",
                    "explanation": "The phrase 'All the commute' is incorrect; it should simply be 'The commute.'",
                    "context": "My colleague often complains about her work situation. The commute is crazy. She finds it hard to justify the time spent traveling."
                },
                {
                    "original": "There is no parking there.",
                    "corrected": "There isn’t any parking there.",
                    "explanation": "Using 'is' is less common here; 'isn’t any' is a more idiomatic way to express it.",
                    "context": "While discussing the constraints of her job, she mentioned the location. There isn’t any parking there. This adds to her frustration with commuting."
                },
                {
                    "original": "Yes they can. They can.",
                    "corrected": "Yes, they can.",
                    "explanation": "The repetition is unnecessary; it can be simplified to a single statement.",
                    "context": "We were talking about the abilities of developers today. Yes, they can be very skilled. Yet, this skill isn't always matched with experience."
                },
                {
                    "original": "What I mean some code doesn't mean functional code.",
                    "corrected": "What I mean is that some code doesn't mean functional code.",
                    "explanation": "The original phrasing is missing the verb 'is,' which is needed for clarity.",
                    "context": "While discussing the state of coding today, I reflected on the quality of work. What I mean is that some code doesn't mean functional code. It's a crucial distinction."
                },
                {
                    "original": "I used no fan it's.",
                    "corrected": "I used no fan; it's.",
                    "explanation": "The phrase is improperly punctuated and should use a semicolon or period to separate ideas.",
                    "context": "While explaining the pressures faced by developers, I mentioned my own challenges. I used no fan; it's been overwhelming lately."
                },
                {
                    "original": "Some developers hunting these.",
                    "corrected": "Some developers are hunting for these.",
                    "explanation": "The original sentence is missing the verb 'are' and does not clearly indicate what 'these' refers to.",
                    "context": "In the conversation about coding trends, we discussed developers' tactics. Some developers are hunting for these skills actively. It's become quite competitive."
                },
                {
                    "original": "Because now I think that I want to learn.",
                    "corrected": "Because now I think I want to learn.",
                    "explanation": "The phrase 'that I want to learn' is unnecessary; it can be more concise.",
                    "context": "Reflecting on my career path, I felt a shift in focus. Because now I think I want to learn. It’s an exciting prospect for my future."
                },
                {
                    "original": "Nobody. As. Know how to sell.",
                    "corrected": "Nobody knows how to sell.",
                    "explanation": "The original sentence structure is fragmented; it should be a complete thought with a verb.",
                    "context": "In discussing company challenges, I noticed a gap in expertise. Nobody knows how to sell. It's a significant issue for business growth."
                },
                {
                    "original": "That only cost like $100.",
                    "corrected": "That only costs about $100.",
                    "explanation": "The verb 'cost' needs to agree with 'only'; 'about' is more idiomatic than 'like' in this context.",
                    "context": "In reviewing pricing for coding tools, I wanted to clarify the cost structure. That only costs about $100. It seems reasonable for its functionality."
                },
                {
                    "original": "I believe that it's girl.",
                    "corrected": "I believe that it's a girl.",
                    "explanation": "The article 'a' is needed before 'girl' for proper grammatical structure.",
                    "context": "In discussing someone's potential partner, I wanted to express my thoughts on their relationship. I believe that it's a girl. They seem happy together."
                },
                {
                    "original": "Maybe Vietnamese men also look tall.",
                    "corrected": "Maybe Vietnamese men also are tall.",
                    "explanation": "The original phrasing does not use 'are' to correctly describe the men, leading to awkwardness.",
                    "context": "In a light-hearted discussion about cultural perceptions, I noticed how my views changed. Maybe Vietnamese men also are tall. It's an interesting observation."
                }
            ]
        },
        "mistakes_3": {
            "mistakes_list": [
                {
                    "original": "And she was like a big hitter of a pair like for a thousand plus people.",
                    "corrected": "She was a big hit, performing for over a thousand people.",
                    "explanation": "\"big hitter of a pair\" is nonstandard and awkward; use \"a big hit\" and clarify the verb \"performing\".",
                    "context": "But they are not. She was a big hit, performing for over a thousand people. It got out of control at some point."
                },
                {
                    "original": "And it's gotten out of control at some point.",
                    "corrected": "It got out of control at some point.",
                    "explanation": "Use simple past \"got\" for a past event rather than present perfect in this narration.",
                    "context": "She was a big hit, performing for over a thousand people. It got out of control at some point. She just did too much."
                },
                {
                    "original": "And she just made too many.",
                    "corrected": "She just did too much.",
                    "explanation": "\"made too many\" is incomplete; \"did too much\" is clearer for excessive behavior.",
                    "context": "It got out of control at some point. She just did too much. They all worked for the same company."
                },
                {
                    "original": "And they all were working in the same company.",
                    "corrected": "They all worked for the same company.",
                    "explanation": "Use \"worked for\" to describe employment; simple past is natural here.",
                    "context": "She just did too much. They all worked for the same company. So it was really a mess."
                },
                {
                    "original": "And what happened in the end. They ordered me to court.",
                    "corrected": "In the end, they summoned me to court.",
                    "explanation": "Combine fragment into a single sentence and use \"summoned\" (or \"called\") to court.",
                    "context": "So it was really a mess. In the end, they summoned me to court. It was a detective who called me."
                },
                {
                    "original": "Like the person who is a detective. I don't know maybe a legal investigator. Legal investigator ordered me to court as a witness.",
                    "corrected": "It was a detective, maybe a legal investigator. The investigator summoned me to court as a witness.",
                    "explanation": "Avoid sentence fragments and repeat the subject; use \"summoned\" and a single clear noun \"investigator.\"",
                    "context": "In the end, they summoned me to court. The investigator summoned me to court as a witness. He told me I wasn't accused of a crime."
                },
                {
                    "original": "He said you are not a criminal. We don't see We don't see We don't see you as a criminal. We don't see you as someone who did something wrong.",
                    "corrected": "He said, \"You are not a criminal; we don't see you as someone who did something wrong.\"",
                    "explanation": "Condense repetition and present the investigator's words clearly with proper punctuation.",
                    "context": "The investigator summoned me to court as a witness. He said, \"You are not a criminal; we don't see you as someone who did something wrong.\" She was the criminal."
                },
                {
                    "original": "It was her who is the criminal.",
                    "corrected": "She was the criminal.",
                    "explanation": "Use the subject pronoun \"she\" and past tense \"was\"; avoid \"her who is\".",
                    "context": "He said, \"You are not a criminal; we don't see you as someone who did something wrong.\" She was the criminal. I told them they had to start legal proceedings against her."
                },
                {
                    "original": "you have to start a legal trial against her.",
                    "corrected": "You have to start legal proceedings against her.",
                    "explanation": "\"Start legal proceedings\" is the standard phrase; \"legal trial\" is less idiomatic here.",
                    "context": "She was the criminal. You have to start legal proceedings against her. But you have to tell us everything you know."
                },
                {
                    "original": "Who you gave money to.",
                    "corrected": "Who did you give money to?",
                    "explanation": "Use the auxiliary \"did\" to form a proper question in past tense.",
                    "context": "Tell us how it happened. Who did you give money to? Did you see her in person?"
                },
                {
                    "original": "He dictated after me.",
                    "corrected": "He recorded what I said.",
                    "explanation": "\"Dictated after me\" is unclear; likely meant the investigator recorded or noted the answers.",
                    "context": "I was answering his questions. He recorded what I said. So it was a pretty serious thing."
                },
                {
                    "original": "You never, after they are done with her, you can never tell how many, when will they cancel our airbopend?",
                    "corrected": "You never know when they'll cancel our Airbnb account.",
                    "explanation": "Clarify meaning: use \"You never know when\" and correct the unclear term to \"Airbnb account.\"",
                    "context": "I really don't want to deal with that anymore. You never know when they'll cancel our Airbnb account. Because technically they know it's fictional."
                },
                {
                    "original": "it happened pretty much like it happened for the first time.",
                    "corrected": "It happened pretty much the same as the first time.",
                    "explanation": "Avoid repeated \"happened\" and use \"the same as\" for comparison.",
                    "context": "It's really upsetting. It happened pretty much the same as the first time. When I moved from Russia to Kazakhstan, it was identical."
                },
                {
                    "original": "On the 1st of April, I had this interrogation, like legal interrogation. And I bought tickets on the 3rd of April. Tickets for the 3rd of April.",
                    "corrected": "I had the interrogation on April 1st and bought tickets for April 3rd.",
                    "explanation": "Combine fragmented ideas and avoid unnecessary repetition of the date.",
                    "context": "When I moved from Russia to Kazakhstan, it was identical. I had the interrogation on April 1st and bought tickets for April 3rd. I packed and left quickly."
                },
                {
                    "original": "I really, in a hurry, packed my things, I sold my stuff, my possessions. And in a hurry, I went to the airport.",
                    "corrected": "I packed my things in a hurry, sold my possessions, and rushed to the airport.",
                    "explanation": "Use a smoother sequence with parallel verbs and avoid repeated \"in a hurry.\"",
                    "context": "I had the interrogation on April 1st and bought tickets for April 3rd. I packed my things in a hurry, sold my possessions, and rushed to the airport. I went to Vietnam."
                },
                {
                    "original": "You're like Vietnam.",
                    "corrected": "I went to Vietnam.",
                    "explanation": "\"You're like Vietnam\" is unclear; context shows the speaker traveled to Vietnam.",
                    "context": "I packed my things in a hurry, sold my possessions, and rushed to the airport. I went to Vietnam. It was the best decision ever."
                },
                {
                    "original": "What were I thinking about before I'm asking my questions, this question to myself every day?",
                    "corrected": "What was I thinking before? I ask myself that question every day.",
                    "explanation": "Use correct past tense and form a clear statement about asking the question daily.",
                    "context": "It was the best decision ever. What was I thinking before? I ask myself that question every day."
                },
                {
                    "original": "You need to move to a new country every half year.",
                    "corrected": "You need to move to a new country every six months.",
                    "explanation": "\"Half year\" is understandable but \"six months\" is idiomatic and clearer.",
                    "context": "This is so great here. You need to move to a new country every six months. For the first six months you're happy because everything is new."
                },
                {
                    "original": "you don't understand why are you here.",
                    "corrected": "you don't understand why you're here.",
                    "explanation": "Use indirect question word order: \"why you're here\" not \"why are you here\".",
                    "context": "You are in a self-identification crisis when you don't understand why you're here. You want to go home and eat borscht. Our friends in Australia cook borscht with kangaroo."
                },
                {
                    "original": "eat borsh",
                    "corrected": "eat borscht",
                    "explanation": "Standard English spelling is \"borscht.\"",
                    "context": "You want to go home and eat borscht. Our friends in Australia cook borscht with kangaroo. I can send you a picture."
                },
                {
                    "original": "Our friends in Australia, they are cooking borsh with kangaroo. With kangaroo borsh.",
                    "corrected": "Our friends in Australia cook borscht with kangaroo meat.",
                    "explanation": "Use simple present and specify \"kangaroo meat\" for clarity; avoid fragment repetition.",
                    "context": "You want to go home and eat borscht. Our friends in Australia cook borscht with kangaroo meat. That's how you reconcile being Australian and Russian."
                },
                {
                    "original": "They all solved it all. They sorted it out.",
                    "corrected": "They've all solved it. They've sorted it out.",
                    "explanation": "Avoid double \"all\" and use present perfect to indicate a completed resolution.",
                    "context": "I bet they don't have an identity crisis. They've all solved it. Now they're just Russian people who eat borscht with kangaroo."
                },
                {
                    "original": "By the way, in Australia, with Vietnam, there is only 3 hour difference with Australia. Like in Australia it's 8.",
                    "corrected": "By the way, between Vietnam and Australia there's only a three-hour time difference. For example, in Australia it's 8.",
                    "explanation": "Clarify comparison and use \"three-hour time difference\"; avoid awkward repetition.",
                    "context": "I'm not sure about the time zones. By the way, between Vietnam and Australia there's only a three-hour time difference. For example, in Australia it's 8."
                },
                {
                    "original": "One girl from my company, she's worked from Philippines. And it's 3 hours difference too.",
                    "corrected": "One girl from my company works from the Philippines, and it's a three-hour difference too.",
                    "explanation": "Use present simple for habitual work and add article \"the\" for the country; spell out numbers.",
                    "context": "By the way, between Vietnam and Australia there's only a three-hour time difference. One girl from my company works from the Philippines, and it's a three-hour difference too. She's nice."
                },
                {
                    "original": "With cat it's really difficult. You can't relocate with cat because cat needs to be vaccinated.",
                    "corrected": "With a cat it's really difficult. You can't relocate with a cat because the cat needs to be vaccinated.",
                    "explanation": "Add articles \"a/the\" before \"cat\" and repeat only when needed; make sentence natural.",
                    "context": "It's easy for you because you have no cat. With a cat it's really difficult. You can't relocate with a cat because the cat needs to be vaccinated."
                },
                {
                    "original": "If we're living in Europe with cat more than 2 months.",
                    "corrected": "If we live in Europe with the cat for more than two months.",
                    "explanation": "Use present simple for general condition, add article \"the\", and say \"for two months.\"",
                    "context": "For example, to move the cat to Australia, it's complicated. If we live in Europe with the cat for more than two months, then relocation rules change. Otherwise it's impossible from Russia."
                },
                {
                    "original": "Cat will be on the quarantine 2 weeks.",
                    "corrected": "The cat will be in quarantine for two weeks.",
                    "explanation": "Use \"in quarantine\" and say the duration with \"for two weeks.\"",
                    "context": "You need to vaccinate the cat and wait. The cat will be in quarantine for two weeks. After that the cat will probably be very upset."
                },
                {
                    "original": "But why can I say?",

            // Set parts_number from json_content
            let parts_number = json_content.parts_number || 0;

        // References to sections
        const partsSection = document.getElementById('partsSection');
        const contentSection = document.getElementById('contentSection');
        const displaySection = document.getElementById('displaySection');

        let activePart = null; // Track the active part

        // Function to create Part buttons
        function createPartButtons() {
            for (let i = 1; i <= parts_number; i++) {
                let button = document.createElement("button");
                button.textContent = "Part " + i;
                button.onclick = () => showContentButtons(i, button);
                partsSection.appendChild(button);
            }
        }

        // Function to show Mistakes, Vocabulary, and Dialogue buttons
        function showContentButtons(part, button) {
            // Reset previous part selection
            document.querySelectorAll(".part-buttons button").forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");

            // Clear previous content buttons and displayed content
            contentSection.innerHTML = "";
            contentSection.classList.remove("hidden");
            displaySection.innerHTML = "";

            activePart = part; // Update active part

            let sections = ["Mistakes", "Vocabulary", "Dialogue"];
            sections.forEach(section => {
                let secButton = document.createElement("button");
                secButton.textContent = section;
                secButton.onclick = () => {
                    secButton.classList.add("loading"); // Add flashing effect
                    displayContent(section, part, secButton);
                };
                contentSection.appendChild(secButton);
            });
        }

        // Function to display selected content
        function displayContent(type, part, button) {
            let dataKey = type.toLowerCase(); // "mistakes", "vocabulary", "dialogue"
            let partKey = dataKey + "_" + part; // e.g., "mistakes_1"

            if (json_content[dataKey] && json_content[dataKey][partKey]) {
                let contentData = json_content[dataKey][partKey];

                if (dataKey === "mistakes") {
                    appendContent(displayMistakes(contentData), part, type, button);
                } else if (dataKey === "vocabulary") {
                    appendContent(displayVocabulary(contentData), part, type, button);
                } else if (dataKey === "dialogue") {
                    appendContent(displayDialogue(contentData), part, type, button);
                }
            }
        }

        // Append content while keeping existing sections
        function appendContent(html, part, type, button) {
            let sectionID = `part${part}-${type}`;
            let existingSection = document.getElementById(sectionID);

            if (!existingSection) {
                let newSection = document.createElement("div");
                newSection.id = sectionID;
                newSection.classList.add("section-content");
                newSection.innerHTML = html;
                displaySection.appendChild(newSection);

                // Remove animation, keep the button highlighted
                button.classList.remove("loading");
                button.classList.add("active");
            }
        }

        // Function to display Mistakes content
        function displayMistakes(data) {
            let html = "<h3>Mistakes</h3>";
            data.mistakes_list.forEach(mistake => {
                html += `<p><b>Original:</b> ${mistake.original}</p>`;
                html += `<p><b>Corrected:</b> <b> ${mistake.corrected}</b></p>`;
                html += `<p><b>Explanation:</b> ${mistake.explanation}</p>`;
                html += `<p><b>Context:</b> <i> ${mistake.context}</i></p>`;
                html += `<hr><br>`; /* Adds an extra blank line */
            });
            return html;
        }





        // Function to display Vocabulary content
        function displayVocabulary(data) {
            let html = "<h3>Vocabulary</h3>";

            // Helper function: Preserve case in context replacement
            function formatContextSentence(sentence, word) {
                const regex = new RegExp(`\\b${word}\\b`, "gi"); // Case-insensitive exact word match
                return sentence.replace(regex, (match) => {
                    return `<span class="bold-italic">${match}</span>`; // Keeps match's case
                });
            }

            // Vocabulary Section
            data.vocabulary_list.forEach((entry, index) => {
                // Word Entry
                html += `<p class="entry-box"> <span class="word">${index + 1}. ${entry.word}</span></p>`;

                // Definition Box
                html += `<div class="definition-box"><span class="bold">Definition:</span> ${entry.definition}</div>`;

                // Context Sentences
                html += "<p>";
                Object.values(entry.context).forEach((sentence, i) => {
                    const formattedSentence = formatContextSentence(sentence, entry.word);
                    html += `<br><span class="bold">Context ${i + 1}:</span> <span class="italic">${formattedSentence}</span>`;
                });
                html += "</p>";
            });

            // Funny Facts Section
            if (data.funny_facts.length > 0) {
                html += `<div class="section-title purple-section">Funny Facts</div>`;
                data.funny_facts.forEach((fact, index) => {
                    html += `<div class="fact-box">
                <p class="fact"><span class="bold">${index + 1}. ${fact.word}:</span> ${fact.fact}</p>
             </div>`;
                });
            }

            // Jokes Section
            if (data.jokes.length > 0) {
                html += `<div class="section-title purple-section">Jokes</div>`;
                data.jokes.forEach((joke, index) => {
                    html += `<div class="joke-box">
                <p class="joke-question">${index + 1}. ${joke.question}</p>
                <p class="italic joke">${joke.answer}</p>
             </div>`;
                });
            }

            return html; // Returning the generated HTML instead of inserting it directly
        }

        function displayDialogue(data) {
            let html = `<div class="dialogue-container">`;
            html += "<h3>Dialogue</h3>";

            data.dialogue_list.forEach(entry => {
                const speaker = Object.keys(entry)[0];
                const line = entry[speaker];

                html += `<div class="line ${speaker === "Person 1" ? 'person-1' : 'person-2'}">
                    <span class="speaker">${speaker}:</span> ${line}
                 </div>`;
            });

            html += `</div>`;
            return html;
        }





        // Initialize part buttons
        createPartButtons();
    </script>

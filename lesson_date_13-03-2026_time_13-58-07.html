<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Parts</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            color: #444;
            background: linear-gradient(145deg, #eaeaea, #ffffff);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset 2px 2px 4px rgba(0, 0, 0, 0.05),
                inset -2px -2px 4px rgba(255, 255, 255, 0.4);
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        h3 {
            font-size: 50px;
            font-weight: bold;
        }



        #left {
            width: 100%;
            padding: 20px;
            border-right: 2px solid #ccc;
        }

        #right {
            display: none background-color: #f4f4f4;
        }

        .part-buttons,
        .content-buttons {
            margin-bottom: 10px;
        }

        .part-buttons button,
        .content-buttons button {
            margin-right: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .part-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        .content-buttons button.loading {
            animation: flash 0.5s infinite alternate;
        }

        .content-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        @keyframes flash {
            0% {
                background-color: #ffd700;
            }

            100% {
                background-color: #ffa500;
            }
        }

        .hidden {
            display: none;
        }

        .section-content {
            margin-top: 1px;
            padding: 30px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        /* Vocabulary Entry */
        .entry-box {
            font-weight: bold;
            font-size: 1.4em;
            display: inline-block;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 2px;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        /* Definition Box */
        .definition-box {
            background-color: #f4f4f4;
            padding: 8px 12px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            margin: 5px 0;
            max-width: 400px;
            text-align: left;
        }

        /* Word Styling */
        .word {
            font-weight: bold;
            color: #000000;
            font-size: 1.2em;
        }

        .example {
            margin-left: 20px;
            font-style: italic;
        }

        /* Fact Box */
        .fact-box {
            background-color: rgba(142, 68, 173, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(142, 68, 173, 0.15);
            max-width: 500px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: bold;
            padding: 8px 12px;
            display: inline-block;
            border-left: 6px solid rgba(0, 0, 0, 0.2);
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
            margin-bottom: 10px;
            color: white;
        }

        /* Section Colors */
        .purple-section {
            background-color: #8e44ad;
            border-left-color: #6a1b9a;
            box-shadow: 3px 3px 8px rgba(142, 68, 173, 0.3);
        }

        .joke-box {
            background-color: rgba(52, 152, 219, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(52, 152, 219, 0.15);
            max-width: 500px;
        }


        /* Text Formatting */
        .fact {
            color: black;
        }

        /* Joke Text */
        .joke {
            color: #6d1b9a;
            /* Deeper purple for better readability */
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Joke Question Styling */
        .joke-question {
            font-weight: bold;
            font-size: 1.2em;
            font-style: italic;
            color: #2c3e50;
            /* Dark gray-blue for a classy contrast */
            margin-bottom: 5px;
        }

        /* Enhanced Typography */
        .bold {
            font-weight: 600;
            color: #000000;
            /* Darker shade for better contrast */
        }

        .italic {
            font-style: italic;
            color: #000000;
            /* Slightly darker gray for better readability */
        }

        .bold-italic {
            font-weight: 600;
            font-style: italic;
            color: #222;
            /* More emphasis on bold-italic text */
        }

        /* Joke Box - Adds a soft neumorphic effect */
        .joke-box {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1),
                -5px -5px 10px rgba(255, 255, 255, 0.5);
            max-width: 550px;
            transition: all 0.3s ease-in-out;
        }

        /* Joke Box Hover Effect */
        .joke-box:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.6);
        }

        /* Dialogue Container - Left Centered */
        /* Dialogue Container - Auto Width Based on Content */
        .dialogue-container {
            display: inline-block;
            /* Shrinks width to fit content */
            max-width: 800px;
            /* Prevents it from becoming too wide */
            margin: 20px 0;
            /* Aligns it to the left with some spacing */
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }



        /* Individual Dialogue Lines */
        .line {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Styling for Different Speakers */
        .person-1 {
            background: linear-gradient(145deg, #dde5ed, #c9d6e2);
            text-align: left;
            color: #2c3e50;
        }

        .person-2 {
            background: linear-gradient(145deg, #d1e8ff, #b9dfff);
            text-align: left;
            color: #1d3557;
        }

        /* Speaker Name Styling */
        .speaker {
            font-weight: bold;
            margin-bottom: 5px;

            font-size: 1.1em;
            color: #000;
        }
    </style>
</head>

    "dialogue": {
        "dialogue_1": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! How’s it going today?"
                },
                {
                    "Person 2": "Hey! Not too bad! Just had a bit of a crazy week, though."
                },
                {
                    "Person 1": "Yeah? What happened?"
                },
                {
                    "Person 2": "So, I’ve been dealing with some paperwork. You know how it is when you’re trying to stay legal in another country?"
                },
                {
                    "Person 1": "Oh man, that sounds stressful. What kind of paperwork?"
                },
                {
                    "Person 2": "Just the usual stuff—visa renewals and all that. Makes my head spin sometimes."
                },
                {
                    "Person 1": "Ugh, I can only imagine. Speaking of head spinning, I finally cut my hair!"
                },
                {
                    "Person 2": "You did? Nice! How short did you go?"
                },
                {
                    "Person 1": "Pretty short! I had long hair for ages, but summer was rough on it. I needed a change."
                },
                {
                    "Person 2": "That’s awesome! I bet it feels lighter. Do you have any pictures?"
                },
                {
                    "Person 1": "Yeah, I can show you! I’ll send you a pic right now."
                },
                {
                    "Person 2": "Cool, looking forward to it! By the way, I noticed your hair looks great now!"
                },
                {
                    "Person 1": "Thanks a lot! I’ve been using some special oil to help it grow back healthy."
                },
                {
                    "Person 2": "That’s smart. I tried that once but forgot to keep up with it."
                },
                {
                    "Person 1": "Consistency is key! So, are you planning to do anything with your hair?"
                },
                {
                    "Person 2": "I’m just letting it grow for now. I tried coloring it once, but it was a disaster."
                },
                {
                    "Person 1": "Yikes! What happened?"
                },
                {
                    "Person 2": "Let’s just say I ended up looking like a traffic cone. Never again!"
                },
                {
                    "Person 1": "Wow! That’s quite the image! But hey, at least it's a story to tell."
                },
                {
                    "Person 2": "True! And it’s always fun to laugh about it later."
                },
                {
                    "Person 1": "Absolutely! So, how’s everything else going? Still enjoying your classes?"
                },
                {
                    "Person 2": "Yeah! They’re going well. Just trying to keep up with all the assignments."
                },
                {
                    "Person 1": "I hear you. Let’s catch up later, maybe grab some coffee?"
                },
                {
                    "Person 2": "Sounds good! I could use a caffeine boost."
                }
            ]
        },
        "dialogue_2": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Have you ever thought about what makes you unique, especially with a common name?"
                },
                {
                    "Person 2": "Oh, for sure! I mean, I have a pretty ordinary name too. Sometimes I wonder if I should change it to something more interesting."
                },
                {
                    "Person 1": "Right? It's like, what stands out about us when everyone else seems the same?"
                },
                {
                    "Person 2": "Exactly! I used to think about that a lot when I was a teenager. I wanted to fit in and be someone else, you know?"
                },
                {
                    "Person 1": "Same here! I remember following trends and trying to dress like those cool kids I saw on Instagram."
                },
                {
                    "Person 2": "Totally! But as I grew up, I think I started to appreciate who I am more."
                },
                {
                    "Person 1": "That's so true. It's like you realize that trying to please everyone just drains you."
                },
                {
                    "Person 2": "Exactly! I used to worry so much about how I looked, but now I just focus on being comfortable in my own skin."
                },
                {
                    "Person 1": "I feel you! I've noticed that you seem happier and more confident lately, especially during our lessons."
                },
                {
                    "Person 2": "Thanks! I guess I'm in a different place now. I’ve been focusing on my mental health and well-being."
                },
                {
                    "Person 1": "That's awesome! It's so refreshing to see someone embracing who they are."
                },
                {
                    "Person 2": "Yeah! I've learned that life changes pretty fast, and I’m just trying to enjoy the ride."
                },
                {
                    "Person 1": "For sure! It’s all about growth and learning along the way."
                },
                {
                    "Person 2": "Exactly! And I think the more we accept ourselves, the easier things become."
                },
                {
                    "Person 1": "Well said! We should celebrate that more often!"
                },
                {
                    "Person 2": "Definitely! How about we grab a bite and chat more about it?"
                }
            ]
        },

                {
                    "Person 2": "Exactly! There was this girl I thought I was close with, but now I see that we just don’t vibe anymore."

                {
                    "Person 1": "Right? It’s like you outgrow some friendships. Sometimes, it's for the better."

                {

                    "Person 1": "Ugh, yes! I try to be supportive, but constant negativity can really wear you down."

                    "Person 2": "I totally get that. Education can be super expensive. Have you looked into any scholarships?"

                {
                    "Person 1": "I have! Some universities offer stipends, which could help. But it’s still a big decision."
                },
                {
                    "Person 2": "For sure. I mean, I was also considering studying abroad, but those tuition fees are crazy!"

                {
                    "Person 1": "Right? I was thinking about studying in China, but the costs there can add up too. It's such a different experience though!"

                {
                    "Person 2": "Absolutely! Learning in a different culture could be amazing. Plus, think of all the friends you could make."

                    "Person 1": "That's true! But I also heard that some classes can be pretty easy, and people might cheat on tests."

                    "Person 2": "Yeah, it's like, why bother paying for an education if you’re not actually learning anything?"

                {
                    "Person 1": "Exactly! So, I'm thinking it might be better to find a place where I can get real experience—not just a diploma."

                {
                    "Person 2": "Smart move! Experience is so valuable. Plus, you'll improve your language skills a lot faster."

                {
                    "Person 1": "Yeah! I’ll probably focus on getting into a good program before deciding on a master's."

                {
                    "Person 2": "Sounds like a solid plan. Let’s keep each other updated on what we find out!"

                    "Person 1": "Deal! Let's make sure we help each other out, no matter what choices we make."

            // Set parts_number from json_content
            let parts_number = json_content.parts_number || 0;

        // References to sections
        const partsSection = document.getElementById('partsSection');
        const contentSection = document.getElementById('contentSection');
        const displaySection = document.getElementById('displaySection');

        let activePart = null; // Track the active part

        // Function to create Part buttons
        function createPartButtons() {
            for (let i = 1; i <= parts_number; i++) {
                let button = document.createElement("button");
                button.textContent = "Part " + i;
                button.onclick = () => showContentButtons(i, button);
                partsSection.appendChild(button);
            }
        }

        // Function to show Mistakes, Vocabulary, and Dialogue buttons
        function showContentButtons(part, button) {
            // Reset previous part selection
            document.querySelectorAll(".part-buttons button").forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");

            // Clear previous content buttons and displayed content
            contentSection.innerHTML = "";
            contentSection.classList.remove("hidden");
            displaySection.innerHTML = "";

            activePart = part; // Update active part

            let sections = ["Mistakes", "Vocabulary", "Dialogue"];
            sections.forEach(section => {
                let secButton = document.createElement("button");
                secButton.textContent = section;
                secButton.onclick = () => {
                    secButton.classList.add("loading"); // Add flashing effect
                    displayContent(section, part, secButton);
                };
                contentSection.appendChild(secButton);
            });
        }

        // Function to display selected content
        function displayContent(type, part, button) {
            let dataKey = type.toLowerCase(); // "mistakes", "vocabulary", "dialogue"
            let partKey = dataKey + "_" + part; // e.g., "mistakes_1"

            if (json_content[dataKey] && json_content[dataKey][partKey]) {
                let contentData = json_content[dataKey][partKey];

                if (dataKey === "mistakes") {
                    appendContent(displayMistakes(contentData), part, type, button);
                } else if (dataKey === "vocabulary") {
                    appendContent(displayVocabulary(contentData), part, type, button);
                } else if (dataKey === "dialogue") {
                    appendContent(displayDialogue(contentData), part, type, button);
                }
            }
        }

        // Append content while keeping existing sections
        function appendContent(html, part, type, button) {
            let sectionID = `part${part}-${type}`;
            let existingSection = document.getElementById(sectionID);

            if (!existingSection) {
                let newSection = document.createElement("div");
                newSection.id = sectionID;
                newSection.classList.add("section-content");
                newSection.innerHTML = html;
                displaySection.appendChild(newSection);

                // Remove animation, keep the button highlighted
                button.classList.remove("loading");
                button.classList.add("active");
            }
        }

        // Function to display Mistakes content
        function displayMistakes(data) {
            let html = "<h3>Mistakes</h3>";
            data.mistakes_list.forEach(mistake => {
                html += `<p><b>Original:</b> ${mistake.original}</p>`;
                html += `<p><b>Corrected:</b> <b> ${mistake.corrected}</b></p>`;
                html += `<p><b>Explanation:</b> ${mistake.explanation}</p>`;
                html += `<p><b>Context:</b> <i> ${mistake.context}</i></p>`;
                html += `<hr><br>`; /* Adds an extra blank line */
            });
            return html;
        }





        // Function to display Vocabulary content
        function displayVocabulary(data) {
            let html = "<h3>Vocabulary</h3>";

            // Helper function: Preserve case in context replacement
            function formatContextSentence(sentence, word) {
                const regex = new RegExp(`\\b${word}\\b`, "gi"); // Case-insensitive exact word match
                return sentence.replace(regex, (match) => {
                    return `<span class="bold-italic">${match}</span>`; // Keeps match's case
                });
            }

            // Vocabulary Section
            data.vocabulary_list.forEach((entry, index) => {
                // Word Entry
                html += `<p class="entry-box"> <span class="word">${index + 1}. ${entry.word}</span></p>`;

                // Definition Box
                html += `<div class="definition-box"><span class="bold">Definition:</span> ${entry.definition}</div>`;

                // Context Sentences
                html += "<p>";
                Object.values(entry.context).forEach((sentence, i) => {
                    const formattedSentence = formatContextSentence(sentence, entry.word);
                    html += `<br><span class="bold">Context ${i + 1}:</span> <span class="italic">${formattedSentence}</span>`;
                });
                html += "</p>";
            });

            // Funny Facts Section
            if (data.funny_facts.length > 0) {
                html += `<div class="section-title purple-section">Funny Facts</div>`;
                data.funny_facts.forEach((fact, index) => {
                    html += `<div class="fact-box">
                <p class="fact"><span class="bold">${index + 1}. ${fact.word}:</span> ${fact.fact}</p>
             </div>`;
                });
            }

            // Jokes Section
            if (data.jokes.length > 0) {
                html += `<div class="section-title purple-section">Jokes</div>`;
                data.jokes.forEach((joke, index) => {
                    html += `<div class="joke-box">
                <p class="joke-question">${index + 1}. ${joke.question}</p>
                <p class="italic joke">${joke.answer}</p>
             </div>`;
                });
            }

            return html; // Returning the generated HTML instead of inserting it directly
        }

        function displayDialogue(data) {
            let html = `<div class="dialogue-container">`;
            html += "<h3>Dialogue</h3>";

            data.dialogue_list.forEach(entry => {
                const speaker = Object.keys(entry)[0];
                const line = entry[speaker];

                html += `<div class="line ${speaker === "Person 1" ? 'person-1' : 'person-2'}">
                    <span class="speaker">${speaker}:</span> ${line}
                 </div>`;
            });

            html += `</div>`;
            return html;
        }





        // Initialize part buttons
        createPartButtons();
    </script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Parts</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            color: #444;
            background: linear-gradient(145deg, #eaeaea, #ffffff);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset 2px 2px 4px rgba(0, 0, 0, 0.05),
                inset -2px -2px 4px rgba(255, 255, 255, 0.4);
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        h3 {
            font-size: 50px;
            font-weight: bold;
        }



        #left {
            width: 100%;
            padding: 20px;
            border-right: 2px solid #ccc;
        }

        #right {
            display: none background-color: #f4f4f4;
        }

        .part-buttons,
        .content-buttons {
            margin-bottom: 10px;
        }

        .part-buttons button,
        .content-buttons button {
            margin-right: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .part-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        .content-buttons button.loading {
            animation: flash 0.5s infinite alternate;
        }

        .content-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        @keyframes flash {
            0% {
                background-color: #ffd700;
            }

            100% {
                background-color: #ffa500;
            }
        }

        .hidden {
            display: none;
        }

        .section-content {
            margin-top: 1px;
            padding: 30px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        /* Vocabulary Entry */
        .entry-box {
            font-weight: bold;
            font-size: 1.4em;
            display: inline-block;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 2px;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        /* Definition Box */
        .definition-box {
            background-color: #f4f4f4;
            padding: 8px 12px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            margin: 5px 0;
            max-width: 400px;
            text-align: left;
        }

        /* Word Styling */
        .word {
            font-weight: bold;
            color: #000000;
            font-size: 1.2em;
        }

        .example {
            margin-left: 20px;
            font-style: italic;
        }

        /* Fact Box */
        .fact-box {
            background-color: rgba(142, 68, 173, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(142, 68, 173, 0.15);
            max-width: 500px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: bold;
            padding: 8px 12px;
            display: inline-block;
            border-left: 6px solid rgba(0, 0, 0, 0.2);
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
            margin-bottom: 10px;
            color: white;
        }

        /* Section Colors */
        .purple-section {
            background-color: #8e44ad;
            border-left-color: #6a1b9a;
            box-shadow: 3px 3px 8px rgba(142, 68, 173, 0.3);
        }

        .joke-box {
            background-color: rgba(52, 152, 219, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(52, 152, 219, 0.15);
            max-width: 500px;
        }


        /* Text Formatting */
        .fact {
            color: black;
        }

        /* Joke Text */
        .joke {
            color: #6d1b9a;
            /* Deeper purple for better readability */
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Joke Question Styling */
        .joke-question {
            font-weight: bold;
            font-size: 1.2em;
            font-style: italic;
            color: #2c3e50;
            /* Dark gray-blue for a classy contrast */
            margin-bottom: 5px;
        }

        /* Enhanced Typography */
        .bold {
            font-weight: 600;
            color: #000000;
            /* Darker shade for better contrast */
        }

        .italic {
            font-style: italic;
            color: #000000;
            /* Slightly darker gray for better readability */
        }

        .bold-italic {
            font-weight: 600;
            font-style: italic;
            color: #222;
            /* More emphasis on bold-italic text */
        }

        /* Joke Box - Adds a soft neumorphic effect */
        .joke-box {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1),
                -5px -5px 10px rgba(255, 255, 255, 0.5);
            max-width: 550px;
            transition: all 0.3s ease-in-out;
        }

        /* Joke Box Hover Effect */
        .joke-box:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.6);
        }

        /* Dialogue Container - Left Centered */
        /* Dialogue Container - Auto Width Based on Content */
        .dialogue-container {
            display: inline-block;
            /* Shrinks width to fit content */
            max-width: 800px;
            /* Prevents it from becoming too wide */
            margin: 20px 0;
            /* Aligns it to the left with some spacing */
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }



        /* Individual Dialogue Lines */
        .line {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Styling for Different Speakers */
        .person-1 {
            background: linear-gradient(145deg, #dde5ed, #c9d6e2);
            text-align: left;
            color: #2c3e50;
        }

        .person-2 {
            background: linear-gradient(145deg, #d1e8ff, #b9dfff);
            text-align: left;
            color: #1d3557;
        }

        /* Speaker Name Styling */
        .speaker {
            font-weight: bold;
            margin-bottom: 5px;

            font-size: 1.1em;
            color: #000;
        }
    </style>
</head>

        "vocabulary_7": {
            "vocabulary_list": [
                {
                    "word": "ban / banned",
                    "definition": "To officially prohibit something (an action, product, or service) so it is no longer allowed.",
                    "context": {
                        "Context 1": "Russia banned Instagram, so many users in Russia could no longer access the app.",
                        "Context 2": "The school banned candy in class to reduce distractions during lessons.",
                        "Context 3": "The city banned fireworks in dry conditions to prevent fires."

                },
                {

                    "definition": "To introduce and enforce a rule, restriction, tax, or penalty on people or organizations.",

                        "Context 2": "When the company merged, management imposed a new dress code for all employees.",
                        "Context 3": "To raise funds, the festival organizers imposed a small entrance fee."
                    }
                },
                {

                    "context": {

                        "Context 2": "The library has restrictions on how long you can borrow rare books.",
                        "Context 3": "Parental controls create restrictions on which apps children can open."
                    }
                },
                {

    "dialogue": {
        "dialogue_1": {
            "dialogue_list": [
                {
                    "Person 1": "Hey there! How's it going?"
                },
                {
                    "Person 2": "Hey! I'm doing well, thanks! Just got back from a little trip. How about you?"
                },
                {
                    "Person 1": "Nice! Where did you go?"
                },
                {
                    "Person 2": "I visited Dalat in Vietnam. It's such a beautiful place!"
                },
                {
                    "Person 1": "Dalat? I've heard of it! What's it like?"
                },
                {
                    "Person 2": "It's a highland area with a cool climate. A nice break from the heat, for sure!"
                },
                {
                    "Person 1": "Sounds amazing! So, what are your plans now? Still moving around?"
                },
                {
                    "Person 2": "Yeah! We’ve switched cities a few times already. It’s been quite an adventure!"
                },
                {
                    "Person 1": "That’s awesome! I love that you’re exploring so much."
                },
                {
                    "Person 2": "Thanks! Every city has its own charm. I could talk about them all day!"
                },
                {
                    "Person 1": "You have to show me some pictures! You know I love snapshots of your travels."
                },
                {
                    "Person 2": "For sure! I’ll send them over on Telegram once I get settled."
                },
                {
                    "Person 1": "Sweet! Any good food there?"
                },
                {
                    "Person 2": "Oh, definitely! Tried some dried strawberries with sugar. Really tasty!"
                },
                {
                    "Person 1": "Yum! What about drinks? Did you find anything new?"
                },
                {
                    "Person 2": "I had this really nice tea. Not sure if you’ve heard of it... It’s artichoke tea."
                },
                {
                    "Person 1": "Sounds interesting! I’ve never tried that before."
                },
                {
                    "Person 2": "You should! It’s refreshing, especially there. The weather was just perfect, like 20 degrees Celsius."
                },
                {
                    "Person 1": "Wow, that sounds ideal! Did you get caught in any rain?"
                },
                {
                    "Person 2": "Yeah! It was tropical rain season, and I actually love the rain."
                },
                {
                    "Person 1": "Me too! There’s something cozy about it."
                },
                {
                    "Person 2": "Exactly! And it makes the air feel so fresh."
                },
                {
                    "Person 1": "Hey, have you ever thought about vlogging your adventures?"
                },
                {
                    "Person 2": "You know, I have! It could be fun to share my travels."
                },
                {
                    "Person 1": "I think you'd be great at it! Plus, it might help you connect with more people."
                },
                {
                    "Person 2": "True! But I’m not sure about being popular..."
                },
                {
                    "Person 1": "Why not? You’re an excellent teacher, and sharing your insights could help so many others."
                },
                {
                    "Person 2": "That’s a good point. If it helps, then maybe I should give it a shot!"
                },
                {
                    "Person 1": "Definitely! I can't wait to see you on YouTube or TikTok!"
                },
                {
                    "Person 2": "Haha, I’ll keep you posted. Now tell me about your week!"
                },
                {
                    "Person 1": "Oh, nothing as exciting as yours! Just the usual work and Netflix."
                },
                {
                    "Person 2": "Sounds nice too! Sometimes, a chill week is just what you need."
                }
            ]
        },
        "dialogue_2": {
            "dialogue_list": [
                {
                    "Person 1": "So, how was your trip to Astrakhan? Heard you had quite the adventure!"
                },
                {
                    "Person 2": "It was pretty cool! Astrakhan is cleaner than I expected. Way better than Rostov, I think."
                },
                {
                    "Person 1": "Really? I've always imagined it as a typical Russian city. What did you do there?"
                },
                {
                    "Person 2": "We checked out a Buddha temple. It was a unique experience. I've never been somewhere like that before!"
                },
                {
                    "Person 1": "No kidding! How was the vibe there?"
                },
                {
                    "Person 2": "Super chill. The people were really nice, even when we didn’t know the customs."
                },
                {
                    "Person 1": "Sounds like you had a good time! How long did you stay?"
                },
                {
                    "Person 2": "Not long—only a few days. Got back late last night and just crashed."
                },
                {
                    "Person 1": "I bet! So what are you up to tomorrow? Got any plans?"
                },
                {
                    "Person 2": "I just want to take it easy, maybe catch up on some sleep. School is starting soon."
                },
                {
                    "Person 1": "You’ve been working a lot lately, haven’t you?"
                },
                {
                    "Person 2": "Yeah, I worked through spring break. It was tiring, but I earned some good cash!"
                },
                {
                    "Person 1": "Nice! By the way, what’s with that shirt? It looks like a rope!"
                },
                {
                    "Person 2": "Ha! It’s just a shirt I got a couple of years ago. Not a monk’s robe!"
                },
                {
                    "Person 1": "Haha, fair enough! You still looking a little tanned from your trip?"
                },
                {
                    "Person 2": "Yeah, I really am! Must’ve been all that walking around."
                },
                {
                    "Person 1": "And exploring new places helps keep your mind off food too, right?"
                },
                {
                    "Person 2": "Absolutely! When you’re having fun, eating is the last thing on your mind."
                },
                {
                    "Person 1": "Have any special places in mind for your next adventure?"
                },
                {
                    "Person 2": "I heard about this beautiful lake on the outskirts of town. Supposedly, it's really picturesque."
                },
                {
                    "Person 1": "That sounds amazing! Are you going with anyone?"
                },
                {
                    "Person 2": "Yeah, a friend of mine who’s really into photography. We’re hoping to get some great shots."
                },
                {
                    "Person 1": "Perfect! Just two guys capturing memories by a romantic lake, huh?"
                },
                {
                    "Person 2": "Exactly! Who knows? We might end up as the next big film duo!"
                },
                {
                    "Person 1": "Haha, just make sure to keep it wholesome, alright?"
                }
            ]
        },
        "dialogue_3": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Have you ever thought about how amazing it is to travel to different countries?"
                },
                {
                    "Person 2": "Oh, definitely! I love experiencing new cultures. It feels like I’m opening a new chapter in my life every time I go somewhere."
                },
                {
                    "Person 1": "Exactly! I mean, some people dream of traveling but never get the chance. We’re lucky!"
                },
                {
                    "Person 2": "For sure! I remember this one time, I was in Vietnam, and the food was out of this world. You can’t get that experience just anywhere!"
                },
                {
                    "Person 1": "Vietnam sounds fantastic! I’ve always wanted to try the street food there."
                },
                {
                    "Person 2": "You totally should! It’s such a vibrant place with so much to offer!"
                },
                {
                    "Person 1": "What do you think keeps people traveling? Is it just the excitement of new places?"
                },
                {
                    "Person 2": "I think it’s a mix of adventure and the thrill of learning something new. Plus, the food is a major bonus!"
                },
                {
                    "Person 1": "Haha, right? Food is always a great motivator! Do you prefer relaxing vacations or adventure trips?"
                },
                {
                    "Person 2": "I like both! Sometimes you need to just unwind, but I also love a good hiking trip in the mountains. How about you?"
                },
                {
                    "Person 1": "I’m on the same page. A nice beach day after a mountain hike sounds perfect!"
                },
                {
                    "Person 2": "Totally! And you know, having good travel buddies makes the experience even better."
                },
                {
                    "Person 1": "Absolutely! We can share those unforgettable moments together."
                },
                {
                    "Person 2": "Exactly! So, where do you want to go next?"
                },
                {
                    "Person 1": "I’m thinking maybe Mexico. The beaches, the food—it’s calling my name!"
                },
                {
                    "Person 2": "That sounds amazing! I might just join you on that trip!"
                },
                {
                    "Person 1": "Deal! Let’s make it happen!"
                }
            ]
        },
        "dialogue_4": {
            "dialogue_list": [
                {
                    "Person 1": "Hey, have you ever thought about how different travelers are from regular tourists?"
                },
                {
                    "Person 2": "Totally! Tourists just seem to be in it for the comfort, right? They want everything planned out."
                },
                {
                    "Person 1": "Exactly! Like, they go to all-inclusive resorts and never really explore the place. It’s so limiting."
                },
                {
                    "Person 2": "Right? I met this couple who had been traveling for six months, saving up for their trip. They were all about the experience."
                },
                {
                    "Person 1": "That’s awesome! It makes such a difference when you really immerse yourself in a new culture."
                },
                {
                    "Person 2": "For sure! I mean, when you travel like that, you meet locals and see things beyond just the tourists’ spots."
                },
                {
                    "Person 1": "Yeah, and then there are those people who only take guided tours. I think that's kind of the worst way to travel."
                },
                {
                    "Person 2": "Agreed! You miss so much. You just hit the main attractions and rush back to the hotel."
                },
                {
                    "Person 1": "Exactly! My parents always rented apartments and made their own plans. Just felt more authentic."
                },
                {
                    "Person 2": "That's the way to do it! I think it gives you a real taste of the place."
                },
                {
                    "Person 1": "So, have you traveled abroad yet? I hear it can be a whole different ballgame."
                },
                {
                    "Person 2": "Not yet! But I’ve heard that navigating a new country can be tricky, especially if you don’t know the language."
                },
                {
                    "Person 1": "Oh, for sure! When my friend went to Vietnam, he landed without any plan or even an internet connection."
                },
                {
                    "Person 2": "Yikes! That sounds stressful. How did he even figure out how to get around?"
                },
                {
                    "Person 1": "He had to find a way to change his money right at the airport, which is usually a terrible exchange rate!"
                },
                {
                    "Person 2": "Wow, talk about jumping into the deep end! I guess it all adds to the adventure, though."
                },
                {
                    "Person 1": "Definitely! It’s experiences like those that stick with you forever."
                },
                {
                    "Person 2": "I can’t wait to have my own travel stories like that!"
                }
            ]
        },
        "dialogue_5": {

                {

                {

        "dialogue_6": {
            "dialogue_list": [
                {

                    "Person 2": "No, I missed it! What’s the scoop?"

                    "Person 2": "Definitely! I might even take a trip while working."

            // Set parts_number from json_content
            let parts_number = json_content.parts_number || 0;

        // References to sections
        const partsSection = document.getElementById('partsSection');
        const contentSection = document.getElementById('contentSection');
        const displaySection = document.getElementById('displaySection');

        let activePart = null; // Track the active part

        // Function to create Part buttons
        function createPartButtons() {
            for (let i = 1; i <= parts_number; i++) {
                let button = document.createElement("button");
                button.textContent = "Part " + i;
                button.onclick = () => showContentButtons(i, button);
                partsSection.appendChild(button);
            }
        }

        // Function to show Mistakes, Vocabulary, and Dialogue buttons
        function showContentButtons(part, button) {
            // Reset previous part selection
            document.querySelectorAll(".part-buttons button").forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");

            // Clear previous content buttons and displayed content
            contentSection.innerHTML = "";
            contentSection.classList.remove("hidden");
            displaySection.innerHTML = "";

            activePart = part; // Update active part

            let sections = ["Mistakes", "Vocabulary", "Dialogue"];
            sections.forEach(section => {
                let secButton = document.createElement("button");
                secButton.textContent = section;
                secButton.onclick = () => {
                    secButton.classList.add("loading"); // Add flashing effect
                    displayContent(section, part, secButton);
                };
                contentSection.appendChild(secButton);
            });
        }

        // Function to display selected content
        function displayContent(type, part, button) {
            let dataKey = type.toLowerCase(); // "mistakes", "vocabulary", "dialogue"
            let partKey = dataKey + "_" + part; // e.g., "mistakes_1"

            if (json_content[dataKey] && json_content[dataKey][partKey]) {
                let contentData = json_content[dataKey][partKey];

                if (dataKey === "mistakes") {
                    appendContent(displayMistakes(contentData), part, type, button);
                } else if (dataKey === "vocabulary") {
                    appendContent(displayVocabulary(contentData), part, type, button);
                } else if (dataKey === "dialogue") {
                    appendContent(displayDialogue(contentData), part, type, button);
                }
            }
        }

        // Append content while keeping existing sections
        function appendContent(html, part, type, button) {
            let sectionID = `part${part}-${type}`;
            let existingSection = document.getElementById(sectionID);

            if (!existingSection) {
                let newSection = document.createElement("div");
                newSection.id = sectionID;
                newSection.classList.add("section-content");
                newSection.innerHTML = html;
                displaySection.appendChild(newSection);

                // Remove animation, keep the button highlighted
                button.classList.remove("loading");
                button.classList.add("active");
            }
        }

        // Function to display Mistakes content
        function displayMistakes(data) {
            let html = "<h3>Mistakes</h3>";
            data.mistakes_list.forEach(mistake => {
                html += `<p><b>Original:</b> ${mistake.original}</p>`;
                html += `<p><b>Corrected:</b> <b> ${mistake.corrected}</b></p>`;
                html += `<p><b>Explanation:</b> ${mistake.explanation}</p>`;
                html += `<p><b>Context:</b> <i> ${mistake.context}</i></p>`;
                html += `<hr><br>`; /* Adds an extra blank line */
            });
            return html;
        }





        // Function to display Vocabulary content
        function displayVocabulary(data) {
            let html = "<h3>Vocabulary</h3>";

            // Helper function: Preserve case in context replacement
            function formatContextSentence(sentence, word) {
                const regex = new RegExp(`\\b${word}\\b`, "gi"); // Case-insensitive exact word match
                return sentence.replace(regex, (match) => {
                    return `<span class="bold-italic">${match}</span>`; // Keeps match's case
                });
            }

            // Vocabulary Section
            data.vocabulary_list.forEach((entry, index) => {
                // Word Entry
                html += `<p class="entry-box"> <span class="word">${index + 1}. ${entry.word}</span></p>`;

                // Definition Box
                html += `<div class="definition-box"><span class="bold">Definition:</span> ${entry.definition}</div>`;

                // Context Sentences
                html += "<p>";
                Object.values(entry.context).forEach((sentence, i) => {
                    const formattedSentence = formatContextSentence(sentence, entry.word);
                    html += `<br><span class="bold">Context ${i + 1}:</span> <span class="italic">${formattedSentence}</span>`;
                });
                html += "</p>";
            });

            // Funny Facts Section
            if (data.funny_facts.length > 0) {
                html += `<div class="section-title purple-section">Funny Facts</div>`;
                data.funny_facts.forEach((fact, index) => {
                    html += `<div class="fact-box">
                <p class="fact"><span class="bold">${index + 1}. ${fact.word}:</span> ${fact.fact}</p>
             </div>`;
                });
            }

            // Jokes Section
            if (data.jokes.length > 0) {
                html += `<div class="section-title purple-section">Jokes</div>`;
                data.jokes.forEach((joke, index) => {
                    html += `<div class="joke-box">
                <p class="joke-question">${index + 1}. ${joke.question}</p>
                <p class="italic joke">${joke.answer}</p>
             </div>`;
                });
            }

            return html; // Returning the generated HTML instead of inserting it directly
        }

        function displayDialogue(data) {
            let html = `<div class="dialogue-container">`;
            html += "<h3>Dialogue</h3>";

            data.dialogue_list.forEach(entry => {
                const speaker = Object.keys(entry)[0];
                const line = entry[speaker];

                html += `<div class="line ${speaker === "Person 1" ? 'person-1' : 'person-2'}">
                    <span class="speaker">${speaker}:</span> ${line}
                 </div>`;
            });

            html += `</div>`;
            return html;
        }





        // Initialize part buttons
        createPartButtons();
    </script>

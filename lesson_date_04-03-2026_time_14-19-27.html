<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Parts</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            color: #444;
            background: linear-gradient(145deg, #eaeaea, #ffffff);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset 2px 2px 4px rgba(0, 0, 0, 0.05),
                inset -2px -2px 4px rgba(255, 255, 255, 0.4);
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        h3 {
            font-size: 50px;
            font-weight: bold;
        }



        #left {
            width: 100%;
            padding: 20px;
            border-right: 2px solid #ccc;
        }

        #right {
            display: none background-color: #f4f4f4;
        }

        .part-buttons,
        .content-buttons {
            margin-bottom: 10px;
        }

        .part-buttons button,
        .content-buttons button {
            margin-right: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .part-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        .content-buttons button.loading {
            animation: flash 0.5s infinite alternate;
        }

        .content-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        @keyframes flash {
            0% {
                background-color: #ffd700;
            }

            100% {
                background-color: #ffa500;
            }
        }

        .hidden {
            display: none;
        }

        .section-content {
            margin-top: 1px;
            padding: 30px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        /* Vocabulary Entry */
        .entry-box {
            font-weight: bold;
            font-size: 1.4em;
            display: inline-block;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 2px;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        /* Definition Box */
        .definition-box {
            background-color: #f4f4f4;
            padding: 8px 12px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            margin: 5px 0;
            max-width: 400px;
            text-align: left;
        }

        /* Word Styling */
        .word {
            font-weight: bold;
            color: #000000;
            font-size: 1.2em;
        }

        .example {
            margin-left: 20px;
            font-style: italic;
        }

        /* Fact Box */
        .fact-box {
            background-color: rgba(142, 68, 173, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(142, 68, 173, 0.15);
            max-width: 500px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: bold;
            padding: 8px 12px;
            display: inline-block;
            border-left: 6px solid rgba(0, 0, 0, 0.2);
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
            margin-bottom: 10px;
            color: white;
        }

        /* Section Colors */
        .purple-section {
            background-color: #8e44ad;
            border-left-color: #6a1b9a;
            box-shadow: 3px 3px 8px rgba(142, 68, 173, 0.3);
        }

        .joke-box {
            background-color: rgba(52, 152, 219, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(52, 152, 219, 0.15);
            max-width: 500px;
        }


        /* Text Formatting */
        .fact {
            color: black;
        }

        /* Joke Text */
        .joke {
            color: #6d1b9a;
            /* Deeper purple for better readability */
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Joke Question Styling */
        .joke-question {
            font-weight: bold;
            font-size: 1.2em;
            font-style: italic;
            color: #2c3e50;
            /* Dark gray-blue for a classy contrast */
            margin-bottom: 5px;
        }

        /* Enhanced Typography */
        .bold {
            font-weight: 600;
            color: #000000;
            /* Darker shade for better contrast */
        }

        .italic {
            font-style: italic;
            color: #000000;
            /* Slightly darker gray for better readability */
        }

        .bold-italic {
            font-weight: 600;
            font-style: italic;
            color: #222;
            /* More emphasis on bold-italic text */
        }

        /* Joke Box - Adds a soft neumorphic effect */
        .joke-box {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1),
                -5px -5px 10px rgba(255, 255, 255, 0.5);
            max-width: 550px;
            transition: all 0.3s ease-in-out;
        }

        /* Joke Box Hover Effect */
        .joke-box:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.6);
        }

        /* Dialogue Container - Left Centered */
        /* Dialogue Container - Auto Width Based on Content */
        .dialogue-container {
            display: inline-block;
            /* Shrinks width to fit content */
            max-width: 800px;
            /* Prevents it from becoming too wide */
            margin: 20px 0;
            /* Aligns it to the left with some spacing */
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }



        /* Individual Dialogue Lines */
        .line {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Styling for Different Speakers */
        .person-1 {
            background: linear-gradient(145deg, #dde5ed, #c9d6e2);
            text-align: left;
            color: #2c3e50;
        }

        .person-2 {
            background: linear-gradient(145deg, #d1e8ff, #b9dfff);
            text-align: left;
            color: #1d3557;
        }

        /* Speaker Name Styling */
        .speaker {
            font-weight: bold;
            margin-bottom: 5px;

            font-size: 1.1em;
            color: #000;
        }
    </style>
</head>

    "dialogue": {
        "dialogue_1": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Happy belated birthday! What did you end up doing?"
                },
                {
                    "Person 2": "Thanks! It was awesome! I went to a concert and had a little get-together with friends."
                },
                {
                    "Person 1": "Nice! Any funny stories from the concert?"
                },
                {
                    "Person 2": "Oh, tons! At one point, the crowd started singing 'Happy Birthday' to me! I was so surprised!"
                },
                {
                    "Person 1": "No way! How did they even know it was your birthday?"
                },
                {
                    "Person 2": "My friend shouted it out loud, and everyone just joined in. It was surreal!"
                },
                {
                    "Person 1": "That sounds epic! Who was performing?"
                },
                {
                    "Person 2": "It was Slava Kapisets. I was so close to the stage; I could see everything!"
                },
                {
                    "Person 1": "Sweet! Did you get any videos?"
                },
                {
                    "Person 2": "Yeah, I recorded some on my PS Vita. The video quality isn't great, but the vibe was amazing."
                },
                {
                    "Person 1": "A PS Vita, huh? That's a blast from the past! I bet that turned some heads."
                },
                {
                    "Person 2": "Definitely! Some people thought it was a bomb! But I just wanted to capture the moment."
                },
                {
                    "Person 1": "Haha, I can picture it! So what did you get for gifts?"
                },
                {
                    "Person 2": "Oh, my roommate gave me a coat hanger and a cup shaped like a Lego head. Very practical!"
                },
                {
                    "Person 1": "Funny! My friends usually just give me random stuff too."
                },
                {
                    "Person 2": "Yeah, one year, I got a rock. Kind of useful, I guess!"
                },
                {
                    "Person 1": "A rock? Wow, that's creative! I'm sure you found a use for it."
                },
                {
                    "Person 2": "Totally! I use it to keep my window propped open sometimes."
                },
                {
                    "Person 1": "Hey, at least it's a gift that keeps on giving! Got any plans for the next birthday?"
                },
                {
                    "Person 2": "Maybe just a small thing with close friends. Can’t top this year anyway!"
                }
            ]
        },
        "dialogue_2": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Did you get that cool t-shirt from the concert last weekend?"
                },
                {
                    "Person 2": "Yeah, I did! It's got a skeleton on fire with 'Autism' written on it. It's pretty awesome!"
                },
                {
                    "Person 1": "Nice! And I heard you played a character with autism named Dima. That’s amazing, congrats on the Oscar!"
                },
                {
                    "Person 2": "Thanks! That was a fun role. The post-concert vibes were great too, lots of cool stuff happening."
                },
                {
                    "Person 1": "Oh, definitely! I saw your post about the Telegram chat. Did that thing really get abandoned?"
                },
                {
                    "Person 2": "Yeah, it kind of fell apart after the concerts ended. But I tried selling my bike there."
                },
                {
                    "Person 1": "Your bike? That's interesting! Did you manage to sell it?"
                },
                {
                    "Person 2": "Not yet. I figured I'd throw in some roller blades as well. Ever heard of them?"
                },
                {
                    "Person 1": "Roller blades? Sure! Aren't they those boots with wheels?"
                },
                {
                    "Person 2": "Exactly! Maybe I should just call them ‘rollers’ instead."
                },
                {
                    "Person 1": "Rollers! That sounds cooler. So you were trying to sell those too?"
                },
                {
                    "Person 2": "Yep! Got caught up in that marketplace chat. It turned into a huge meme!"
                },
                {
                    "Person 1": "Sounds like a good laugh! Did you end up trading anything?"
                },
                {
                    "Person 2": "Actually, I traded some roller blades for a concert poster. It was a funny little deal!"
                },
                {
                    "Person 1": "That’s a hilarious trade! Your birthday sounds like a blast too!"
                },
                {
                    "Person 2": "It was! I got some cool presents, including a couple of bracelets from my sister."
                },
                {
                    "Person 1": "That’s awesome! You’re going to end up with so many bracelets soon."
                },
                {
                    "Person 2": "I might! I even told my dad I wanted a piercing for my birthday."
                },
                {
                    "Person 1": "A piercing, huh? You should totally go for it with a golden needle!"
                },
                {
                    "Person 2": "Right? Just imagine! But my dad gave me the usual bracelet instead."
                },
                {
                    "Person 1": "Classic dad move! How was the rest of your week?"
                },
                {
                    "Person 2": "Nothing much, just finished a game called Resident Evil Requiem. It was pretty cool!"
                },
                {
                    "Person 1": "Oh, I thought you weren’t a fan of that one?"
                },
                {
                    "Person 2": "No, actually, I liked it a lot! I must have mixed it up with another game."
                },
                {
                    "Person 1": "Glad to hear! Maybe you should write a review on it."
                },
                {
                    "Person 2": "I might just do that. Next time, let's hang out after a concert and chat more."
                },
                {
                    "Person 1": "Absolutely! I'm looking forward to it!"
                }
            ]
        },
        "dialogue_3": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Did you hear about the plans for that weekend trip?"
                },
                {
                    "Person 2": "I did! Are we still thinking about renting that cabin in the mountains?"
                },
                {
                    "Person 1": "Yeah! But it depends on who’s coming. I hope everyone’s down for it."
                },
                {
                    "Person 2": "Totally! It would be a fun getaway. I’ve been needing some time outdoors."

                {
                    "Person 1": "Same here! And we could do some hiking and maybe even have a bonfire at night."
                },
                {
                    "Person 2": "That sounds amazing. I just hope the weather cooperates. Last time was a little rainy, remember?"
                },
                {
                    "Person 1": "Yeah, that was a bummer. But we still had a good time just hanging out inside."
                },
                {
                    "Person 2": "True! And I finally beat you at that card game."
                },
                {
                    "Person 1": "Only because you caught me off guard! I demand a rematch!"
                },
                {
                    "Person 2": "Bring it on! I’m ready this time. Also, any thoughts on food for the trip?"
                },
                {
                    "Person 1": "Oh, definitely some snacks! We need tons of chips and maybe some s'mores ingredients."
                },
                {
                    "Person 2": "Yes! S'mores are a must. I can bring the chocolate and marshmallows."
                },
                {
                    "Person 1": "Perfect! I’ll handle the graham crackers and some drinks."
                },
                {
                    "Person 2": "Awesome! This is gonna be so much fun. When are we finalizing everything?"
                },
                {
                    "Person 1": "Let’s try to wrap it up by the end of this week. The sooner the better!"
                },
                {
                    "Person 2": "Sounds good! I can’t wait!"
                }
            ]
        },
        "dialogue_4": {
            "dialogue_list": [
                {
                    "Person 1": "Hey, did you see that it's finally spring outside? It's so sunny today!"
                },
                {
                    "Person 2": "Yeah, I noticed! I opened the window, and it felt so warm. The birds are chirping too!"
                },
                {
                    "Person 1": "I love that! In my hometown, we’d hear birds in May, but here, they start in March."
                },
                {
                    "Person 2": "Lucky you! I’m still getting tired of all the snow. When is winter going to end?"
                },
                {
                    "Person 1": "Spring is nice, but do you think it's one of those seasons that are both needed and not really?"
                },
                {
                    "Person 2": "Totally! Like, winter is for snow and summer is for the beach, but spring feels a bit... in between, right?"
                },
                {
                    "Person 1": "Yeah! It’s like we're just waiting for summer to come. But I do enjoy it, especially when I go for walks."
                },
                {
                    "Person 2": "Speaking of walks, do you remember those walks by the river back in Pavlodar?"
                },
                {
                    "Person 1": "Oh, for sure! I miss that so much. The embankment was so beautiful, especially during spring."
                },
                {
                    "Person 2": "Exactly! And the plov we used to eat was amazing. I'm craving that now!"
                },
                {
                    "Person 1": "You know, we should plan a trip back there sometime. It would be fun to revisit those spots."
                },
                {
                    "Person 2": "That would be great! It’s been too long since I’ve been home. I think we have to go back this year."
                },
                {
                    "Person 1": "For sure! I heard nothing much is happening, so why not?"
                },
                {
                    "Person 2": "Yeah, we should just go and enjoy the nostalgia. By the way, how's school going for you?"
                },
                {
                    "Person 1": "It’s okay, just counting down the days until summer. I only have to study two days this week!"
                },
                {
                    "Person 2": "Nice! A little break is always good. Are you nervous about any of your marks?"
                },
                {
                    "Person 1": "Not really, nothing stresses me out too much these days. Just looking forward to summer!"
                },
                {
                    "Person 2": "That’s awesome! But hey, do you really have nothing to do in Stanislav?"
                },
                {
                    "Person 1": "Honestly? Not much. I used to walk around more, but now we mostly hang out in Rostov."
                },
                {
                    "Person 2": "Yeah, I get it. Just video games and Netflix can get boring after a while."
                },
                {
                    "Person 1": "For sure! I’ve been watching interviews with actors and artists lately—it's pretty interesting."
                },
                {
                    "Person 2": "Oh, like Killian Murphy from Peaky Blinders? I love his work!"
                },
                {
                    "Person 1": "Exactly! He’s such a fascinating guy. I enjoy those interviews more than playing games sometimes."
                },
                {
                    "Person 2": "Sounds like a plan! Let’s catch up again after we watch some more. What should we watch next?"
                }
            ]
        },
        "dialogue_5": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! What have you been up to lately?"
                },
                {
                    "Person 2": "Not much, just hanging out with friends on Discord. You know how it is."
                },
                {
                    "Person 1": "Oh yeah, I remember those days! Just chatting about random stuff?"
                },
                {
                    "Person 2": "Exactly! We have a big group, and it’s pretty chill. Lots of laughs."
                },
                {
                    "Person 1": "Sounds fun! Do you miss school days? I feel like those were the best times."
                },
                {
                    "Person 2": "For sure! I miss 10th grade the most. It felt like we had all the time in the world."
                },
                {
                    "Person 1": "Right? No stress about college or exams yet, just fun."
                },
                {
                    "Person 2": "Exactly! In 11th grade, everything gets so serious. Everyone's rushing to figure things out."
                },
                {
                    "Person 1": "Totally! And in 9th grade, I was just having the time of my life, barely studying."
                },
                {
                    "Person 2": "Same! I remember winging a lot of tests. Somehow, I still passed!"
                },
                {
                    "Person 1": "It’s a miracle sometimes how that works out! But it was fun."
                },
                {
                    "Person 2": "Yeah! And now, I feel like we don’t see as many people around."
                },
                {
                    "Person 1": "Yeah, a bunch of my friends went to vocational school or moved away."
                },
                {
                    "Person 2": "It’s wild. But hey, at least we still have our little group."
                },
                {
                    "Person 1": "Absolutely! Gotta keep that sense of community."
                },
                {
                    "Person 2": "For sure! I love that feeling of being part of something. Even if it’s just online."
                },
                {
                    "Person 1": "Exactly! And you know, I feel like we can invest time in things we enjoy now, like reading."
                },
                {
                    "Person 2": "Exactly! I could dive into a book series and not worry about time."
                },
                {
                    "Person 1": "Yeah, it’s the best feeling! Like we can finally do what we want."
                },
                {
                    "Person 2": "Totally agree! And hanging out with people makes it even better."
                },
                {
                    "Person 1": "For sure! So, when’s our next hangout, in-person or online?"
                },
                {
                    "Person 2": "Let’s plan for this weekend! It’ll be a blast!"
                }
            ]
        },
        "dialogue_6": {
            "dialogue_list": [
                {
                    "Person 1": "Hey, have you ever thought about how different people can be? Like, some are super interesting while others are just... there?"
                },
                {
                    "Person 2": "Oh, totally! I love meeting new people, but sometimes I wonder why some folks are so dull."
                },
                {
                    "Person 1": "Right? It’s like you meet someone and they’re vibrant and full of stories, then another person is just silent."
                },
                {
                    "Person 2": "Exactly! But I guess that's what makes the world colorful, huh?"
                },
                {
                    "Person 1": "For sure! Speaking of diversity, any new plans for the weekend?"
                },
                {
                    "Person 2": "I was thinking of trying that new escape room downtown. How about you?"

                    "Person 1": "Oh, that sounds fun! I might join you. I’ve heard good things about it."

                {
                    "Person 2": "Awesome! Just the right mix of teamwork and puzzle-solving!"

                    "Person 1": "Yeah, they’re really pushing us this time! I’m a bit nervous about it."

                {
                    "Person 2": "Same here. What topic did you choose?"

                    "Person 1": "I decided to write about social media and its effects on communication. Kind of a hot topic."

                {
                    "Person 2": "That’s a good one! So much to explore there."

                {
                    "Person 1": "Exactly! I’m thinking about how it connects us but also makes us less personal at times."

                {
                    "Person 2": "That’s a valid point! I feel like we need to make sure to balance online interactions with real-life connections."
                },
                {
                    "Person 1": "For sure! Anyway, let’s meet up and brainstorm ideas for our essays soon?"

        "dialogue_7": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Have you noticed how crazy the social media stuff has gotten lately?"
                },
                {
                    "Person 2": "Oh man, tell me about it! It feels like everywhere you look, there’s just propaganda nonstop."
                },
                {
                    "Person 1": "Right? Like, even with the Israel and Hamas situation, all the posts I see are just one-sided."
                },
                {
                    "Person 2": "Totally! It’s like people just pick a side without even knowing the full story."
                },
                {
                    "Person 1": "Exactly! I mean, I support Israel, but it’s tough to see everyone jumping on the anti-Israel train based on what they see online."
                },
                {
                    "Person 2": "Same here! And it really makes you wonder how much is real and how much is just manipulation."
                },
                {
                    "Person 1": "Yeah, I heard there’s a lot of money behind those social media campaigns."
                },
                {
                    "Person 2": "Absolutely! It’s like whoever spends the most gets the loudest voice."
                },
                {
                    "Person 1": "So do you think it’s better to ignore it all or try to get informed?"
                },
                {
                    "Person 2": "There’s a fine line, for sure. I think knowing what’s really happening is important, but it can be exhausting."
                },
                {
                    "Person 1": "Right? Sometimes I just want to stick to cute cat videos and avoid the heavy stuff."
                },
                {
                    "Person 2": "Haha, me too! But I guess we can’t be ignorant either."
                },
                {
                    "Person 1": "True! How about we do a little research together? Maybe we can balance it out?"
                },
                {
                    "Person 2": "Great idea! Just no rabbit holes that take all day, okay?"
                },
                {
                    "Person 1": "Deal! Let's keep it productive and maybe reward ourselves with some dessert afterward."

                {
                    "Person 2": "Sounds like a plan! You get the ice cream, and I’ll handle the research."

        "dialogue_8": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Did you see the new TikTok trends this week?"
                },
                {
                    "Person 2": "Oh man, I try to avoid TikTok as much as I can. It’s so addictive!"
                },
                {
                    "Person 1": "I know what you mean! I can’t seem to stop scrolling whenever I open the app."
                },
                {
                    "Person 2": "Seriously! I meant to watch a movie last night, but I ended up on TikTok for two hours instead."
                },
                {
                    "Person 1": "Right? It’s like those short videos just keep pulling you in."

                {
                    "Person 2": "Exactly! I used to be able to sit and watch a whole film, but now I can barely focus."

                {
                    "Person 1": "Have you tried setting limits on your screen time?"

                {
                    "Person 1": "Yeah, but that requires more effort than just watching a quick video."

                {
                    "Person 2": "True! Maybe we need to challenge each other to make it more fun?"

                {
                    "Person 1": "I like that idea! How about we try to read a book together and discuss it?"
                },
                {
                    "Person 2": "Sounds like a plan! But first, let me just check one more TikTok…"

                {
                    "Person 1": "Ha! There it is. The struggle is real!"

                    "Person 2": "I know, right? Let’s definitely start tomorrow!"

            ]

        "dialogue_9": {
            "dialogue_list": [
                {

                    "Person 1": "Sounds good! But honestly, it's hard to resist checking it sometimes."
                },
                {
                    "Person 2": "For sure! I’m always like, ‘Just one more video!’ and then an hour passes!"
                },
                {
                    "Person 1": "Haha, I know! But maybe we can keep each other accountable?"
                },
                {
                    "Person 2": "Definitely! Let’s start tomorrow. Unless, of course, we get distracted again!"
                },
                {
                    "Person 1": "Deal! I’ll make sure to remind you."

        }

            // Set parts_number from json_content
            let parts_number = json_content.parts_number || 0;

        // References to sections
        const partsSection = document.getElementById('partsSection');
        const contentSection = document.getElementById('contentSection');
        const displaySection = document.getElementById('displaySection');

        let activePart = null; // Track the active part

        // Function to create Part buttons
        function createPartButtons() {
            for (let i = 1; i <= parts_number; i++) {
                let button = document.createElement("button");
                button.textContent = "Part " + i;
                button.onclick = () => showContentButtons(i, button);
                partsSection.appendChild(button);
            }
        }

        // Function to show Mistakes, Vocabulary, and Dialogue buttons
        function showContentButtons(part, button) {
            // Reset previous part selection
            document.querySelectorAll(".part-buttons button").forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");

            // Clear previous content buttons and displayed content
            contentSection.innerHTML = "";
            contentSection.classList.remove("hidden");
            displaySection.innerHTML = "";

            activePart = part; // Update active part

            let sections = ["Mistakes", "Vocabulary", "Dialogue"];
            sections.forEach(section => {
                let secButton = document.createElement("button");
                secButton.textContent = section;
                secButton.onclick = () => {
                    secButton.classList.add("loading"); // Add flashing effect
                    displayContent(section, part, secButton);
                };
                contentSection.appendChild(secButton);
            });
        }

        // Function to display selected content
        function displayContent(type, part, button) {
            let dataKey = type.toLowerCase(); // "mistakes", "vocabulary", "dialogue"
            let partKey = dataKey + "_" + part; // e.g., "mistakes_1"

            if (json_content[dataKey] && json_content[dataKey][partKey]) {
                let contentData = json_content[dataKey][partKey];

                if (dataKey === "mistakes") {
                    appendContent(displayMistakes(contentData), part, type, button);
                } else if (dataKey === "vocabulary") {
                    appendContent(displayVocabulary(contentData), part, type, button);
                } else if (dataKey === "dialogue") {
                    appendContent(displayDialogue(contentData), part, type, button);
                }
            }
        }

        // Append content while keeping existing sections
        function appendContent(html, part, type, button) {
            let sectionID = `part${part}-${type}`;
            let existingSection = document.getElementById(sectionID);

            if (!existingSection) {
                let newSection = document.createElement("div");
                newSection.id = sectionID;
                newSection.classList.add("section-content");
                newSection.innerHTML = html;
                displaySection.appendChild(newSection);

                // Remove animation, keep the button highlighted
                button.classList.remove("loading");
                button.classList.add("active");
            }
        }

        // Function to display Mistakes content
        function displayMistakes(data) {
            let html = "<h3>Mistakes</h3>";
            data.mistakes_list.forEach(mistake => {
                html += `<p><b>Original:</b> ${mistake.original}</p>`;
                html += `<p><b>Corrected:</b> <b> ${mistake.corrected}</b></p>`;
                html += `<p><b>Explanation:</b> ${mistake.explanation}</p>`;
                html += `<p><b>Context:</b> <i> ${mistake.context}</i></p>`;
                html += `<hr><br>`; /* Adds an extra blank line */
            });
            return html;
        }





        // Function to display Vocabulary content
        function displayVocabulary(data) {
            let html = "<h3>Vocabulary</h3>";

            // Helper function: Preserve case in context replacement
            function formatContextSentence(sentence, word) {
                const regex = new RegExp(`\\b${word}\\b`, "gi"); // Case-insensitive exact word match
                return sentence.replace(regex, (match) => {
                    return `<span class="bold-italic">${match}</span>`; // Keeps match's case
                });
            }

            // Vocabulary Section
            data.vocabulary_list.forEach((entry, index) => {
                // Word Entry
                html += `<p class="entry-box"> <span class="word">${index + 1}. ${entry.word}</span></p>`;

                // Definition Box
                html += `<div class="definition-box"><span class="bold">Definition:</span> ${entry.definition}</div>`;

                // Context Sentences
                html += "<p>";
                Object.values(entry.context).forEach((sentence, i) => {
                    const formattedSentence = formatContextSentence(sentence, entry.word);
                    html += `<br><span class="bold">Context ${i + 1}:</span> <span class="italic">${formattedSentence}</span>`;
                });
                html += "</p>";
            });

            // Funny Facts Section
            if (data.funny_facts.length > 0) {
                html += `<div class="section-title purple-section">Funny Facts</div>`;
                data.funny_facts.forEach((fact, index) => {
                    html += `<div class="fact-box">
                <p class="fact"><span class="bold">${index + 1}. ${fact.word}:</span> ${fact.fact}</p>
             </div>`;
                });
            }

            // Jokes Section
            if (data.jokes.length > 0) {
                html += `<div class="section-title purple-section">Jokes</div>`;
                data.jokes.forEach((joke, index) => {
                    html += `<div class="joke-box">
                <p class="joke-question">${index + 1}. ${joke.question}</p>
                <p class="italic joke">${joke.answer}</p>
             </div>`;
                });
            }

            return html; // Returning the generated HTML instead of inserting it directly
        }

        function displayDialogue(data) {
            let html = `<div class="dialogue-container">`;
            html += "<h3>Dialogue</h3>";

            data.dialogue_list.forEach(entry => {
                const speaker = Object.keys(entry)[0];
                const line = entry[speaker];

                html += `<div class="line ${speaker === "Person 1" ? 'person-1' : 'person-2'}">
                    <span class="speaker">${speaker}:</span> ${line}
                 </div>`;
            });

            html += `</div>`;
            return html;
        }





        // Initialize part buttons
        createPartButtons();
    </script>

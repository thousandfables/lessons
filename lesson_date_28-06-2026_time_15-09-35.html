<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Parts</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            color: #444;
            background: linear-gradient(145deg, #eaeaea, #ffffff);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset 2px 2px 4px rgba(0, 0, 0, 0.05),
                inset -2px -2px 4px rgba(255, 255, 255, 0.4);
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        h3 {
            font-size: 50px;
            font-weight: bold;
        }



        #left {
            width: 100%;
            padding: 20px;
            border-right: 2px solid #ccc;
        }

        #right {
            display: none background-color: #f4f4f4;
        }

        .part-buttons,
        .content-buttons {
            margin-bottom: 10px;
        }

        .part-buttons button,
        .content-buttons button {
            margin-right: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .part-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        .content-buttons button.loading {
            animation: flash 0.5s infinite alternate;
        }

        .content-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        @keyframes flash {
            0% {
                background-color: #ffd700;
            }

            100% {
                background-color: #ffa500;
            }
        }

        .hidden {
            display: none;
        }

        .section-content {
            margin-top: 1px;
            padding: 30px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        /* Vocabulary Entry */
        .entry-box {
            font-weight: bold;
            font-size: 1.4em;
            display: inline-block;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 2px;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        /* Definition Box */
        .definition-box {
            background-color: #f4f4f4;
            padding: 8px 12px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            margin: 5px 0;
            max-width: 400px;
            text-align: left;
        }

        /* Word Styling */
        .word {
            font-weight: bold;
            color: #000000;
            font-size: 1.2em;
        }

        .example {
            margin-left: 20px;
            font-style: italic;
        }

        /* Fact Box */
        .fact-box {
            background-color: rgba(142, 68, 173, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(142, 68, 173, 0.15);
            max-width: 500px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: bold;
            padding: 8px 12px;
            display: inline-block;
            border-left: 6px solid rgba(0, 0, 0, 0.2);
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
            margin-bottom: 10px;
            color: white;
        }

        /* Section Colors */
        .purple-section {
            background-color: #8e44ad;
            border-left-color: #6a1b9a;
            box-shadow: 3px 3px 8px rgba(142, 68, 173, 0.3);
        }

        .joke-box {
            background-color: rgba(52, 152, 219, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(52, 152, 219, 0.15);
            max-width: 500px;
        }


        /* Text Formatting */
        .fact {
            color: black;
        }

        /* Joke Text */
        .joke {
            color: #6d1b9a;
            /* Deeper purple for better readability */
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Joke Question Styling */
        .joke-question {
            font-weight: bold;
            font-size: 1.2em;
            font-style: italic;
            color: #2c3e50;
            /* Dark gray-blue for a classy contrast */
            margin-bottom: 5px;
        }

        /* Enhanced Typography */
        .bold {
            font-weight: 600;
            color: #000000;
            /* Darker shade for better contrast */
        }

        .italic {
            font-style: italic;
            color: #000000;
            /* Slightly darker gray for better readability */
        }

        .bold-italic {
            font-weight: 600;
            font-style: italic;
            color: #222;
            /* More emphasis on bold-italic text */
        }

        /* Joke Box - Adds a soft neumorphic effect */
        .joke-box {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1),
                -5px -5px 10px rgba(255, 255, 255, 0.5);
            max-width: 550px;
            transition: all 0.3s ease-in-out;
        }

        /* Joke Box Hover Effect */
        .joke-box:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.6);
        }

        /* Dialogue Container - Left Centered */
        /* Dialogue Container - Auto Width Based on Content */
        .dialogue-container {
            display: inline-block;
            /* Shrinks width to fit content */
            max-width: 800px;
            /* Prevents it from becoming too wide */
            margin: 20px 0;
            /* Aligns it to the left with some spacing */
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }



        /* Individual Dialogue Lines */
        .line {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Styling for Different Speakers */
        .person-1 {
            background: linear-gradient(145deg, #dde5ed, #c9d6e2);
            text-align: left;
            color: #2c3e50;
        }

        .person-2 {
            background: linear-gradient(145deg, #d1e8ff, #b9dfff);
            text-align: left;
            color: #1d3557;
        }

        /* Speaker Name Styling */
        .speaker {
            font-weight: bold;
            margin-bottom: 5px;

            font-size: 1.1em;
            color: #000;
        }
    </style>
</head>

<body>

    <div id="left">
        <h2>Lesson Parts</h2>
        <div id="partsSection" class="part-buttons"></div>
        <div id="contentSection" class="content-buttons hidden"></div>
        <div id="displaySection"></div>
    </div>

    <div id="right">
        <!-- Reserved for later use -->
    </div>

    <script>
        // Declare json_content but do not fill it
        let json_content = {
    "parts_number": 7,
    "mistakes": {
        "mistakes_1": {
            "mistakes_list": [
                {
                    "original": "I had not the best sleep today.",
                    "corrected": "I did not have the best sleep today.",
                    "explanation": "\"Had not\" is incorrect; the correct phrase is \"did not have\" to express a negative past experience.",
                    "context": "I feel kind of sleepy right now. I did not have the best sleep today. It's just one of those days."
                },
                {
                    "original": "Maybe it's a weather some kind of influence me.",
                    "corrected": "Maybe the weather is having some kind of influence on me.",
                    "explanation": "The phrase requires the definite article \"the\" and the correct verb form \"is having\"; \"influence\" should take the preposition \"on.\"",
                    "context": "I'm feeling a bit off today. Maybe the weather is having some kind of influence on me. Regardless, I'm ready for our class."
                },
                {
                    "original": "but you know, the last time I was in the region and that's why it was some problems with the light",
                    "corrected": "but you know, the last time I was in the region, there were some problems with the electricity.",
                    "explanation": "\"It was some problems\" is incorrect; use \"there were\" to describe existence, and \"with the electricity\" is more specific than just \"the light.\"",
                    "context": "I live in Rostov and Don. You know, the last time I was in the region, there were some problems with the electricity. Hopefully, that won't happen again."
                },
                {
                    "original": "it's not that controlled.",
                    "corrected": "it's not very controlled.",
                    "explanation": "The phrase \"that controlled\" is awkward; saying \"very controlled\" is more idiomatic in this context.",
                    "context": "I think everything will be fine for our lesson. However, it's not very controlled when it comes to certain services here."
                },
                {
                    "original": "In Rostov here are some problems with internet can be",
                    "corrected": "In Rostov, there can be some problems with the internet.",
                    "explanation": "The phrase structure is awkward; use \"there can be\" to indicate occurrence and add a comma for clarity.",
                    "context": "Sometimes technical issues arise. In Rostov, there can be some problems with the internet. I hope everything stays stable."
                },
                {
                    "original": "I'm a bit lack of confidence about knowledge about something that I used to work with adults",
                    "corrected": "I lack a bit of confidence in my knowledge about what I used to work on with adults.",
                    "explanation": "The phrase \"a bit lack of confidence\" is incorrectly structured; the correct form is \"I lack a bit of confidence,\" and clarify \"in my knowledge\" rather than using two \"about.\"",
                    "context": "I work as an English tutor, but I'm not as confident in teaching adults. I lack a bit of confidence in my knowledge about what I used to work on with adults."
                },
                {
                    "original": "but like working with kids is kind of challenging, right?",
                    "corrected": "But working with kids is kind of challenging, right?",
                    "explanation": "The word “like” is unnecessary in this context; removing it creates a clearer sentence.",
                    "context": "I enjoy my job, but working with kids is kind of challenging, right? They have their own unique needs."
                },
                {
                    "original": "Why do you have to be sorry?",
                    "corrected": "Why should you be sorry?",
                    "explanation": "\"Have to\" suggests obligation and is not appropriate here; \"should\" fits better in asking about justification.",
                    "context": "It's nice to see your passion for teaching. Why should you be sorry for stumbling over words? It's perfectly natural."
                },
                {
                    "original": "I prepared some personnel classes for them.",
                    "corrected": "I prepared some personalized classes for them.",
                    "explanation": "\"Personnel classes\" is incorrect; it should be \"personalized classes\" to indicate tailored lessons.",
                    "context": "I've been developing my tutoring methods. I prepared some personalized classes for them based on their interests."
                },
                {
                    "original": "I just need to also some time for self development",
                    "corrected": "I just need some time for self-development as well.",
                    "explanation": "The phrasing is awkward; there's no need for \"to also\" in this context, and a hyphen is needed in \"self-development.\"",
                    "context": "I value my learning outside of formal classes. I just need some time for self-development as well."
                },
                {
                    "original": "you develop like an more intimate, more close connection.",
                    "corrected": "you develop a more intimate, closer connection.",
                    "explanation": "The article should be \"a\" instead of \"an\" before \"more intimate,\" and use the comparative form of \"close\" for clearer expression.",
                    "context": "The bond with a tutor is more than just educational. You develop a more intimate, closer connection with them."
                },
                {
                    "original": "I don't have like the certain answer about it",
                    "corrected": "I don't have a certain answer about it.",
                    "explanation": "The word \"like\" is unnecessary in this context; simply use \"a certain answer\" for clarity.",
                    "context": "When asked about taking the IELTS, I'm not quite sure. I don't have a certain answer about it, but I consider my motivation seriously."
                }
            ]
        },
        "mistakes_2": {
            "mistakes_list": [
                {
                    "original": "the lack of knowledge as it will be in some time.",
                    "corrected": "the lack of knowledge that I will have at that time.",
                    "explanation": "The phrase 'as it will be in some time' is unclear; 'that I will have at that time' clarifies the meaning.",
                    "context": "I'm considering taking a test in Georgia soon. However, I'm unsure of my readiness due to the lack of knowledge that I will have at that time."
                },
                {
                    "original": "knowledge is uncountable.",
                    "corrected": "knowledge is an uncountable noun.",
                    "explanation": "The complete term 'an uncountable noun' offers a more precise definition than just stating it is uncountable.",
                    "context": "In our discussion about nouns, I mentioned that knowledge is an uncountable noun, differentiating it from countable nouns."
                },
                {
                    "original": "there is no correlation with Russian words that are accountable in Russian are uncountable in English or in vice versa.",
                    "corrected": "there is no correlation between Russian words that are countable in Russian and those that are uncountable in English or vice versa.",
                    "explanation": "'Accountable' is incorrect; 'countable' should be used to describe nouns that can be counted. The phrase also needs better conjunctions.",
                    "context": "While discussing the differences between languages, I pointed out that there is no correlation between Russian words that are countable in Russian and those that are uncountable in English or vice versa."
                },
                {
                    "original": "the most tangled for me.",
                    "corrected": "the most challenging for me.",
                    "explanation": "'Tangled' is not the appropriate word; 'challenging' more accurately describes something that is difficult.",
                    "context": "While discussing my writing, I acknowledged that writing part is the most challenging for me, as I haven't prepared adequately for it."
                },
                {
                    "original": "it can be strong those problem.",
                    "corrected": "it can be a strong problem for me.",
                    "explanation": "The structure is incorrect; it should clearly state 'a strong problem' instead of the confused wording.",
                    "context": "When talking about writing essays, I shared that sometimes it can be a strong problem for me to put my own ideas into it."
                },
                {
                    "original": "I will create a Google docs document.",
                    "corrected": "I will create a Google Docs document.",
                    "explanation": "'Google Docs' should be capitalized as it is a proper noun.",
                    "context": "As part of our lesson plan, I mentioned that I will create a Google Docs document for you to edit and add your essays."
                },
                {
                    "original": "you send me a site and I read on the essays there.",
                    "corrected": "you send me a link and I will read the essays there.",
                    "explanation": "'Site' is not the correct term here; 'link' is appropriate. Additionally, 'will read' is more grammatically correct.",
                    "context": "I asked you to send me a link so that I can read the essays you uploaded there before our class."
                },
                {
                    "original": "the title. Yeah. The essay title and the actual essay.",
                    "corrected": "the title of the essay and the actual essay itself.",
                    "explanation": "The original phrasing is fragmented; rewording it enhances clarity and structure.",
                    "context": "In our collaboration, I instructed you to paste the title of the essay and the actual essay itself into the document."
                },
                {
                    "original": "you can be much more inventive, much more creative and like, it's just more fun.",
                    "corrected": "you can be much more inventive, more creative, and it's just more fun.",
                    "explanation": "Repetitive structure ('much more') is streamlined for better flow. The word 'like' is informal and can be omitted.",
                    "context": "In discussing the writing part, I encouraged you by saying that you can be much more inventive, more creative, and it's just more fun than writing with charts."
                }
            ]
        },
        "mistakes_3": {
            "mistakes_list": [
                {
                    "original": "I also seen several examples like in the internet.",
                    "corrected": "I have also seen several examples on the internet.",
                    "explanation": "The past participle 'seen' should be preceded by 'have' to form the present perfect tense. Also, 'in the internet' is incorrect; it should be 'on the internet.'",
                    "context": "I was reviewing the structure of essays recently. I have also seen several examples on the internet. They helped me understand better."
                },
                {
                    "original": "When you're writing an intro, it's a little bit better if you put your ideas right in your introduction.",
                    "corrected": "When you're writing an intro, it's better to put your ideas right in your introduction.",
                    "explanation": "The phrase 'a little bit better' is informal; 'better' suffices in this context for clarity.",
                    "context": "In essay writing, clarity and conciseness are important. When you're writing an intro, it's better to put your ideas right in your introduction. This sets a clear foundation for your argument."
                },
                {
                    "original": "And a high level students, a high level student can do a different thing.",
                    "corrected": "And a high-level student can do a different thing.",
                    "explanation": "The noun 'students' should not have 'a' before it; it needs to be singular to match 'a high-level student.'",
                    "context": "In discussions about student responses, it's essential to gauge their level of understanding. And a high-level student can do a different thing. They can articulate their thoughts more deeply."
                },
                {
                    "original": "You have here, I already see advertisement.",
                    "corrected": "I already see advertisements here.",
                    "explanation": "The noun 'advertisement' should be pluralized to 'advertisements.' The sentence structure also needed reordering for natural flow.",
                    "context": "When I looked at your essay, I noticed some areas that needed focus. I already see advertisements here. They tend to distract from the main point."
                },
                {
                    "original": "We have multiple ideas. Yeah. But none of those ideas is given an example.",
                    "corrected": "We have multiple ideas, but none of those ideas has an example.",
                    "explanation": "The verb 'is' should be replaced with 'has' to indicate possession; the plural 'ideas' agrees with the plural subject.",
                    "context": "In evaluating your writing, I noticed an issue. We have multiple ideas, but none of those ideas has an example. This weakens your argument."
                },
                {
                    "original": "Who eats a lot of sugary based drinks and who's have health improved.",
                    "corrected": "Who eats a lot of sugary drinks and whose health has improved.",
                    "explanation": "'Sugary based drinks' should be 'sugary drinks,' and 'who's' should be 'whose' to indicate possession. 'Has' is the correct form for the present perfect tense.",
                    "context": "When illustrating concepts in your essay, examples are crucial. An effective example could be someone who eats a lot of sugary drinks and whose health has improved. This strengthens your argument."
                },
                {
                    "original": "I will, I won't be able to do that.",
                    "corrected": "I won't be able to do that.",
                    "explanation": "The repetition of 'I will' is excessive and not needed; 'I won't be able to do that' is clear as is.",
                    "context": "It's important to back up claims with evidence. When challenged, I won't be able to do that. This shows the weakness in unsupported arguments."
                },
                {
                    "original": "So when a person consume a lot of sugary drinks, not necessarily one person.",
                    "corrected": "So when a person consumes a lot of sugary drinks, not necessarily just one person.",
                    "explanation": "'Consume' should be 'consumes' to agree with the singular subject 'a person.' 'Just' clarifies the meaning.",
                    "context": "In analyzing your points, clarity is vital. So when a person consumes a lot of sugary drinks, not necessarily just one person, the implications are broader."
                }
            ]
        },
        "mistakes_4": {
            "mistakes_list": [
                {
                    "original": "We can also eat create.",
                    "corrected": "We can also create examples.",
                    "explanation": "Extra word 'eat' and wrong order; use 'create examples' to express making examples.",
                    "context": "We need to show a group of people for whom this example is working. We can also create examples. It's not necessary for examples to be literally true."
                },
                {
                    "original": "It, uh, does it's not necessary to be like a truth.",
                    "corrected": "It's not necessary for examples to be literally true.",
                    "explanation": "Awkward phrasing; use 'for examples' and 'literally true'.",
                    "context": "We can also create examples. It's not necessary for examples to be literally true. But I still recommend using real examples because believable examples are easier."
                },
                {
                    "original": "that's not believable. What kind of statistics who made the statistics? Why would they make this to how they showed you how they found people to ask?",
                    "corrected": "What kind of statistics? Who collected them, and how did they find people to ask?",
                    "explanation": "Run-on and unclear questions; split into clear questions about source and methodology.",
                    "context": "That's not believable. What kind of statistics? Who collected them, and how did they find people to ask? It should be convincing."
                },
                {
                    "original": "When we're trying to make up examples, that actually makes it difficult for us because it is always much easier to write, uh, about things that we believe in.",
                    "corrected": "When we're trying to make up examples, it actually makes it more difficult for us because it's always easier to write about things we believe in.",
                    "explanation": "Replace 'that' with 'it' and use 'more difficult' for natural comparison.",
                    "context": "I'm a bit in doubt about that. When we're trying to make up examples, it actually makes it more difficult for us because it's always easier to write about things we believe in. If you really believe that people drink it because it's convenient, then it's not a problem to explain."
                },
                {
                    "original": "If you really believe that people are drinking it because they are drinking Yeah.",
                    "corrected": "If you really believe that people drink it because it's convenient.",
                    "explanation": "Repetition and unclear phrasing; simplify to 'drink' and the reason 'it's convenient'.",
                    "context": "When we're trying to make up examples, it actually makes it more difficult for us. If you really believe that people drink it because it's convenient, then it should not be hard to find an example."
                },
                {
                    "original": "it should not be a problem for you to come up with.",
                    "corrected": "It should not be a problem for you to come up with an example.",
                    "explanation": "Missing object; specify 'an example'.",
                    "context": "If you really believe that people drink it because it's convenient, it should not be a problem for you to come up with an example. You can say, in Russia you can go to any store and find it."
                },
                {
                    "original": "You can say in Russia, you can come to any store, any store, absolutely like, including the smallest ones, you know, just a, an old woman selling something, uh, like at the market and they will offer Coca-Cola, Coca-Cola.",
                    "corrected": "In Russia you can go to any store, even the smallest market stalls, and vendors will sell Coca-Cola.",
                    "explanation": "Remove repetition and clean grammar; use 'vendors' and concise phrasing.",
                    "context": "It should not be a problem for you to come up with an example. In Russia you can go to any store, even the smallest market stalls, and vendors will sell Coca-Cola. It is everywhere."
                },
                {
                    "original": "And because it's fast dopamine people, uh, for people, it's really hard to not buy.",
                    "corrected": "Because it gives fast dopamine, it's really hard for people not to buy it.",

                    "context": "In Russia you can go to any store, even the smallest market stalls, and vendors will sell Coca-Cola. Because it gives fast dopamine, it's really hard for people not to buy it. It is an example that proves the point."
                },
                {
                    "original": "So it was your example about it, but I see it that it offers everywhere.",
                    "corrected": "So that was your example, but I see that it is offered everywhere.",
                    "explanation": "Awkward phrasing and verb form; use 'offered' and 'I see that'.",
                    "context": "It is an example. So that was your example, but I see that it is offered everywhere. You see advertisement and being offered everywhere are different things."
                },
                {
                    "original": "are you, are you using a, uh, an iPhone, you do have what kind of, what, what kind of phone are you using? No, I phone like a 16 pro iPhone.",
                    "corrected": "No, I have an iPhone 16 Pro.",
                    "explanation": "Use 'have' for possession and standard model order; remove filler 'like'.",
                    "context": "Are you using an iPhone? What kind of phone are you using? No, I have an iPhone 16 Pro."
                },
                {
                    "original": "when iPhone releases a new iPhone, they make a lot of ads and very, in many places you can find ads of a new iPhone, but you can buy an iPhone only in the apps, in the, like in the official store, in the official Apple store and nowhere in no other like places.",

                    "context": "Coca-Cola may not even be heavily advertised; it could stop advertising in Russia, but you can still find it everywhere. This is an example of a product that is not heavily advertised but is very widespread. I got an idea about how to use this in my essay."
                },
                {
                    "original": "I got an idea about how I need it to put into my easy.",
                    "corrected": "I got an idea about how to put it into my essay.",
                    "explanation": "'easy' is wrong word; fix word order to 'how to put it into my essay.'",
                    "context": "This is an example of a product that is not heavily advertised but is very widespread. I got an idea about how to put it into my essay. You know, when you're writing, an examiner doesn't have a fixed checklist in their head."
                },
                {
                    "original": "You just like any, you know, when you're writing an examiner doesn't have a structure in their head.",

    "dialogue": {
        "dialogue_1": {
            "dialogue_list": [
                {

                },

                    "Person 1": "Oh no! Is that still a problem?"

                    "Person 2": "Not really, but sometimes the internet can be a bit unstable. It started happening about two weeks ago."

                    "Person 2": "I study at university and work as an English tutor for kids."

                    "Person 2": "I really enjoy it. Kids are so full of energy and curiosity! Plus, I feel more confident teaching them."
                },

                    "Person 1": "Do you teach online or offline?"

                {
                    "Person 2": "Mostly online. I enjoy creating fun lessons based on their interests."
                },
                {
                    "Person 1": "That sounds creative! Do you have special materials you use?"
                },

                    "Person 2": "Yes! I use lots of interactive resources to keep them engaged. It can be a challenge, but I love it!"
                },
                {
                    "Person 1": "That’s great! It sounds rewarding to see them progress."
                },

                    "Person 2": "Absolutely. Just recently, one of my students passed a big exam with a good score!"
                },
                {
                    "Person 1": "Nice job! So what year are you in at university?"

                {
                    "Person 2": "I'm in my second year now."
                },
                {
                    "Person 1": "That’s exciting! Balancing work and studies can be tough, though."
                },

                    "Person 2": "For sure! But I love learning and teaching. What about you? How’s your English coming along?"
                },
                {
                    "Person 1": "I really enjoy it. I've been learning since I was a kid. I take sessions with my tutor to practice."
                },
                {
                    "Person 2": "That's great! Do you find reading difficult?"

                    "Person 2": "I feel the same! Reading can be so dry compared to watching something."

                {
                    "Person 1": "Exactly! Plus, it takes a lot of focus to really understand everything."

                    "Person 2": "But it sounds like you're doing well with your listening and speaking!"

                    "Person 1": "Thanks! I hope to develop my reading skills too, but I'm not in a rush."

                    "Person 2": "That’s a good approach. Just keep at it! Tell me more about your tutor."

                    "Person 1": "For sure! I miss our chats when we’re not studying together."

            // Set parts_number from json_content
            let parts_number = json_content.parts_number || 0;

        // References to sections
        const partsSection = document.getElementById('partsSection');
        const contentSection = document.getElementById('contentSection');
        const displaySection = document.getElementById('displaySection');

        let activePart = null; // Track the active part

        // Function to create Part buttons
        function createPartButtons() {
            for (let i = 1; i <= parts_number; i++) {
                let button = document.createElement("button");
                button.textContent = "Part " + i;
                button.onclick = () => showContentButtons(i, button);
                partsSection.appendChild(button);
            }
        }

        // Function to show Mistakes, Vocabulary, and Dialogue buttons
        function showContentButtons(part, button) {
            // Reset previous part selection
            document.querySelectorAll(".part-buttons button").forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");

            // Clear previous content buttons and displayed content
            contentSection.innerHTML = "";
            contentSection.classList.remove("hidden");
            displaySection.innerHTML = "";

            activePart = part; // Update active part

            let sections = ["Mistakes", "Vocabulary", "Dialogue"];
            sections.forEach(section => {
                let secButton = document.createElement("button");
                secButton.textContent = section;
                secButton.onclick = () => {
                    secButton.classList.add("loading"); // Add flashing effect
                    displayContent(section, part, secButton);
                };
                contentSection.appendChild(secButton);
            });
        }

        // Function to display selected content
        function displayContent(type, part, button) {
            let dataKey = type.toLowerCase(); // "mistakes", "vocabulary", "dialogue"
            let partKey = dataKey + "_" + part; // e.g., "mistakes_1"

            if (json_content[dataKey] && json_content[dataKey][partKey]) {
                let contentData = json_content[dataKey][partKey];

                if (dataKey === "mistakes") {
                    appendContent(displayMistakes(contentData), part, type, button);
                } else if (dataKey === "vocabulary") {
                    appendContent(displayVocabulary(contentData), part, type, button);
                } else if (dataKey === "dialogue") {
                    appendContent(displayDialogue(contentData), part, type, button);
                }
            }
        }

        // Append content while keeping existing sections
        function appendContent(html, part, type, button) {
            let sectionID = `part${part}-${type}`;
            let existingSection = document.getElementById(sectionID);

            if (!existingSection) {
                let newSection = document.createElement("div");
                newSection.id = sectionID;
                newSection.classList.add("section-content");
                newSection.innerHTML = html;
                displaySection.appendChild(newSection);

                // Remove animation, keep the button highlighted
                button.classList.remove("loading");
                button.classList.add("active");
            }
        }

        // Function to display Mistakes content
        function displayMistakes(data) {
            let html = "<h3>Mistakes</h3>";
            data.mistakes_list.forEach(mistake => {
                html += `<p><b>Original:</b> ${mistake.original}</p>`;
                html += `<p><b>Corrected:</b> <b> ${mistake.corrected}</b></p>`;
                html += `<p><b>Explanation:</b> ${mistake.explanation}</p>`;
                html += `<p><b>Context:</b> <i> ${mistake.context}</i></p>`;
                html += `<hr><br>`; /* Adds an extra blank line */
            });
            return html;
        }





        // Function to display Vocabulary content
        function displayVocabulary(data) {
            let html = "<h3>Vocabulary</h3>";

            // Helper function: Preserve case in context replacement
            function formatContextSentence(sentence, word) {
                const regex = new RegExp(`\\b${word}\\b`, "gi"); // Case-insensitive exact word match
                return sentence.replace(regex, (match) => {
                    return `<span class="bold-italic">${match}</span>`; // Keeps match's case
                });
            }

            // Vocabulary Section
            data.vocabulary_list.forEach((entry, index) => {
                // Word Entry
                html += `<p class="entry-box"> <span class="word">${index + 1}. ${entry.word}</span></p>`;

                // Definition Box
                html += `<div class="definition-box"><span class="bold">Definition:</span> ${entry.definition}</div>`;

                // Context Sentences
                html += "<p>";
                Object.values(entry.context).forEach((sentence, i) => {
                    const formattedSentence = formatContextSentence(sentence, entry.word);
                    html += `<br><span class="bold">Context ${i + 1}:</span> <span class="italic">${formattedSentence}</span>`;
                });
                html += "</p>";
            });

            // Funny Facts Section
            if (data.funny_facts.length > 0) {
                html += `<div class="section-title purple-section">Funny Facts</div>`;
                data.funny_facts.forEach((fact, index) => {
                    html += `<div class="fact-box">
                <p class="fact"><span class="bold">${index + 1}. ${fact.word}:</span> ${fact.fact}</p>
             </div>`;
                });
            }

            // Jokes Section
            if (data.jokes.length > 0) {
                html += `<div class="section-title purple-section">Jokes</div>`;
                data.jokes.forEach((joke, index) => {
                    html += `<div class="joke-box">
                <p class="joke-question">${index + 1}. ${joke.question}</p>
                <p class="italic joke">${joke.answer}</p>
             </div>`;
                });
            }

            return html; // Returning the generated HTML instead of inserting it directly
        }

        function displayDialogue(data) {
            let html = `<div class="dialogue-container">`;
            html += "<h3>Dialogue</h3>";

            data.dialogue_list.forEach(entry => {
                const speaker = Object.keys(entry)[0];
                const line = entry[speaker];

                html += `<div class="line ${speaker === "Person 1" ? 'person-1' : 'person-2'}">
                    <span class="speaker">${speaker}:</span> ${line}
                 </div>`;
            });

            html += `</div>`;
            return html;
        }





        // Initialize part buttons
        createPartButtons();
    </script>

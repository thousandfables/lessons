<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Parts</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            color: #444;
            background: linear-gradient(145deg, #eaeaea, #ffffff);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset 2px 2px 4px rgba(0, 0, 0, 0.05),
                inset -2px -2px 4px rgba(255, 255, 255, 0.4);
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        h3 {
            font-size: 50px;
            font-weight: bold;
        }



        #left {
            width: 100%;
            padding: 20px;
            border-right: 2px solid #ccc;
        }

        #right {
            display: none background-color: #f4f4f4;
        }

        .part-buttons,
        .content-buttons {
            margin-bottom: 10px;
        }

        .part-buttons button,
        .content-buttons button {
            margin-right: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .part-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        .content-buttons button.loading {
            animation: flash 0.5s infinite alternate;
        }

        .content-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        @keyframes flash {
            0% {
                background-color: #ffd700;
            }

            100% {
                background-color: #ffa500;
            }
        }

        .hidden {
            display: none;
        }

        .section-content {
            margin-top: 1px;
            padding: 30px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        /* Vocabulary Entry */
        .entry-box {
            font-weight: bold;
            font-size: 1.4em;
            display: inline-block;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 2px;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        /* Definition Box */
        .definition-box {
            background-color: #f4f4f4;
            padding: 8px 12px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            margin: 5px 0;
            max-width: 400px;
            text-align: left;
        }

        /* Word Styling */
        .word {
            font-weight: bold;
            color: #000000;
            font-size: 1.2em;
        }

        .example {
            margin-left: 20px;
            font-style: italic;
        }

        /* Fact Box */
        .fact-box {
            background-color: rgba(142, 68, 173, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(142, 68, 173, 0.15);
            max-width: 500px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: bold;
            padding: 8px 12px;
            display: inline-block;
            border-left: 6px solid rgba(0, 0, 0, 0.2);
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
            margin-bottom: 10px;
            color: white;
        }

        /* Section Colors */
        .purple-section {
            background-color: #8e44ad;
            border-left-color: #6a1b9a;
            box-shadow: 3px 3px 8px rgba(142, 68, 173, 0.3);
        }

        .joke-box {
            background-color: rgba(52, 152, 219, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(52, 152, 219, 0.15);
            max-width: 500px;
        }


        /* Text Formatting */
        .fact {
            color: black;
        }

        /* Joke Text */
        .joke {
            color: #6d1b9a;
            /* Deeper purple for better readability */
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Joke Question Styling */
        .joke-question {
            font-weight: bold;
            font-size: 1.2em;
            font-style: italic;
            color: #2c3e50;
            /* Dark gray-blue for a classy contrast */
            margin-bottom: 5px;
        }

        /* Enhanced Typography */
        .bold {
            font-weight: 600;
            color: #000000;
            /* Darker shade for better contrast */
        }

        .italic {
            font-style: italic;
            color: #000000;
            /* Slightly darker gray for better readability */
        }

        .bold-italic {
            font-weight: 600;
            font-style: italic;
            color: #222;
            /* More emphasis on bold-italic text */
        }

        /* Joke Box - Adds a soft neumorphic effect */
        .joke-box {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1),
                -5px -5px 10px rgba(255, 255, 255, 0.5);
            max-width: 550px;
            transition: all 0.3s ease-in-out;
        }

        /* Joke Box Hover Effect */
        .joke-box:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.6);
        }

        /* Dialogue Container - Left Centered */
        /* Dialogue Container - Auto Width Based on Content */
        .dialogue-container {
            display: inline-block;
            /* Shrinks width to fit content */
            max-width: 800px;
            /* Prevents it from becoming too wide */
            margin: 20px 0;
            /* Aligns it to the left with some spacing */
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }



        /* Individual Dialogue Lines */
        .line {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Styling for Different Speakers */
        .person-1 {
            background: linear-gradient(145deg, #dde5ed, #c9d6e2);
            text-align: left;
            color: #2c3e50;
        }

        .person-2 {
            background: linear-gradient(145deg, #d1e8ff, #b9dfff);
            text-align: left;
            color: #1d3557;
        }

        /* Speaker Name Styling */
        .speaker {
            font-weight: bold;
            margin-bottom: 5px;

            font-size: 1.1em;
            color: #000;
        }
    </style>
</head>

<body>

    <div id="left">
        <h2>Lesson Parts</h2>
        <div id="partsSection" class="part-buttons"></div>
        <div id="contentSection" class="content-buttons hidden"></div>
        <div id="displaySection"></div>
    </div>

    <div id="right">
        <!-- Reserved for later use -->
    </div>

    <script>
        // Declare json_content but do not fill it
        let json_content = {
    "parts_number": 7,
    "mistakes": {
        "mistakes_1": {
            "mistakes_list": [
                {
                    "original": "I don't remember a day I didn't have a test.",
                    "corrected": "I don't remember a day when I didn't have a test.",
                    "explanation": "The phrase 'a day I didn't have' should include 'when' to properly indicate the condition.",
                    "context": "With all the tests I've been taking this semester, I don’t remember a day when I didn't have a test. It feels like it's a continuous cycle."
                },
                {
                    "original": "all the subjects they are so difficult.",
                    "corrected": "all the subjects are so difficult.",
                    "explanation": "The word 'they' is unnecessary here and disrupts the flow of the sentence.",
                    "context": "This semester has been overwhelming. All the subjects are so difficult, and it's really hard to keep up with everything."
                },
                {
                    "original": "like do homework every week or something, but this semester no ways.",
                    "corrected": "like doing homework every week or something, but this semester there are no ways.",
                    "explanation": "'Do' should be changed to 'doing' to maintain the gerund form. 'No ways' needs 'there are' for clarity.",
                    "context": "In the past, I had subjects where I didn’t have to worry much. Now, the situation has changed and this semester there are no ways to avoid the homework."
                },
                {
                    "original": "if you want to, if you don't pass it now, you will pass it in the end,",
                    "corrected": "if you don't pass it now, you'll have to pass it at the end.",
                    "explanation": "The phrasing is confusing; 'you will pass it in the end' implies a different meaning than intended.",
                    "context": "My teacher stressed the importance of passing my tests. If I don't pass it now, I'll have to pass it at the end, and that would be much harder."
                },
                {
                    "original": "I want to go to China and for it I need to pass everything.",
                    "corrected": "I want to go to China, and for that, I need to pass everything.",
                    "explanation": "'for it' is not idiomatic; 'for that' is more suitable.",
                    "context": "I've been preparing to go to China and it's essential for me to pass everything. Without passing, I won't be able to go."
                },
                {
                    "original": "not to take any exams?",
                    "corrected": "not take any exams?",
                    "explanation": "The phrasing 'to take' is awkward; it's more natural to use 'not take' here.",
                    "context": "I was wondering if it would be possible to simply not take any exams. It would make my life easier."
                },
                {
                    "original": "there has no automatic options, like passing exam automatically.",
                    "corrected": "there are no automatic options, like passing the exam automatically.",
                    "explanation": "'There has' is incorrect; the proper construction is 'there are' for plural nouns.",
                    "context": "I mentioned how tough the semester is. Unfortunately, there are no automatic options, like passing the exam automatically, which would be a relief."
                },
                {
                    "original": "if you don't study now, you...",
                    "corrected": "if you don't study now, it will be impossible to prepare for the exam in a week.",
                    "explanation": "The sentence is incomplete; it needs an explicit consequence.",
                    "context": "My friend and I discussed study strategies. I said that if you don't study now, it will be impossible to prepare for the exam in a week."
                },
                {
                    "original": "it took a dramatic turn.",
                    "corrected": "it took a dramatic turn.",
                    "explanation": "The phrase is correct but could also be expressed as 'it took a dramatic turn of events' for clarity.",
                    "context": "The situation escalated quickly. It took a dramatic turn, leading to unexpected challenges."
                },
                {
                    "original": "you can't make aeropeas without actually working somewhere in Kazakhstan.",
                    "corrected": "you can't obtain an aeropea without actually working somewhere in Kazakhstan.",
                    "explanation": "'Make aeropeas' is not idiomatic; 'obtain' or 'apply for' is more appropriate.",
                    "context": "While explaining the visa situation, I highlighted the legality issues. You can't obtain an aeropea without actually working somewhere in Kazakhstan."
                },
                {
                    "original": "when they call you and you have to be present, you have to come.",
                    "corrected": "when they call you, you have to be present.",
                    "explanation": "The repetition of 'you have to' is redundant in this structure.",
                    "context": "Discussing potential legal issues, I explained what a formal inquiry entails. When they call you, you have to be present."
                }
            ]
        },
        "mistakes_2": {},
        "mistakes_3": {
            "mistakes_list": [
                {
                    "original": "you have to do it by yourself, like, you just have Excel file",
                    "corrected": "you have to do it by yourself, like, you just have an Excel file",
                    "explanation": "The article 'an' is required before 'Excel file' for proper grammatical structure.",
                    "context": "When working on the tasks, you have to do it by yourself, like, you just have an Excel file. It's up to you to complete everything on your own."
                },
                {
                    "original": "the first, I can read you, the first is, like, download files, stocks, and open it",
                    "corrected": "the first task, I can read to you, is to download files, stocks, and open it",
                    "explanation": "The phrase lacks clarity and proper structure; 'the first task' should be clearly articulated, and 'read you' is informal.",
                    "context": "The exam has distinct tasks to complete. The first task I can read to you is to download files, stocks, and open it as a Pandas data frame."
                },
                {
                    "original": "and if you want to reference the first column not by just column A",
                    "corrected": "and if you want to reference the first column not just by column A",
                    "explanation": "The phrase 'not by just column A' is incorrect; it should be 'not just by column A' for correct idiomatic usage.",
                    "context": "When dealing with data frames, it's crucial to be precise. If you want to reference the first column not just by column A, you need to give it a specific name."
                },
                {
                    "original": "like, find this, find this",
                    "corrected": "like, find this, and find that",
                    "explanation": "The repetition of 'find this' lacks variation; adding 'that' improves clarity and flow.",
                    "context": "During the tasks, there were similar directives. The instructions were clear, like, find this, and find that among the data points."
                },
                {
                    "original": "it has additional tasks, like, there were 17 tasks to do it in Python",
                    "corrected": "it included additional tasks, like there were 17 tasks to complete in Python",
                    "explanation": "The original phrasing 'it has additional tasks' is awkward; 'it included' sounds more natural in this context.",
                    "context": "The exam was daunting with many components. It included additional tasks, like there were 17 tasks to complete in Python."
                },
                {
                    "original": "I didn't check even, I was, I was surprised",
                    "corrected": "I didn't even check; I was surprised",
                    "explanation": "The words 'check even' are out of order; 'even' should come before 'check' for better clarity.",
                    "context": "During the exam, I was under a lot of pressure. I didn't even check; I was surprised by how everything turned out in the end."
                },
                {
                    "original": "I was busy all the time, there was no time when I was just sitting and thinking",
                    "corrected": "I was busy all the time; there was no time for me to just sit and think",
                    "explanation": "The sentence conjunction is incorrectly structured; 'when' should be replaced with 'for me to' for proper flow.",
                    "context": "The time constraints were intense. I was busy all the time; there was no time for me to just sit and think about my next steps."
                },
                {
                    "original": "but that, like, this exam, it had tasks for all the types",
                    "corrected": "but this exam had tasks for all types",
                    "explanation": "The original phrase 'like, this exam, it had tasks for all the types' is unnecessarily wordy; removing filler improves clarity.",
                    "context": "The exam format was unexpected. But this exam had tasks for all types of statistics that I wasn't fully prepared for."
                },
                {
                    "original": "because it was difficult, I saw in AI",
                    "corrected": "because it was difficult, I looked to AI for help",
                    "explanation": "The phrase 'saw in AI' is vague; 'looked to AI for help' conveys a clearer meaning.",
                    "context": "Some tasks proved challenging during the exam. Because it was difficult, I looked to AI for help on certain problems."
                },
                {
                    "original": "I mean, to solve these tasks, some of them I did by myself",
                    "corrected": "I mean, for solving these tasks, some of them I did by myself",
                    "explanation": "The phrase 'to solve these tasks' should be adjusted for better grammatical correctness; 'for solving' is more appropriate here.",
                    "context": "Handling the exam questions required focus. I mean, for solving these tasks, some of them I did by myself with confidence."
                }
            ]
        },
        "mistakes_4": {
            "mistakes_list": [
                {
                    "original": "I don't know what I will do with my laptop, something happens with my laptop here in Vietnam.",
                    "corrected": "I don't know what I will do with my laptop if something happens with it here in Vietnam.",
                    "explanation": "The original sentence lacks the conditional 'if' to clarify the relationship between the two clauses.",
                    "context": "I hope that nothing will go wrong while I’m here, but I don't know what I would do if something happens with my laptop here in Vietnam."
                },
                {
                    "original": "But they are improving.",
                    "corrected": "But they're improving.",
                    "explanation": "The contraction 'they're' is more natural in spoken English than the full form 'they are' in casual conversation.",
                    "context": "It seems like everyone else is struggling with the test. But they're improving slowly."
                },
                {
                    "original": "I just will say it's, yes, it's AI.",
                    "corrected": "I will just say, yes, it's AI.",
                    "explanation": "The placement of 'just' was awkward; it should follow 'will' for better flow.",
                    "context": "If the teacher asks me about my answer, I will just say, yes, it's AI."
                },
                {
                    "original": "I do my best, but anyway, such things happen.",
                    "corrected": "I do my best, but still, such things happen.",
                    "explanation": "'But anyway' can sound awkward; 'but still' is a more natural way to express continuing despite challenges.",
                    "context": "I really put in my effort in class, but still, such things happen, and it’s frustrating."
                },
                {
                    "original": "Teacher just suddenly decided that she wants us to study.",
                    "corrected": "The teacher suddenly decided that she wanted us to study.",
                    "explanation": "The article 'the' is needed before 'teacher', and tense consistency should be maintained.",
                    "context": "In English class, the teacher suddenly decided that she wanted us to study. It felt a bit overwhelming."
                },
                {
                    "original": "It's being so angry.",
                    "corrected": "It's being very angry.",
                    "explanation": "'So' is incorrectly used here; 'very' should be used to modify the adjective 'angry.'",
                    "context": "When explaining the feeling, I said it was being very angry. It's an intense emotion."
                },
                {
                    "original": "And it was, and 20 sentences like this.",
                    "corrected": "And there were 20 sentences like this.",
                    "explanation": "The structure 'it was' is inappropriate; 'there were' correctly indicates existence.",
                    "context": "In the test, there were 20 sentences like this to fill in the gaps. It felt excessive."
                },
                {
                    "original": "That's always, I know that's, like, yeah, we studied it.",
                    "corrected": "I know that we always studied it.",
                    "explanation": "The phrase is disorganized; clearer phrasing improves the coherence.",
                    "context": "I'm aware that we always studied it, but I still find it confusing during tests."
                },
                {
                    "original": "And just it's all like... You need to study, you need to...",
                    "corrected": "It's all about studying; you need to...",
                    "explanation": "The original sentence is fragmented; restructuring provides clarity.",
                    "context": "To succeed, it’s all about studying; you need to focus more and prepare thoroughly."
                },
                {
                    "original": "My ideal picture of teaching and like learning in general.",
                    "corrected": "My ideal picture of teaching and learning in general.",
                    "explanation": "The word 'like' is unnecessary and informal; remove it for clarity.",
                    "context": "My ideal picture of teaching and learning in general focuses on clear communication and student engagement."
                },
                {
                    "original": "Is it that like I've been attending every class?",
                    "corrected": "Is it that I've been attending every class?",
                    "explanation": "The word 'like' is superfluous in this context and does not add value to the sentence.",
                    "context": "Is it that I've been attending every class, focusing on what you tell us but still struggling with the tests?"
                },
                {
                    "original": "You follow all the requirements. Yeah, you follow the requirements.",
                    "corrected": "You meet all the requirements.",
                    "explanation": "The repetition of 'follow the requirements' is unnecessary; 'meet' is more concise.",
                    "context": "I'm trying hard to meet all the requirements, but it still feels like it’s not enough for a great mark."
                }
            ]
        },
        "mistakes_5": {
            "mistakes_list": [
                {
                    "original": "I think... But I'm not sure, but really...",
                    "corrected": "I think... but I'm not sure.",
                    "explanation": "Repetition of 'but' is unnecessary here; it makes the sentence awkward.",
                    "context": "I think it's important to challenge our own understanding. I think... but I'm not sure. Still, I know that every individual has a different learning pace."
                },
                {
                    "original": "But it's not about their genius in programming.",
                    "corrected": "But it's not about his or her genius in programming.",
                    "explanation": "Singular 'their' is often considered informal; using 'his or her' is more formal and clear in writing.",
                    "context": "Many people struggle with programming concepts. But it's not about their genius in programming; it's about how much time they invest to practice."
                },
                {
                    "original": "Like, I want to have mark that I really...",
                    "corrected": "Like, I want to have a mark that I really...",
                    "explanation": "The article 'a' is needed before 'mark' to specify it.",
                    "context": "My goal is to demonstrate my effort. Like, I want to have a mark that I really earned for my work."
                },
                {
                    "original": "if I already...",
                    "corrected": "if I have already...",
                    "explanation": "The present perfect 'have' is needed to indicate the completion of the action in relation to the present.",
                    "context": "I'm expected to show what I've learned. I wonder how I can get this mark if I have already done everything I could."
                },
                {
                    "original": "it was impossible.",
                    "corrected": "it was impossible for me.",
                    "explanation": "The phrase lacks a subject; adding 'for me' clarifies who the statement applies to.",
                    "context": "I tried to study effectively, but there were challenges. I printed some of them, but it was impossible for me to manage everything."
                },
                {
                    "original": "But just I don't like it.",
                    "corrected": "But I just don't like it.",
                    "explanation": "The correct order of words should place 'just' after the subject and before the verb for clarity.",
                    "context": "I have strong feelings about how things are taught. But I just don't like it when the instructions are unclear."
                },
                {
                    "original": "the only way to do is to test you, to find that out.",
                    "corrected": "the only way to do this is to test you, to find that out.",
                    "explanation": "The phrase 'to do is to' requires the addition of 'this' for grammatical completeness.",
                    "context": "It can be frustrating to go through the evaluation process. It seems that the only way to do this is to test you to find that out."
                },
                {
                    "original": "you don't like... respect me.",
                    "corrected": "you don't respect me.",
                    "explanation": "The phrase is incomplete; removing 'like' makes it more direct and clear.",
                    "context": "There's often confusion about what respect means in a classroom. She thinks you don't respect me, which isn't true."
                },
                {
                    "original": "you don't listen to me, you don't respect me.",

                    "context": "In discussions, it’s easy to misinterpret intentions. She thinks that you don't listen to me, and you don't respect me, but that’s not fair."
                },
                {
                    "original": "I said you before, I asked AI about meaning of some words, tries...",
                    "corrected": "I told you before that I asked AI about the meanings of some words and tried...",

                    "context": "I’m trying to find effective study tools. I told you before that I asked AI about the meanings of some words and tried various techniques."
                },
                {
                    "original": "I just was like this.",
                    "corrected": "I just stood there like this.",
                    "explanation": "The phrase lacks a clear verb; adding 'stood' clarifies the action.",
                    "context": "In class, I often find myself lost in thought. I just stood there like this, trying to process what was being taught."
                }
            ]
        },
        "mistakes_6": {
            "mistakes_list": [
                {
                    "original": "the worst way how you can do it",
                    "corrected": "the worst way to do it",
                    "explanation": "The phrase 'the worst way how' is incorrect; it should be 'the worst way to.'",
                    "context": "I think it's important for teachers to engage their students. The worst way to do it is to make lessons boring and intimidating. Students thrive on being interested and involved in their learning."
                },
                {
                    "original": "she doesn't even realize that the only, like, she knows all these expressions just because, like, she repeated them",

                    "context": "It's clear that she has a lot of experience with language. She knows all these expressions just because she has repeated them with many students. However, that doesn’t mean she effectively teaches them."
                },
                {
                    "original": "students who you're just talking naturally to and who are just consuming content",
                    "corrected": "students to whom you are just talking naturally and who are just consuming content",
                    "explanation": "The phrase should use 'to whom' instead of 'who' for grammatical accuracy.",
                    "context": "The way we teach can have a huge impact on results. Students to whom you are just talking naturally and who are just consuming content tend to perform better long-term."
                },
                {
                    "original": "if you keep doing it for two years, in two years, all those students",
                    "corrected": "if you keep doing it for two years, all those students",
                    "explanation": "The repetition of 'in two years' is redundant; it only needs to appear once.",
                    "context": "It's fascinating to observe language acquisition over time. If you keep doing it for two years, all those students will improve significantly. They will see the benefits of this approach."
                },
                {
                    "original": "if you understand the movie and you understand only 50% of the vocabulary there",
                    "corrected": "if you understand only 50% of the vocabulary in the movie",
                    "explanation": "The phrase 'of the vocabulary there' is awkward; it should be 'in the movie.'",
                    "context": "Watching movies can be a fun way to learn. If you understand only 50% of the vocabulary in the movie, it becomes a challenge, and that's not very motivating."
                },
                {
                    "original": "by the way, I thought about that and that is an interesting observation.",
                    "corrected": "by the way, I thought about that, and it is an interesting observation.",

    "dialogue": {
        "dialogue_1": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! How’s it going?"

                {
                    "Person 2": "I have tests coming up all week. It feels never-ending."
                },
                {
                    "Person 1": "Yikes! That sounds intense. What subjects?"
                },
                {
                    "Person 2": "Pretty much everything—math, science, you name it. It’s been rough."
                },
                {
                    "Person 1": "Can you catch a break? Like, do you ever get a day off to relax?"
                },
                {
                    "Person 2": "Not really! Every teacher seems to have scheduled tests at the same time."

                {
                    "Person 1": "That’s harsh! I remember those days. I used to feel the same way."
                },

                    "Person 2": "Right? And if I don’t pass, I can’t join this program abroad I’ve been dreaming about. No pressure, huh?"

                    "Person 2": "Oh no, what went wrong?"

                    "Person 2": "Wow. That sounds stressful! You’re okay now though, right?"

                    "Person 2": "That’s a relief! But what about your stuff?"

                    "Person 1": "Good idea! Let’s make sure we have enough space for all the goodies."
                },
                {
                    "Person 2": "For sure! I can already taste those pastries."
                },
                {
                    "Person 1": "Same here! Can’t wait for our little adventure."
                },
                {
                    "Person 2": "It’s going to be such a fun day. See you then!"
                }
            ]
        }
    }
}


            // Set parts_number from json_content
            let parts_number = json_content.parts_number || 0;

        // References to sections
        const partsSection = document.getElementById('partsSection');
        const contentSection = document.getElementById('contentSection');
        const displaySection = document.getElementById('displaySection');

        let activePart = null; // Track the active part

        // Function to create Part buttons
        function createPartButtons() {
            for (let i = 1; i <= parts_number; i++) {
                let button = document.createElement("button");
                button.textContent = "Part " + i;
                button.onclick = () => showContentButtons(i, button);
                partsSection.appendChild(button);
            }
        }

        // Function to show Mistakes, Vocabulary, and Dialogue buttons
        function showContentButtons(part, button) {
            // Reset previous part selection
            document.querySelectorAll(".part-buttons button").forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");

            // Clear previous content buttons and displayed content
            contentSection.innerHTML = "";
            contentSection.classList.remove("hidden");
            displaySection.innerHTML = "";

            activePart = part; // Update active part

            let sections = ["Mistakes", "Vocabulary", "Dialogue"];
            sections.forEach(section => {
                let secButton = document.createElement("button");
                secButton.textContent = section;
                secButton.onclick = () => {
                    secButton.classList.add("loading"); // Add flashing effect
                    displayContent(section, part, secButton);
                };
                contentSection.appendChild(secButton);
            });
        }

        // Function to display selected content
        function displayContent(type, part, button) {
            let dataKey = type.toLowerCase(); // "mistakes", "vocabulary", "dialogue"
            let partKey = dataKey + "_" + part; // e.g., "mistakes_1"

            if (json_content[dataKey] && json_content[dataKey][partKey]) {
                let contentData = json_content[dataKey][partKey];

                if (dataKey === "mistakes") {
                    appendContent(displayMistakes(contentData), part, type, button);
                } else if (dataKey === "vocabulary") {
                    appendContent(displayVocabulary(contentData), part, type, button);
                } else if (dataKey === "dialogue") {
                    appendContent(displayDialogue(contentData), part, type, button);
                }
            }
        }

        // Append content while keeping existing sections
        function appendContent(html, part, type, button) {
            let sectionID = `part${part}-${type}`;
            let existingSection = document.getElementById(sectionID);

            if (!existingSection) {
                let newSection = document.createElement("div");
                newSection.id = sectionID;
                newSection.classList.add("section-content");
                newSection.innerHTML = html;
                displaySection.appendChild(newSection);

                // Remove animation, keep the button highlighted
                button.classList.remove("loading");
                button.classList.add("active");
            }
        }

        // Function to display Mistakes content
        function displayMistakes(data) {
            let html = "<h3>Mistakes</h3>";
            data.mistakes_list.forEach(mistake => {
                html += `<p><b>Original:</b> ${mistake.original}</p>`;
                html += `<p><b>Corrected:</b> <b> ${mistake.corrected}</b></p>`;
                html += `<p><b>Explanation:</b> ${mistake.explanation}</p>`;
                html += `<p><b>Context:</b> <i> ${mistake.context}</i></p>`;
                html += `<hr><br>`; /* Adds an extra blank line */
            });
            return html;
        }





        // Function to display Vocabulary content
        function displayVocabulary(data) {
            let html = "<h3>Vocabulary</h3>";

            // Helper function: Preserve case in context replacement
            function formatContextSentence(sentence, word) {
                const regex = new RegExp(`\\b${word}\\b`, "gi"); // Case-insensitive exact word match
                return sentence.replace(regex, (match) => {
                    return `<span class="bold-italic">${match}</span>`; // Keeps match's case
                });
            }

            // Vocabulary Section
            data.vocabulary_list.forEach((entry, index) => {
                // Word Entry
                html += `<p class="entry-box"> <span class="word">${index + 1}. ${entry.word}</span></p>`;

                // Definition Box
                html += `<div class="definition-box"><span class="bold">Definition:</span> ${entry.definition}</div>`;

                // Context Sentences
                html += "<p>";
                Object.values(entry.context).forEach((sentence, i) => {
                    const formattedSentence = formatContextSentence(sentence, entry.word);
                    html += `<br><span class="bold">Context ${i + 1}:</span> <span class="italic">${formattedSentence}</span>`;
                });
                html += "</p>";
            });

            // Funny Facts Section
            if (data.funny_facts.length > 0) {
                html += `<div class="section-title purple-section">Funny Facts</div>`;
                data.funny_facts.forEach((fact, index) => {
                    html += `<div class="fact-box">
                <p class="fact"><span class="bold">${index + 1}. ${fact.word}:</span> ${fact.fact}</p>
             </div>`;
                });
            }

            // Jokes Section
            if (data.jokes.length > 0) {
                html += `<div class="section-title purple-section">Jokes</div>`;
                data.jokes.forEach((joke, index) => {
                    html += `<div class="joke-box">
                <p class="joke-question">${index + 1}. ${joke.question}</p>
                <p class="italic joke">${joke.answer}</p>
             </div>`;
                });
            }

            return html; // Returning the generated HTML instead of inserting it directly
        }

        function displayDialogue(data) {
            let html = `<div class="dialogue-container">`;
            html += "<h3>Dialogue</h3>";

            data.dialogue_list.forEach(entry => {
                const speaker = Object.keys(entry)[0];
                const line = entry[speaker];

                html += `<div class="line ${speaker === "Person 1" ? 'person-1' : 'person-2'}">
                    <span class="speaker">${speaker}:</span> ${line}
                 </div>`;
            });

            html += `</div>`;
            return html;
        }





        // Initialize part buttons
        createPartButtons();
    </script>

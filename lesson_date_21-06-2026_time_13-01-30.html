<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Parts</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            color: #444;
            background: linear-gradient(145deg, #eaeaea, #ffffff);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset 2px 2px 4px rgba(0, 0, 0, 0.05),
                inset -2px -2px 4px rgba(255, 255, 255, 0.4);
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        h3 {
            font-size: 50px;
            font-weight: bold;
        }



        #left {
            width: 100%;
            padding: 20px;
            border-right: 2px solid #ccc;
        }

        #right {
            display: none background-color: #f4f4f4;
        }

        .part-buttons,
        .content-buttons {
            margin-bottom: 10px;
        }

        .part-buttons button,
        .content-buttons button {
            margin-right: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .part-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        .content-buttons button.loading {
            animation: flash 0.5s infinite alternate;
        }

        .content-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        @keyframes flash {
            0% {
                background-color: #ffd700;
            }

            100% {
                background-color: #ffa500;
            }
        }

        .hidden {
            display: none;
        }

        .section-content {
            margin-top: 1px;
            padding: 30px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        /* Vocabulary Entry */
        .entry-box {
            font-weight: bold;
            font-size: 1.4em;
            display: inline-block;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 2px;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        /* Definition Box */
        .definition-box {
            background-color: #f4f4f4;
            padding: 8px 12px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            margin: 5px 0;
            max-width: 400px;
            text-align: left;
        }

        /* Word Styling */
        .word {
            font-weight: bold;
            color: #000000;
            font-size: 1.2em;
        }

        .example {
            margin-left: 20px;
            font-style: italic;
        }

        /* Fact Box */
        .fact-box {
            background-color: rgba(142, 68, 173, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(142, 68, 173, 0.15);
            max-width: 500px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: bold;
            padding: 8px 12px;
            display: inline-block;
            border-left: 6px solid rgba(0, 0, 0, 0.2);
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
            margin-bottom: 10px;
            color: white;
        }

        /* Section Colors */
        .purple-section {
            background-color: #8e44ad;
            border-left-color: #6a1b9a;
            box-shadow: 3px 3px 8px rgba(142, 68, 173, 0.3);
        }

        .joke-box {
            background-color: rgba(52, 152, 219, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(52, 152, 219, 0.15);
            max-width: 500px;
        }


        /* Text Formatting */
        .fact {
            color: black;
        }

        /* Joke Text */
        .joke {
            color: #6d1b9a;
            /* Deeper purple for better readability */
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Joke Question Styling */
        .joke-question {
            font-weight: bold;
            font-size: 1.2em;
            font-style: italic;
            color: #2c3e50;
            /* Dark gray-blue for a classy contrast */
            margin-bottom: 5px;
        }

        /* Enhanced Typography */
        .bold {
            font-weight: 600;
            color: #000000;
            /* Darker shade for better contrast */
        }

        .italic {
            font-style: italic;
            color: #000000;
            /* Slightly darker gray for better readability */
        }

        .bold-italic {
            font-weight: 600;
            font-style: italic;
            color: #222;
            /* More emphasis on bold-italic text */
        }

        /* Joke Box - Adds a soft neumorphic effect */
        .joke-box {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1),
                -5px -5px 10px rgba(255, 255, 255, 0.5);
            max-width: 550px;
            transition: all 0.3s ease-in-out;
        }

        /* Joke Box Hover Effect */
        .joke-box:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.6);
        }

        /* Dialogue Container - Left Centered */
        /* Dialogue Container - Auto Width Based on Content */
        .dialogue-container {
            display: inline-block;
            /* Shrinks width to fit content */
            max-width: 800px;
            /* Prevents it from becoming too wide */
            margin: 20px 0;
            /* Aligns it to the left with some spacing */
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }



        /* Individual Dialogue Lines */
        .line {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Styling for Different Speakers */
        .person-1 {
            background: linear-gradient(145deg, #dde5ed, #c9d6e2);
            text-align: left;
            color: #2c3e50;
        }

        .person-2 {
            background: linear-gradient(145deg, #d1e8ff, #b9dfff);
            text-align: left;
            color: #1d3557;
        }

        /* Speaker Name Styling */
        .speaker {
            font-weight: bold;
            margin-bottom: 5px;

            font-size: 1.1em;
            color: #000;
        }
    </style>
</head>

<body>

        <div id="partsSection" class="part-buttons"></div>
        <div id="contentSection" class="content-buttons hidden"></div>
        <div id="displaySection"></div>
    </div>

    <div id="right">

    </div>

    "dialogue": {
        "dialogue_1": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! How's your week going? You seem super busy."
                },
                {
                    "Person 2": "Oh, you have no idea! I've got so much work this week, and it’s hotter than I expected!"
                },
                {
                    "Person 1": "Busy, huh? I remember you said you were working at that cultural center. How's that going?"
                },
                {
                    "Person 2": "Yeah, I’m still there! Last year was way easier, but this year they’ve got us clocking way more hours."
                },
                {
                    "Person 1": "Isn't there a limit on how many hours you have to work?"
                },
                {
                    "Person 2": "Not really. They have a law that says we should be working around nine hours. It's a lot!"
                },
                {
                    "Person 1": "Wow, that’s pretty rough! What kind of tasks are you doing?"
                },
                {
                    "Person 2": "Oh, just the usual stuff—cleaning, using a leaf blower, you know, things like that."
                },
                {
                    "Person 1": "Leaf blower? That sounds kind of fun, actually."
                },
                {
                    "Person 2": "It can be! But the area is huge, so there are a ton of leaves to clear up."
                },
                {
                    "Person 1": "Speaking of clearing up, have you heard from your friend that lives out of power?"
                },
                {
                    "Person 2": "Yeah, she texted me earlier! She said if the power doesn’t come back, we might have to reschedule our lesson."
                },
                {
                    "Person 1": "That stinks! At least you’ve got power, right?"
                },
                {
                    "Person 2": "Yeah, for now! I just like to keep my window open for some fresh air."
                },
                {
                    "Person 1": "Totally! It’s nice to have a view, especially when the weather is warm."
                },
                {
                    "Person 2": "I know! I’m still in Sapa and the weather here is amazing. You’d love it!"
                },
                {
                    "Person 1": "I’ve heard Sapa is beautiful! Have you checked out any temples or sites?"
                },
                {
                    "Person 2": "Not really—it's more about the weather. But the rice fields are stunning in autumn!"
                },
                {
                    "Person 1": "I can imagine! Isn’t it cool how they change colors?"
                },
                {
                    "Person 2": "Exactly! Right now they're green, but in a month, they’ll be golden. Can't wait!"
                },
                {
                    "Person 1": "And then you're off to the Black Sea? Lucky you!"
                },
                {
                    "Person 2": "Yeah! I miss the beach. I’m a total beach bum at heart."
                },
                {
                    "Person 1": "With all the places you visit, you’ve got the best life! Those pictures you send are amazing!"
                },
                {
                    "Person 2": "Thanks! But you know, not everyone gets to live near the sea like you do!"
                }
            ]
        },
        "dialogue_2": {
            "dialogue_list": [
                {
                    "Person 1": "Hey, do you ever think about how much things have changed in our lives?"
                },
                {
                    "Person 2": "Oh, for sure! Just imagine how different things were 200 years ago!"
                },
                {
                    "Person 1": "Right? Everything’s so fast-paced now. Just the other day, I realized how I rely on my phone for everything!"
                },
                {
                    "Person 2": "I know! It's like I can't even go to the grocery store without checking my phone first."
                },
                {
                    "Person 1": "Exactly! And it’s kind of silly because we can just look things up online instead of remembering stuff."
                },
                {
                    "Person 2": "True! But then you find yourself lost in a rabbit hole of videos or memes."
                },
                {
                    "Person 1": "Totally! I mean, I tried reading a book last week and gave up after a few pages."
                },
                {
                    "Person 2": "Same here! It’s like I need constant stimulation now."
                },
                {
                    "Person 1": "So, how do we break that habit? Just throw our phones away?"
                },
                {
                    "Person 2": "As tempting as that sounds, I think setting small limits would be smarter. Like no phone an hour before bed."
                },
                {
                    "Person 1": "That sounds reasonable. But then again, what about that urge to scroll just one last time?"
                },
                {
                    "Person 2": "Ha! That's the trap! It’s hard to resist sometimes, isn’t it?"
                },
                {
                    "Person 1": "It really is! Okay, how about we try starting this together tomorrow?"
                },
                {
                    "Person 2": "Sounds like a plan! Unless we get sidetracked again, right?"
                }
            ]
        },
        "dialogue_3": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! How's it going? I heard you’ve been traveling a lot lately."
                },
                {
                    "Person 2": "Hey! Yeah, I just came back from Sapa. It was an amazing trip!"
                },
                {
                    "Person 1": "Nice! What was the best part about it?"
                },
                {
                    "Person 2": "The hiking was incredible. I even went up the highest peak in Southeast Asia! It was tough, but the view was worth it."
                },
                {
                    "Person 1": "Wow, that sounds intense! How was the climb?"
                },
                {
                    "Person 2": "Honestly, the descent was the scariest part, especially when it got dark and I only had my phone to light the way. I was so exhausted afterwards!"
                },
                {
                    "Person 1": "Yikes! I can’t imagine climbing a mountain in the dark. What were you thinking?"
                },
                {
                    "Person 2": "No idea! It was a spur-of-the-moment decision. But it turned into a great adventure, just not the most pleasant way to end it."
                },
                {
                    "Person 1": "At least you have an epic story to tell! So do you mix your teaching with your travels?"
                },
                {
                    "Person 2": "Yeah, that's the best part! I can teach from anywhere as long as I have my laptop. I just don’t do face-to-face classes."
                },
                {
                    "Person 1": "That's so convenient! Do you ever teach while you're on the road?"
                },
                {
                    "Person 2": "Not while climbing, but I do have lessons in cafes or when I find a nice spot to settle down."
                },
                {
                    "Person 1": "That sounds amazing! I wish I could work like that. Do you work a lot?"
                },
                {
                    "Person 2": "Not really. I work about three days a week. It's nice to have the free time to explore."
                },
                {
                    "Person 1": "Three days a week sounds perfect! That gives you so much time to travel."
                },
                {
                    "Person 2": "Exactly! I might go to another city soon. Any recommendations?"
                },
                {
                    "Person 1": "How about trying out Da Nang? I hear it’s really cool there."
                },
                {
                    "Person 2": "Great idea! I was actually thinking about it. Thanks for the tip!"
                },
                {
                    "Person 1": "No problem! Just stay safe out there, okay?"
                },
                {
                    "Person 2": "Will do! You too! We should catch up again soon."
                }
            ]
        },
        "dialogue_4": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Have you thought about taking a break from work lately? Maybe a long weekend or something?"
                },
                {
                    "Person 2": "Yeah, actually! I’ve been feeling burned out. I think needing a change of pace is important."
                },
                {
                    "Person 1": "Definitely! Sometimes, if you keep pushing through, it just becomes a routine, and that can kill your motivation."
                },
                {
                    "Person 2": "Exactly! I used to travel a lot, but with all the work, I feel like I lost that spark. I want to start a travel blog or something."
                },
                {
                    "Person 1": "That sounds awesome! Have you started yet?"
                },
                {
                    "Person 2": "Not really. I have a Telegram channel where I post some random travel stuff, but I haven’t updated it in ages."
                },
                {
                    "Person 1": "Oh, cool! Can I check it out?"
                },
                {
                    "Person 2": "Sure! But it’s mostly in Russian. Are you okay with that?"
                },
                {
                    "Person 1": "Yeah, I don’t mind! Photos and videos are universal. I’d love to see your adventures!"
                },
                {
                    "Person 2": "Alright! I’ll send you the link, but I haven’t posted anything in a while. Life just gets in the way."
                },
                {
                    "Person 1": "No rush! I totally get it. It’s hard to keep up with everything. Sometimes I feel like I’m behind on my own projects too."
                },
                {
                    "Person 2": "Right? That pressure to constantly produce can be overwhelming. I just want to do my thing without worrying about what everyone thinks."
                },
                {
                    "Person 1": "Exactly! I hate when people start expecting things from me. I just want to enjoy what I create."
                },
                {
                    "Person 2": "Yes! It’s tough when you feel like you have to cater to an audience. It takes away the fun."
                },
                {
                    "Person 1": "Totally! Just focus on what you love. If others appreciate it, great! If not, who cares?"
                },
                {
                    "Person 2": "Exactly! I’m just doing it for myself. Plus, it helps me keep my memories alive."
                },
                {
                    "Person 1": "That’s the spirit! Let me know when you post something new, even if it takes a while."
                },
                {
                    "Person 2": "Will do! Thanks for being so supportive!"
                }
            ]
        },
        "dialogue_5": {

        "dialogue_6": {
            "dialogue_list": [
                {
                    "Person 1": "Hey, have you ever thought about what happens after we die? Like, could we really live on in some sort of digital form?"

                {
                    "Person 2": "Yeah, I’ve thought about that! Imagine creating an AI that acts just like us. It’s kind of wild!"

                    "Person 1": "Totally! But then, what's the point if we're not really here anymore? I mean, that AI wouldn’t be *me*."

                    "Person 2": "Right? Even if it has all my memories and personality, it’s still just a copy. I’d feel really weird about it."

                {

            // Set parts_number from json_content
            let parts_number = json_content.parts_number || 0;

        // References to sections
        const partsSection = document.getElementById('partsSection');
        const contentSection = document.getElementById('contentSection');
        const displaySection = document.getElementById('displaySection');

        let activePart = null; // Track the active part

        // Function to create Part buttons
        function createPartButtons() {
            for (let i = 1; i <= parts_number; i++) {
                let button = document.createElement("button");
                button.textContent = "Part " + i;
                button.onclick = () => showContentButtons(i, button);
                partsSection.appendChild(button);
            }
        }

        // Function to show Mistakes, Vocabulary, and Dialogue buttons
        function showContentButtons(part, button) {
            // Reset previous part selection
            document.querySelectorAll(".part-buttons button").forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");

            // Clear previous content buttons and displayed content
            contentSection.innerHTML = "";
            contentSection.classList.remove("hidden");
            displaySection.innerHTML = "";

            activePart = part; // Update active part

            let sections = ["Mistakes", "Vocabulary", "Dialogue"];
            sections.forEach(section => {
                let secButton = document.createElement("button");
                secButton.textContent = section;
                secButton.onclick = () => {
                    secButton.classList.add("loading"); // Add flashing effect
                    displayContent(section, part, secButton);
                };
                contentSection.appendChild(secButton);
            });
        }

        // Function to display selected content
        function displayContent(type, part, button) {
            let dataKey = type.toLowerCase(); // "mistakes", "vocabulary", "dialogue"
            let partKey = dataKey + "_" + part; // e.g., "mistakes_1"

            if (json_content[dataKey] && json_content[dataKey][partKey]) {
                let contentData = json_content[dataKey][partKey];

                if (dataKey === "mistakes") {
                    appendContent(displayMistakes(contentData), part, type, button);
                } else if (dataKey === "vocabulary") {
                    appendContent(displayVocabulary(contentData), part, type, button);
                } else if (dataKey === "dialogue") {
                    appendContent(displayDialogue(contentData), part, type, button);
                }
            }
        }

        // Append content while keeping existing sections
        function appendContent(html, part, type, button) {
            let sectionID = `part${part}-${type}`;
            let existingSection = document.getElementById(sectionID);

            if (!existingSection) {
                let newSection = document.createElement("div");
                newSection.id = sectionID;
                newSection.classList.add("section-content");
                newSection.innerHTML = html;
                displaySection.appendChild(newSection);

                // Remove animation, keep the button highlighted
                button.classList.remove("loading");
                button.classList.add("active");
            }
        }

        // Function to display Mistakes content
        function displayMistakes(data) {
            let html = "<h3>Mistakes</h3>";
            data.mistakes_list.forEach(mistake => {
                html += `<p><b>Original:</b> ${mistake.original}</p>`;
                html += `<p><b>Corrected:</b> <b> ${mistake.corrected}</b></p>`;
                html += `<p><b>Explanation:</b> ${mistake.explanation}</p>`;
                html += `<p><b>Context:</b> <i> ${mistake.context}</i></p>`;
                html += `<hr><br>`; /* Adds an extra blank line */
            });
            return html;
        }





        // Function to display Vocabulary content
        function displayVocabulary(data) {
            let html = "<h3>Vocabulary</h3>";

            // Helper function: Preserve case in context replacement
            function formatContextSentence(sentence, word) {
                const regex = new RegExp(`\\b${word}\\b`, "gi"); // Case-insensitive exact word match
                return sentence.replace(regex, (match) => {
                    return `<span class="bold-italic">${match}</span>`; // Keeps match's case
                });
            }

            // Vocabulary Section
            data.vocabulary_list.forEach((entry, index) => {
                // Word Entry
                html += `<p class="entry-box"> <span class="word">${index + 1}. ${entry.word}</span></p>`;

                // Definition Box
                html += `<div class="definition-box"><span class="bold">Definition:</span> ${entry.definition}</div>`;

                // Context Sentences
                html += "<p>";
                Object.values(entry.context).forEach((sentence, i) => {
                    const formattedSentence = formatContextSentence(sentence, entry.word);
                    html += `<br><span class="bold">Context ${i + 1}:</span> <span class="italic">${formattedSentence}</span>`;
                });
                html += "</p>";
            });

            // Funny Facts Section
            if (data.funny_facts.length > 0) {
                html += `<div class="section-title purple-section">Funny Facts</div>`;
                data.funny_facts.forEach((fact, index) => {
                    html += `<div class="fact-box">
                <p class="fact"><span class="bold">${index + 1}. ${fact.word}:</span> ${fact.fact}</p>
             </div>`;
                });
            }

            // Jokes Section
            if (data.jokes.length > 0) {
                html += `<div class="section-title purple-section">Jokes</div>`;
                data.jokes.forEach((joke, index) => {
                    html += `<div class="joke-box">
                <p class="joke-question">${index + 1}. ${joke.question}</p>
                <p class="italic joke">${joke.answer}</p>
             </div>`;
                });
            }

            return html; // Returning the generated HTML instead of inserting it directly
        }

        function displayDialogue(data) {
            let html = `<div class="dialogue-container">`;
            html += "<h3>Dialogue</h3>";

            data.dialogue_list.forEach(entry => {
                const speaker = Object.keys(entry)[0];
                const line = entry[speaker];

                html += `<div class="line ${speaker === "Person 1" ? 'person-1' : 'person-2'}">
                    <span class="speaker">${speaker}:</span> ${line}
                 </div>`;
            });

            html += `</div>`;
            return html;
        }





        // Initialize part buttons
        createPartButtons();
    </script>

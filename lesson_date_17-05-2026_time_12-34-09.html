<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Parts</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            color: #444;
            background: linear-gradient(145deg, #eaeaea, #ffffff);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset 2px 2px 4px rgba(0, 0, 0, 0.05),
                inset -2px -2px 4px rgba(255, 255, 255, 0.4);
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        h3 {
            font-size: 50px;
            font-weight: bold;
        }



        #left {
            width: 100%;
            padding: 20px;
            border-right: 2px solid #ccc;
        }

        #right {
            display: none background-color: #f4f4f4;
        }

        .part-buttons,
        .content-buttons {
            margin-bottom: 10px;
        }

        .part-buttons button,
        .content-buttons button {
            margin-right: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .part-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        .content-buttons button.loading {
            animation: flash 0.5s infinite alternate;
        }

        .content-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        @keyframes flash {
            0% {
                background-color: #ffd700;
            }

            100% {
                background-color: #ffa500;
            }
        }

        .hidden {
            display: none;
        }

        .section-content {
            margin-top: 1px;
            padding: 30px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        /* Vocabulary Entry */
        .entry-box {
            font-weight: bold;
            font-size: 1.4em;
            display: inline-block;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 2px;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        /* Definition Box */
        .definition-box {
            background-color: #f4f4f4;
            padding: 8px 12px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            margin: 5px 0;
            max-width: 400px;
            text-align: left;
        }

        /* Word Styling */
        .word {
            font-weight: bold;
            color: #000000;
            font-size: 1.2em;
        }

        .example {
            margin-left: 20px;
            font-style: italic;
        }

        /* Fact Box */
        .fact-box {
            background-color: rgba(142, 68, 173, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(142, 68, 173, 0.15);
            max-width: 500px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: bold;
            padding: 8px 12px;
            display: inline-block;
            border-left: 6px solid rgba(0, 0, 0, 0.2);
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
            margin-bottom: 10px;
            color: white;
        }

        /* Section Colors */
        .purple-section {
            background-color: #8e44ad;
            border-left-color: #6a1b9a;
            box-shadow: 3px 3px 8px rgba(142, 68, 173, 0.3);
        }

        .joke-box {
            background-color: rgba(52, 152, 219, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(52, 152, 219, 0.15);
            max-width: 500px;
        }


        /* Text Formatting */
        .fact {
            color: black;
        }

        /* Joke Text */
        .joke {
            color: #6d1b9a;
            /* Deeper purple for better readability */
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Joke Question Styling */
        .joke-question {
            font-weight: bold;
            font-size: 1.2em;
            font-style: italic;
            color: #2c3e50;
            /* Dark gray-blue for a classy contrast */
            margin-bottom: 5px;
        }

        /* Enhanced Typography */
        .bold {
            font-weight: 600;
            color: #000000;
            /* Darker shade for better contrast */
        }

        .italic {
            font-style: italic;
            color: #000000;
            /* Slightly darker gray for better readability */
        }

        .bold-italic {
            font-weight: 600;
            font-style: italic;
            color: #222;
            /* More emphasis on bold-italic text */
        }

        /* Joke Box - Adds a soft neumorphic effect */
        .joke-box {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1),
                -5px -5px 10px rgba(255, 255, 255, 0.5);
            max-width: 550px;
            transition: all 0.3s ease-in-out;
        }

        /* Joke Box Hover Effect */
        .joke-box:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.6);
        }

        /* Dialogue Container - Left Centered */
        /* Dialogue Container - Auto Width Based on Content */
        .dialogue-container {
            display: inline-block;
            /* Shrinks width to fit content */
            max-width: 800px;
            /* Prevents it from becoming too wide */
            margin: 20px 0;
            /* Aligns it to the left with some spacing */
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }



        /* Individual Dialogue Lines */
        .line {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Styling for Different Speakers */
        .person-1 {
            background: linear-gradient(145deg, #dde5ed, #c9d6e2);
            text-align: left;
            color: #2c3e50;
        }

        .person-2 {
            background: linear-gradient(145deg, #d1e8ff, #b9dfff);
            text-align: left;
            color: #1d3557;
        }

        /* Speaker Name Styling */
        .speaker {
            font-weight: bold;
            margin-bottom: 5px;

            font-size: 1.1em;
            color: #000;
        }
    </style>
</head>

<body>

    <div id="left">
        <h2>Lesson Parts</h2>
        <div id="partsSection" class="part-buttons"></div>
        <div id="contentSection" class="content-buttons hidden"></div>
        <div id="displaySection"></div>
    </div>

    <div id="right">
        <!-- Reserved for later use -->
    </div>

    <script>
        // Declare json_content but do not fill it
        let json_content = {
    "parts_number": 7,
    "mistakes": {
        "mistakes_1": {
            "mistakes_list": [
                {
                    "original": "it is very easier for me to describe something or to text someone a sentence in English instead of Russian.",
                    "corrected": "it is much easier for me to describe something or to text someone a sentence in English instead of Russian.",
                    "explanation": "\"Very easier\" is incorrect; the correct phrase is \"much easier\" to indicate a larger degree of ease.",
                    "context": "Living in China has changed my perspective on language. I find that it is much easier for me to describe something or to text someone a sentence in English instead of Russian."
                },
                {
                    "original": "English make sentences shorter.",

                    "explanation": "The verb \"make\" must agree in number with the subject; therefore, it should be \"makes\" for singular subjects.",

                    "context": "In language, nuances vary significantly. I realize there may be many interpretations for this word, broadening our understanding."
                },
                {
                    "original": "I hope I will play basketball with my Mongolian friend.",
                    "corrected": "I hope I can play basketball with my Mongolian friend.",
                    "explanation": "The modal verb \"can\" is more suitable here to express the ability or possibility to do something.",
                    "context": "Amid this discussion, I express my plans. I hope I can play basketball with my Mongolian friend this weekend."

                {

                },
                {
                    "original": "Second. Secondly is better.",

                    "context": "When organizing my thoughts, I clarify my points. Secondly, I started doing gym in hopes of improving my fitness."
                }
            ]
        },
        "mistakes_2": {
            "mistakes_list": [
                {
                    "original": "going to gym is like about controlling yourself",
                    "corrected": "going to the gym is about controlling yourself",
                    "explanation": "The article 'the' is needed before 'gym' to specify it as a particular place.",
                    "context": "I believe that going to the gym is about controlling yourself when you don't want to exercise. It really helps with personal development."
                },
                {
                    "original": "But the problem is you never know what you should do.",
                    "corrected": "But the problem is that you never know what you should do.",
                    "explanation": "'That' is necessary for clarity after 'is' in complex sentences.",
                    "context": "I faced a challenge when I was younger. The problem is that you never know what you should do."
                },
                {
                    "original": "the only thing I liked, which was watching movies, watching podcasts",
                    "corrected": "the only thing I liked was watching movies and podcasts",
                    "explanation": "Use 'was' instead of 'which was' for grammatical correctness; 'and' is needed for list continuity.",
                    "context": "I wanted to contribute something meaningful. The only thing I liked was watching movies and podcasts."
                },
                {
                    "original": "I know that it's not going to contribute anything to me if I do that in Russian.",

                    "context": "When watching movies, I know that it's not going to contribute anything to me if I do it in Russian."

                    "explanation": "Adding 'worthwhile' clarifies what is meant by 'nothing' in this context.",
                    "context": "I reflected on the experience of watching films in Russian. I mean, that's just nothing worthwhile."
                },
                {
                    "original": "you just kind of...",
                    "corrected": "you just kind of adapt...",

                },
                {
                    "original": "it's not like you understand more.",
                    "corrected": "it's not that you understand more.",
                    "explanation": "Switching 'like' to 'that' provides a more formal structure.",
                    "context": "You realize over time that learning happens gradually. It's not that you understand more, but you feel comfortable."
                },
                {
                    "original": "I understand pretty much.",
                    "corrected": "I understand quite a bit.",
                    "explanation": "The phrase 'pretty much' is informal; 'quite a bit' is more precise.",
                    "context": "Over time, I noticed an improvement in my comprehension. I understand quite a bit."
                },
                {
                    "original": "words start circulating in your head.",
                    "corrected": "words start coming to your mind.",
                    "explanation": "The phrase 'circulating in your head' is awkward; 'coming to your mind' is more idiomatic and clear.",
                    "context": "As my English improved, I noticed a change. Words start coming to your mind more easily."
                },
                {
                    "original": "the most interesting thing is when you hear a word that you have used a long time ago, but you remember it, nevertheless.",
                    "corrected": "the most interesting thing is when you hear a word that you used a long time ago, and you remember it.",

                    "context": "I found the process of learning fascinating. The most interesting thing is when you hear a word that you used a long time ago, and you remember it."

                {
                    "original": "I forgot what I wanted to say.",
                    "corrected": "I lost track of what I wanted to say.",

                {
                    "original": "if I'm completely surrounded by English speaking people, I would think in English.",

                    "context": "Different environments affect my thought process. If I'm completely surrounded by English-speaking people, I think in English."
                }
            ]
        },
        "mistakes_3": {
            "mistakes_list": [
                {
                    "original": "Because speaking with native speaker is much more better, I don't know, to improve English.",
                    "corrected": "Because speaking with a native speaker is much better for improving English.",
                    "explanation": "The phrase 'much more better' is incorrect; the correct form is simply 'much better.' Also, 'native speaker' needs an article 'a' in this context.",

                {
                    "original": "But when you start reading a book, books are like the hardest thing you can find in a language.",

                },
                {
                    "original": "I can tell that whenever I see a foreigner... Well, maybe the problem was that their level was lower than mine.",

                    "original": "You're this grabber Nazi who always points out the mistakes people make in Russian?",

                    "context": "I often observe language errors around me. You're like a grammar Nazi who always points out the mistakes people make in Russian. It can be quite amusing sometimes."

            ]

        "mistakes_4": {
            "mistakes_list": [
                {
                    "original": "which of them was the most hard, the hardest?",

                {

                    "corrected": "you start talking about just boring stuff",

                    "context": "I shared how my approach to conversations has changed over the years. Now, you start talking about just boring stuff and quickly realize the conversation isn't going anywhere."

                {

                    "context": "I described situations where initial excitement turns dull. There is nothing to talk about. Then you realize that the person you're talking to is just boring."
                },
                {
                    "original": "I could only understand American English and I only spoke American English",

                    "context": "I talked about my early challenges with different English accents. I could only understand American English, and I spoke only American English."

        "mistakes_5": {
            "mistakes_list": [
                {
                    "original": "He would say something like sand. He would say like, sound.",

                {

            // Set parts_number from json_content
            let parts_number = json_content.parts_number || 0;

        // References to sections
        const partsSection = document.getElementById('partsSection');
        const contentSection = document.getElementById('contentSection');
        const displaySection = document.getElementById('displaySection');

        let activePart = null; // Track the active part

        // Function to create Part buttons
        function createPartButtons() {
            for (let i = 1; i <= parts_number; i++) {
                let button = document.createElement("button");
                button.textContent = "Part " + i;
                button.onclick = () => showContentButtons(i, button);
                partsSection.appendChild(button);
            }
        }

        // Function to show Mistakes, Vocabulary, and Dialogue buttons
        function showContentButtons(part, button) {
            // Reset previous part selection
            document.querySelectorAll(".part-buttons button").forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");

            // Clear previous content buttons and displayed content
            contentSection.innerHTML = "";
            contentSection.classList.remove("hidden");
            displaySection.innerHTML = "";

            activePart = part; // Update active part

            let sections = ["Mistakes", "Vocabulary", "Dialogue"];
            sections.forEach(section => {
                let secButton = document.createElement("button");
                secButton.textContent = section;
                secButton.onclick = () => {
                    secButton.classList.add("loading"); // Add flashing effect
                    displayContent(section, part, secButton);
                };
                contentSection.appendChild(secButton);
            });
        }

        // Function to display selected content
        function displayContent(type, part, button) {
            let dataKey = type.toLowerCase(); // "mistakes", "vocabulary", "dialogue"
            let partKey = dataKey + "_" + part; // e.g., "mistakes_1"

            if (json_content[dataKey] && json_content[dataKey][partKey]) {
                let contentData = json_content[dataKey][partKey];

                if (dataKey === "mistakes") {
                    appendContent(displayMistakes(contentData), part, type, button);
                } else if (dataKey === "vocabulary") {
                    appendContent(displayVocabulary(contentData), part, type, button);
                } else if (dataKey === "dialogue") {
                    appendContent(displayDialogue(contentData), part, type, button);
                }
            }
        }

        // Append content while keeping existing sections
        function appendContent(html, part, type, button) {
            let sectionID = `part${part}-${type}`;
            let existingSection = document.getElementById(sectionID);

            if (!existingSection) {
                let newSection = document.createElement("div");
                newSection.id = sectionID;
                newSection.classList.add("section-content");
                newSection.innerHTML = html;
                displaySection.appendChild(newSection);

                // Remove animation, keep the button highlighted
                button.classList.remove("loading");
                button.classList.add("active");
            }
        }

        // Function to display Mistakes content
        function displayMistakes(data) {
            let html = "<h3>Mistakes</h3>";
            data.mistakes_list.forEach(mistake => {
                html += `<p><b>Original:</b> ${mistake.original}</p>`;
                html += `<p><b>Corrected:</b> <b> ${mistake.corrected}</b></p>`;
                html += `<p><b>Explanation:</b> ${mistake.explanation}</p>`;
                html += `<p><b>Context:</b> <i> ${mistake.context}</i></p>`;
                html += `<hr><br>`; /* Adds an extra blank line */
            });
            return html;
        }





        // Function to display Vocabulary content
        function displayVocabulary(data) {
            let html = "<h3>Vocabulary</h3>";

            // Helper function: Preserve case in context replacement
            function formatContextSentence(sentence, word) {
                const regex = new RegExp(`\\b${word}\\b`, "gi"); // Case-insensitive exact word match
                return sentence.replace(regex, (match) => {
                    return `<span class="bold-italic">${match}</span>`; // Keeps match's case
                });
            }

            // Vocabulary Section
            data.vocabulary_list.forEach((entry, index) => {
                // Word Entry
                html += `<p class="entry-box"> <span class="word">${index + 1}. ${entry.word}</span></p>`;

                // Definition Box
                html += `<div class="definition-box"><span class="bold">Definition:</span> ${entry.definition}</div>`;

                // Context Sentences
                html += "<p>";
                Object.values(entry.context).forEach((sentence, i) => {
                    const formattedSentence = formatContextSentence(sentence, entry.word);
                    html += `<br><span class="bold">Context ${i + 1}:</span> <span class="italic">${formattedSentence}</span>`;
                });
                html += "</p>";
            });

            // Funny Facts Section
            if (data.funny_facts.length > 0) {
                html += `<div class="section-title purple-section">Funny Facts</div>`;
                data.funny_facts.forEach((fact, index) => {
                    html += `<div class="fact-box">
                <p class="fact"><span class="bold">${index + 1}. ${fact.word}:</span> ${fact.fact}</p>
             </div>`;
                });
            }

            // Jokes Section
            if (data.jokes.length > 0) {
                html += `<div class="section-title purple-section">Jokes</div>`;
                data.jokes.forEach((joke, index) => {
                    html += `<div class="joke-box">
                <p class="joke-question">${index + 1}. ${joke.question}</p>
                <p class="italic joke">${joke.answer}</p>
             </div>`;
                });
            }

            return html; // Returning the generated HTML instead of inserting it directly
        }

        function displayDialogue(data) {
            let html = `<div class="dialogue-container">`;
            html += "<h3>Dialogue</h3>";

            data.dialogue_list.forEach(entry => {
                const speaker = Object.keys(entry)[0];
                const line = entry[speaker];

                html += `<div class="line ${speaker === "Person 1" ? 'person-1' : 'person-2'}">
                    <span class="speaker">${speaker}:</span> ${line}
                 </div>`;
            });

            html += `</div>`;
            return html;
        }





        // Initialize part buttons
        createPartButtons();
    </script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Parts</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            color: #444;
            background: linear-gradient(145deg, #eaeaea, #ffffff);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),

                inset 2px 2px 4px rgba(0, 0, 0, 0.05),
                inset -2px -2px 4px rgba(255, 255, 255, 0.4);
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        h3 {
            font-size: 50px;
            font-weight: bold;
        }



        #left {
            width: 100%;
            padding: 20px;
            border-right: 2px solid #ccc;
        }

        #right {
            display: none background-color: #f4f4f4;
        }

        .part-buttons,
        .content-buttons {
            margin-bottom: 10px;
        }

        .part-buttons button,
        .content-buttons button {
            margin-right: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .part-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        .content-buttons button.loading {
            animation: flash 0.5s infinite alternate;
        }

        .content-buttons button.active {
            background-color: #007bff;
            color: white;
        }

        @keyframes flash {
            0% {
                background-color: #ffd700;
            }

            100% {
                background-color: #ffa500;
            }
        }

        .hidden {
            display: none;
        }

        .section-content {
            margin-top: 1px;
            padding: 30px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        /* Vocabulary Entry */
        .entry-box {
            font-weight: bold;
            font-size: 1.4em;
            display: inline-block;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 2px;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        /* Definition Box */
        .definition-box {
            background-color: #f4f4f4;
            padding: 8px 12px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            margin: 5px 0;
            max-width: 400px;
            text-align: left;
        }

        /* Word Styling */
        .word {
            font-weight: bold;
            color: #000000;
            font-size: 1.2em;
        }

        .example {
            margin-left: 20px;
            font-style: italic;
        }

        /* Fact Box */
        .fact-box {
            background-color: rgba(142, 68, 173, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(142, 68, 173, 0.15);
            max-width: 500px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: bold;
            padding: 8px 12px;
            display: inline-block;
            border-left: 6px solid rgba(0, 0, 0, 0.2);
            box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
            margin-bottom: 10px;
            color: white;
        }

        /* Section Colors */
        .purple-section {
            background-color: #8e44ad;
            border-left-color: #6a1b9a;
            box-shadow: 3px 3px 8px rgba(142, 68, 173, 0.3);
        }

        .joke-box {
            background-color: rgba(52, 152, 219, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            box-shadow: 2px 2px 5px rgba(52, 152, 219, 0.15);
            max-width: 500px;
        }


        /* Text Formatting */
        .fact {
            color: black;
        }

        /* Joke Text */
        .joke {
            color: #6d1b9a;
            /* Deeper purple for better readability */
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Joke Question Styling */
        .joke-question {
            font-weight: bold;
            font-size: 1.2em;
            font-style: italic;
            color: #2c3e50;
            /* Dark gray-blue for a classy contrast */
            margin-bottom: 5px;
        }

        /* Enhanced Typography */
        .bold {
            font-weight: 600;
            color: #000000;
            /* Darker shade for better contrast */
        }

        .italic {
            font-style: italic;
            color: #000000;
            /* Slightly darker gray for better readability */
        }

        .bold-italic {
            font-weight: 600;
            font-style: italic;
            color: #222;
            /* More emphasis on bold-italic text */
        }

        /* Joke Box - Adds a soft neumorphic effect */
        .joke-box {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1),
                -5px -5px 10px rgba(255, 255, 255, 0.5);
            max-width: 550px;
            transition: all 0.3s ease-in-out;
        }

        /* Joke Box Hover Effect */
        .joke-box:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.15),
                -6px -6px 12px rgba(255, 255, 255, 0.6);
        }

        /* Dialogue Container - Left Centered */
        /* Dialogue Container - Auto Width Based on Content */
        .dialogue-container {
            display: inline-block;
            /* Shrinks width to fit content */
            max-width: 800px;
            /* Prevents it from becoming too wide */
            margin: 20px 0;
            /* Aligns it to the left with some spacing */
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }



        /* Individual Dialogue Lines */
        .line {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.1);
            font-size: 1.1em;
            line-height: 1.4;
        }

        /* Styling for Different Speakers */
        .person-1 {
            background: linear-gradient(145deg, #dde5ed, #c9d6e2);
            text-align: left;
            color: #2c3e50;
        }

        .person-2 {
            background: linear-gradient(145deg, #d1e8ff, #b9dfff);
            text-align: left;
            color: #1d3557;
        }

        /* Speaker Name Styling */
        .speaker {
            font-weight: bold;
            margin-bottom: 5px;

            font-size: 1.1em;
            color: #000;
        }
    </style>
</head>

            "dialogue_list": [
                {
                    "Person 1": "Hey! What’s up? How’s your day going?"
                },
                {
                    "Person 2": "Not too bad. Just dealing with some annoying stuff. My husband is in a mood because he bought some grapes that turned out to be sour."
                },
                {
                    "Person 1": "Oh no, that’s the worst! Grapes should always be sweet."
                },
                {
                    "Person 2": "Right? And he’s really upset about how expensive they were too. Can you believe they cost like 5 euros a kilo?"
                },
                {
                    "Person 1": "Wow, that’s kinda high! What’s the price back home?"
                },
                {
                    "Person 2": "Back in Latvia, it can go up to 10 euros for the really sweet ones. But you can find cheaper ones, like around 4 euros, but they’re usually not that great."
                },
                {
                    "Person 1": "It’s wild that grapes are cheap where they’re grown. Why not just sell them for less over there?"
                },
                {
                    "Person 2": "I know, right? You’d think Vietnam would have better prices on grapes if they grow them locally."
                },
                {
                    "Person 1": "Are you taking any classes or something? You mentioned learning English?"
                },
                {
                    "Person 2": "Yeah, I’m trying to learn more. I signed up for some online classes, but they use all this technical jargon, and it’s tough!"
                },
                {
                    "Person 1": "That can be rough. Is it programming or something else?"
                },
                {
                    "Person 2": "It’s cloud coding, but I don’t even have the right software on my computer since I’m using Linux."
                },
                {
                    "Person 1": "Ah, that’s frustrating! Maybe you should try something simpler first, like basic coding?"
                },
                {
                    "Person 2": "Good idea! I should look for beginner-level courses instead. They might help more."
                },
                {
                    "Person 1": "Definitely! And about that translation tool you mentioned, how's that been working out?"
                },
                {
                    "Person 2": "I’m excited to try it out! But I need to make sure I set it to the right language."
                },
                {
                    "Person 1": "Yeah, that would help. How many languages can it translate?"
                },
                {
                    "Person 2": "Just five for now—Spanish, French, German, Italian, and Portuguese."
                },
                {
                    "Person 1": "That's cool! I’d love to hear how it goes. Just try not to confuse German with English!"
                },
                {
                    "Person 2": "For sure! I’ll let you know how it turns out."
                }
            ]
        },
        "dialogue_2": {
            "dialogue_list": [
                {
                    "Person 1": "Hey, have you ever thought about how hard it is to learn a new language?"
                },
                {
                    "Person 2": "Totally! I tried to learn Spanish in school, but it was so intimidating."
                },
                {
                    "Person 1": "Right? I always worried about speaking in front of others and messing up."
                },
                {
                    "Person 2": "Same here! I felt embarrassed whenever I tried. Like, what if I pronounced something wrong?"
                },
                {
                    "Person 1": "Exactly! I used to feel like people would judge me for not having a perfect accent."
                },
                {
                    "Person 2": "But then I realized, most people are understanding. They know it's a second language."
                },
                {
                    "Person 1": "Yeah! I actually made a video about how people shouldn’t be ashamed to speak, even if they mess up."
                },
                {
                    "Person 2": "That’s awesome! I think everyone needs that kind of encouragement."
                },
                {
                    "Person 1": "For sure! I had a friend who spoke with an accent, and he was super confident about it."
                },
                {
                    "Person 2": "That’s inspiring! I wish I had that confidence back in school."
                },
                {
                    "Person 1": "Me too. I let my fears hold me back for way too long."
                },
                {
                    "Person 2": "Well, it’s never too late to start speaking up now, right?"
                },
                {
                    "Person 1": "Totally! I plan on practicing more. Let’s do it together!"
                },
                {
                    "Person 2": "Yes! We’ll be language champions in no time!"
                },
                {
                    "Person 1": "And we’ll definitely have some fun along the way!"
                }
            ]
        },
        "dialogue_3": {
            "dialogue_list": [
                {
                    "**Person 1**": "Hey, did you try that AI agent workflow Claude suggested for development?"
                },
                {
                    "**Person 2**": "I did. Kinda neat — it can generate notes, course outlines, even sample backend projects. Saved me a bunch of time."
                },
                {
                    "**Person 1**": "Nice. At first I thought it would just make short summaries, but it ended up building full course-style material."
                },
                {
                    "**Person 2**": "Yeah, same here. Some of the example courses were super simple, but still useful. Took me a few hours to get the hang of it."
                },
                {
                    "**Person 1**": "Totally. One thing that surprised me: you shouldn’t have the same agent both write code and review it."
                },
                {
                    "**Person 2**": "Right — the agent that writes is naturally biased about its own work. Better to create a second agent specifically for reviews."
                },
                {
                    "**Person 1**": "Makes sense. New chat, new context, new perspective. Helps catch stuff the first agent would miss."
                },
                {
                    "**Person 2**": "Exactly. Especially for microservice projects where each service has different inputs from external data sources."
                },
                {
                    "**Person 1**": "How are you organizing that? One agent per service plus a reviewer agent?"
                },
                {
                    "**Person 2**": "That's the plan. Writer agent for each service, then a separate reviewer agent or a 'judge' agent to run checks and tests."
                },
                {
                    "**Person 1**": "Smart. I also liked that some agents can pull example code links and docs automatically — saves manual searching."
                },
                {
                    "**Person 2**": "For sure. The links helped me learn new stuff I didn't know before without leaving the IDE."
                },
                {
                    "**Person 1**": "On a different note, English spelling drives me crazy. Feels nothing like the way people say words."
                },
                {
                    "**Person 2**": "I hear you. Compared to French or German, English can be all over the place with pronunciation."
                },
                {
                    "**Person 1**": "French is weird in its own way, but at least some rules are consistent. German is super regular, which I appreciate."
                },
                {
                    "**Person 2**": "True. Anyway, want to try a mini experiment? I’ll spin up a writer agent for a small service and you create a reviewer agent."
                },
                {
                    "**Person 1**": "Deal. We’ll compare results and iterate. Could be a good routine for future projects."
                },
                {
                    "**Person 2**": "Sounds like a plan. Coffee first, then agents."
                },
                {
                    "**Person 1**": "Always coffee first."
                }
            ]
        },
        "dialogue_4": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Have you ever tried to learn a new language?"
                },
                {
                    "Person 2": "Yeah! I tried learning Spanish a while back, but it was tougher than I expected."
                },
                {
                    "Person 1": "I hear that! People say English is hard, but is it really?"
                },
                {
                    "Person 2": "Honestly, I think every language has its quirks. English has those weird pronunciations and silent letters."
                },
                {
                    "Person 1": "Right? Like how 'ough' can sound like 'uff' in 'tough' or 'ow' in 'dough'."
                },
                {
                    "Person 2": "Exactly! It's so unpredictable. But then again, I’ve heard Chinese is even harder because of all the characters."
                },
                {
                    "Person 1": "Totally! I've seen those characters, and it looks like a whole other world."
                },
                {
                    "Person 2": "Yeah, and the tones too! A single word can mean different things depending on how you say it."
                },
                {
                    "Person 1": "I don’t think I could handle that! I can barely manage English sometimes."
                },
                {
                    "Person 2": "Same! I remember struggling with those tricky vowel sounds and the consonant clusters."
                },
                {
                    "Person 1": "And don’t get me started on idioms! Like, why do we say 'kick the bucket' when someone dies?"
                },
                {
                    "Person 2": "Ha! That one makes no sense at all! But I guess that’s part of the charm of learning a new language."
                },
                {
                    "Person 1": "For sure! Every language has its unique way of expressing things."
                },
                {
                    "Person 2": "Exactly! And even if it's tough, it's also pretty interesting."
                },
                {
                    "Person 1": "Well, I'm glad we got to chat about this. Maybe we'll motivate each other to learn more!"
                },
                {
                    "Person 2": "Definitely! Let's keep each other posted on our progress!"
                }
            ]
        },
        "dialogue_5": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Have you ever felt like everyone has unrealistic expectations, especially at work?"
                },
                {
                    "Person 2": "Totally! I sometimes feel like my coworkers think I should just know everything right away."
                },
                {
                    "Person 1": "Exactly! Like, just because we’re in the same field doesn’t mean we all have the same experience."
                },
                {
                    "Person 2": "Right? I mean, we’re all learning at our own pace. It can be frustrating when people don’t get that."
                },
                {
                    "Person 1": "Yeah, and I've noticed how quick some are to judge others. It's like, why can't we just be supportive?"
                },
                {
                    "Person 2": "For real! I try to remind myself that we all have days where we just don’t get it."
                },
                {
                    "Person 1": "Absolutely! I once struggled with a coding problem for hours and felt embarrassed to ask for help."
                },
                {
                    "Person 2": "Same here! I used to think it meant I was incompetent, but now I realize it's part of the learning process."
                },
                {
                    "Person 1": "Exactly! We all make mistakes. It's how we grow, right?"
                },
                {
                    "Person 2": "Exactly! Plus, I’ve noticed that when I show patience with others, it helps everyone feel more comfortable."
                },
                {
                    "Person 1": "Definitely! I wish more people understood that. We're all just trying to figure things out."
                },
                {
                    "Person 2": "Yeah, like that old saying, 'Everybody’s learning.' We could all use a bit more empathy."
                },
                {
                    "Person 1": "For sure! So, anything exciting happening with you at work lately?"
                },
                {
                    "Person 2": "I actually just finished a project that I thought I'd struggle with, and it went better than expected!"
                },
                {
                    "Person 1": "That’s awesome! See? You proved to yourself that you can do it!"
                },
                {
                    "Person 2": "Thanks! It feels good, especially after all those times of doubts."
                }
            ]
        },
        "dialogue_6": {
            "dialogue_list": [
                {
                    "Person 1": "Hey! Have you ever noticed how different cultures can be from one another?"
                },
                {
                    "Person 2": "Definitely! I mean, just traveling around the U.S. can show you so much diversity, let alone other countries!"
                },
                {
                    "Person 1": "Right? I recently met someone from Vietnam, and they described everyday life so differently from ours."
                },
                {
                    "Person 2": "That’s interesting! I think it’s cool how everyone has their own perspectives based on where they’re from."
                },
                {
                    "Person 1": "Exactly! It got me thinking about how we sometimes expect everyone to understand things the same way we do."
                },
                {
                    "Person 2": "Yeah! It’s like when someone thinks you're not grasping things quickly—I think everyone just processes information differently."
                },
                {
                    "Person 1": "Exactly! I mean, I can take my time to really understand something, while others might get it on the first try."
                },
                {
                    "Person 2": "Totally! I’m more of a quick learner too, but I appreciate when someone goes into depth."
                },
                {
                    "Person 1": "Same here! It helps me build a bigger picture, especially when learning something new."
                },
                {
                    "Person 2": "For sure! And when people rush you, it can feel a bit discouraging."
                },
                {
                    "Person 1": "Definitely! Like, if I feel judged for not picking up something quickly, it can lower my confidence."
                },
                {
                    "Person 2": "That’s a tough spot! Sometimes, people don’t realize their comments can create insecurities."
                },
                {
                    "Person 1": "Exactly, it’s all about understanding ourselves and giving each other some grace, right?"
                },
                {
                    "Person 2": "Absolutely! And I think open communication helps—like asking questions instead of assuming."
                },
                {
                    "Person 1": "100%! I try to remind myself that everyone has their own pace."
                },
                {
                    "Person 2": "Same here! We just need to respect our differences and keep learning from each other."
                }
            ]
        },

            // Set parts_number from json_content
            let parts_number = json_content.parts_number || 0;

        // References to sections
        const partsSection = document.getElementById('partsSection');
        const contentSection = document.getElementById('contentSection');
        const displaySection = document.getElementById('displaySection');

        let activePart = null; // Track the active part

        // Function to create Part buttons
        function createPartButtons() {
            for (let i = 1; i <= parts_number; i++) {
                let button = document.createElement("button");
                button.textContent = "Part " + i;
                button.onclick = () => showContentButtons(i, button);
                partsSection.appendChild(button);
            }
        }

        // Function to show Mistakes, Vocabulary, and Dialogue buttons
        function showContentButtons(part, button) {
            // Reset previous part selection
            document.querySelectorAll(".part-buttons button").forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");

            // Clear previous content buttons and displayed content
            contentSection.innerHTML = "";
            contentSection.classList.remove("hidden");
            displaySection.innerHTML = "";

            activePart = part; // Update active part

            let sections = ["Mistakes", "Vocabulary", "Dialogue"];
            sections.forEach(section => {
                let secButton = document.createElement("button");
                secButton.textContent = section;
                secButton.onclick = () => {
                    secButton.classList.add("loading"); // Add flashing effect
                    displayContent(section, part, secButton);
                };
                contentSection.appendChild(secButton);
            });
        }

        // Function to display selected content
        function displayContent(type, part, button) {
            let dataKey = type.toLowerCase(); // "mistakes", "vocabulary", "dialogue"
            let partKey = dataKey + "_" + part; // e.g., "mistakes_1"

            if (json_content[dataKey] && json_content[dataKey][partKey]) {
                let contentData = json_content[dataKey][partKey];

                if (dataKey === "mistakes") {
                    appendContent(displayMistakes(contentData), part, type, button);
                } else if (dataKey === "vocabulary") {
                    appendContent(displayVocabulary(contentData), part, type, button);
                } else if (dataKey === "dialogue") {
                    appendContent(displayDialogue(contentData), part, type, button);
                }
            }
        }

        // Append content while keeping existing sections
        function appendContent(html, part, type, button) {
            let sectionID = `part${part}-${type}`;
            let existingSection = document.getElementById(sectionID);

            if (!existingSection) {
                let newSection = document.createElement("div");
                newSection.id = sectionID;
                newSection.classList.add("section-content");
                newSection.innerHTML = html;
                displaySection.appendChild(newSection);

                // Remove animation, keep the button highlighted
                button.classList.remove("loading");
                button.classList.add("active");
            }
        }

        // Function to display Mistakes content
        function displayMistakes(data) {
            let html = "<h3>Mistakes</h3>";
            data.mistakes_list.forEach(mistake => {
                html += `<p><b>Original:</b> ${mistake.original}</p>`;
                html += `<p><b>Corrected:</b> <b> ${mistake.corrected}</b></p>`;
                html += `<p><b>Explanation:</b> ${mistake.explanation}</p>`;
                html += `<p><b>Context:</b> <i> ${mistake.context}</i></p>`;
                html += `<hr><br>`; /* Adds an extra blank line */
            });
            return html;
        }





        // Function to display Vocabulary content
        function displayVocabulary(data) {
            let html = "<h3>Vocabulary</h3>";

            // Helper function: Preserve case in context replacement
            function formatContextSentence(sentence, word) {
                const regex = new RegExp(`\\b${word}\\b`, "gi"); // Case-insensitive exact word match
                return sentence.replace(regex, (match) => {
                    return `<span class="bold-italic">${match}</span>`; // Keeps match's case
                });
            }

            // Vocabulary Section
            data.vocabulary_list.forEach((entry, index) => {
                // Word Entry
                html += `<p class="entry-box"> <span class="word">${index + 1}. ${entry.word}</span></p>`;

                // Definition Box
                html += `<div class="definition-box"><span class="bold">Definition:</span> ${entry.definition}</div>`;

                // Context Sentences
                html += "<p>";
                Object.values(entry.context).forEach((sentence, i) => {
                    const formattedSentence = formatContextSentence(sentence, entry.word);
                    html += `<br><span class="bold">Context ${i + 1}:</span> <span class="italic">${formattedSentence}</span>`;
                });
                html += "</p>";
            });

            // Funny Facts Section
            if (data.funny_facts.length > 0) {
                html += `<div class="section-title purple-section">Funny Facts</div>`;
                data.funny_facts.forEach((fact, index) => {
                    html += `<div class="fact-box">
                <p class="fact"><span class="bold">${index + 1}. ${fact.word}:</span> ${fact.fact}</p>
             </div>`;
                });
            }

            // Jokes Section
            if (data.jokes.length > 0) {
                html += `<div class="section-title purple-section">Jokes</div>`;
                data.jokes.forEach((joke, index) => {
                    html += `<div class="joke-box">
                <p class="joke-question">${index + 1}. ${joke.question}</p>
                <p class="italic joke">${joke.answer}</p>
             </div>`;
                });
            }

            return html; // Returning the generated HTML instead of inserting it directly
        }

        function displayDialogue(data) {
            let html = `<div class="dialogue-container">`;
            html += "<h3>Dialogue</h3>";

            data.dialogue_list.forEach(entry => {
                const speaker = Object.keys(entry)[0];
                const line = entry[speaker];

                html += `<div class="line ${speaker === "Person 1" ? 'person-1' : 'person-2'}">
                    <span class="speaker">${speaker}:</span> ${line}
                 </div>`;
            });

            html += `</div>`;
            return html;
        }





        // Initialize part buttons
        createPartButtons();
    </script>
